<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ViewLoom redesign review</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#050b14;color:#eef4ff}body{display:grid;grid-template-rows:auto 1fr}.reviewbar{display:flex;gap:7px;align-items:center;padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.12);background:#07111f;overflow-x:auto}.reviewbar strong{white-space:nowrap;margin-right:8px;letter-spacing:.04em}.reviewbar button{background:#0b1626;color:#9fb0ca;border:1px solid rgba(255,255,255,.14);padding:7px 9px;white-space:nowrap;cursor:pointer;border-radius:5px}.reviewbar button:hover,.reviewbar button.active{background:#2c97ff;color:#fff;border-color:#2c97ff}.reviewbar button[data-provider="twitch"].active{background:#905aff;border-color:#905aff}.reviewbar button[data-provider="kick"].active{background:#22d378;border-color:#22d378;color:#06110b}.group-label{font:700 10px "SFMono-Regular",Consolas,monospace;letter-spacing:.08em;color:#71829d;margin-left:8px;white-space:nowrap}.viewport{display:grid;grid-template-columns:1fr;min-height:0;background:#050b14}.viewport.mobile{justify-items:center;background:#050b14;padding:18px}.viewport iframe{width:100%;height:100%;border:0;background:#07111f}.viewport.mobile iframe{width:390px;max-width:100%;box-shadow:0 16px 60px #000;height:100%}.spacer{flex:1}.mode{font-weight:700}
</style></head><body><div class="reviewbar"><strong>ViewLoom mock</strong>
<button class="active" data-page="index.html" data-provider="portal">Portal</button>
<button data-page="about/index.html" data-provider="portal">About</button>
<button data-page="support/index.html" data-provider="portal">Support</button>
<span class="group-label">TWITCH</span>
<button data-page="twitch/index.html" data-provider="twitch">Home</button>
<button data-page="twitch/heatmap/index.html" data-provider="twitch">Heatmap</button>
<button data-page="twitch/day-flow/index.html" data-provider="twitch">Day Flow</button>
<button data-page="twitch/battle-lines/index.html" data-provider="twitch">Battle Lines</button>
<button data-page="twitch/history/index.html" data-provider="twitch">History</button>
<button data-page="twitch/status/index.html" data-provider="twitch">Status</button>
<span class="group-label">KICK</span>
<button data-page="kick/index.html" data-provider="kick">Home</button>
<button data-page="kick/heatmap/index.html" data-provider="kick">Heatmap</button>
<button data-page="kick/day-flow/index.html" data-provider="kick">Day Flow</button>
<button data-page="kick/battle-lines/index.html" data-provider="kick">Battle Lines</button>
<button data-page="kick/history/index.html" data-provider="kick">History</button>
<button data-page="kick/status/index.html" data-provider="kick">Status</button>
<span class="spacer"></span><button class="mode" data-mode>Mobile 390px</button></div><div class="viewport"><iframe title="ViewLoom redesign preview" src="index.html"></iframe></div><script>
const frame=document.querySelector('iframe'),vp=document.querySelector('.viewport');document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-page]').forEach(x=>x.classList.remove('active'));b.classList.add('active');frame.src=b.dataset.page});document.querySelector('[data-mode]').onclick=e=>{vp.classList.toggle('mobile');e.currentTarget.textContent=vp.classList.contains('mobile')?'Desktop full width':'Mobile 390px'};
</script></body></html>
