name: Analytics 12A4 Kick Normal Collector Recovery

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-normal-collector-recovery.yml'
      - 'docs/audits/12a4-kick-normal-collector-recovery-contract.json'
      - 'docs/audits/12a4-kick-normal-collector-recovery-trigger.json'
      - 'docs/work-in-progress/phase12a4-kick-normal-collector-recovery.md'
      - 'scripts/check-12a4-kick-normal-collector-recovery-scope.mjs'
      - 'scripts/run-12a4-kick-normal-collector-recovery.mjs'
      - 'scripts/verify-12a4-kick-normal-collector-recovery-package.mjs'
  push:
    branches: [main]
    paths:
      - 'docs/audits/12a4-kick-normal-collector-recovery-trigger.json'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-normal-collector-recovery-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  verify-pull-request:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify exact recovery package scope
        run: node scripts/check-12a4-kick-normal-collector-recovery-scope.mjs

      - name: Verify recovery package and production boundary
        run: node scripts/verify-12a4-kick-normal-collector-recovery-package.mjs

      - name: Bundle canonical normal Kick collector without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --outdir artifacts/12a4-kick-normal-collector-recovery/dry-run --config workers/collector-kick/wrangler.toml

  recover-normal-kick-collector:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTPUT_DIR: artifacts/12a4-kick-normal-collector-recovery
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify recovery package and production boundary
        run: node scripts/verify-12a4-kick-normal-collector-recovery-package.mjs

      - id: recovery
        name: Deploy canonical normal Kick collector and verify cron recovery
        run: node scripts/run-12a4-kick-normal-collector-recovery.mjs

      - name: Upload sanitized recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-12a4-kick-normal-collector-recovery
          path: artifacts/12a4-kick-normal-collector-recovery/evidence.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish recovery summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4 Kick normal collector recovery'
            echo
            echo '- Production action: canonical normal Kick Worker deploy'
            echo '- Expected cron: `*/5 * * * *`'
            echo '- Manual collect: no'
            echo '- Category capture: disabled'
            echo '- Twitch change: no'
            echo '- Outcome: `${{ steps.recovery.outputs.outcome }}`'
          } >> "$GITHUB_STEP_SUMMARY"
