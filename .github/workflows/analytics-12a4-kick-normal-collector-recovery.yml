name: Analytics 12A4 Kick Normal Collector Recovery

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-normal-collector-recovery.yml'
      - 'docs/audits/12a4-kick-normal-collector-recovery-contract.json'
      - 'docs/audits/12a4-kick-normal-collector-recovery-trigger.json'
      - 'docs/work-in-progress/phase12a4-kick-normal-collector-recovery.md'
      - 'scripts/check-12a4-kick-normal-collector-recovery-scope.mjs'
      - 'scripts/verify-12a4-kick-normal-collector-recovery-package.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-normal-collector-recovery-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-retirement:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify exact recovery retirement scope
        run: node scripts/check-12a4-kick-normal-collector-recovery-scope.mjs

      - name: Verify retired recovery package
        run: node scripts/verify-12a4-kick-normal-collector-recovery-package.mjs

      - name: Bundle canonical normal Kick collector without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --outdir artifacts/12a4-kick-normal-collector-recovery/dry-run --config workers/collector-kick/wrangler.toml

      - name: Publish retirement summary
        run: |
          {
            echo '## ViewLoom 12A-4 Kick normal collector recovery retirement'
            echo
            echo '- Production deployment path: retired'
            echo '- Push trigger: removed'
            echo '- Normal cron: unchanged at `*/5 * * * *`'
            echo '- Category capture: disabled'
            echo '- Twitch change: no'
          } >> "$GITHUB_STEP_SUMMARY"
