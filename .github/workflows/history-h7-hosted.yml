name: History H7 Hosted Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/docs/history-h7-acceptance.md'
      - 'apps/web/public/history-h7-candidate.json'
      - 'apps/web/scripts/history-h7-hosted-browser.mjs'
      - 'apps/web/src/live/history-usability-pass.ts'
      - 'docs/work-in-progress/history-layout-rebuild-working-note.md'
      - '.github/workflows/history-h7-hosted.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hosted-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HISTORY_H7_PREVIEW_URL: https://preview-history-h7.viewloom.pages.dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - name: Wait for configured Cloudflare Preview branch
        run: |
          getent ahosts preview-history-h7.viewloom.pages.dev | tee /tmp/history-h7-dns.txt || true
          for attempt in {1..18}; do
            status="$(curl --silent --show-error --output /tmp/history-h7-marker.json --write-out '%{http_code}' --max-time 20 "$HISTORY_H7_PREVIEW_URL/history-h7-candidate.json?qa=$GITHUB_SHA" 2>> /tmp/history-h7-curl.log || true)"
            if [ "$status" = "200" ] && grep -q '2026-06-23-h7-2' /tmp/history-h7-marker.json; then
              echo "H7 Preview marker is available at $HISTORY_H7_PREVIEW_URL"
              cat /tmp/history-h7-marker.json
              exit 0
            fi
            echo "Preview attempt $attempt returned HTTP $status or an older marker"
            sleep 10
          done
          echo "Configured Cloudflare Preview branch did not publish the H7 marker."
          cat /tmp/history-h7-dns.txt || true
          cat /tmp/history-h7-curl.log || true
          cat /tmp/history-h7-marker.json || true
          exit 1
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Verify hosted Twitch and Kick History with Preview bindings
        working-directory: apps/web
        env:
          HISTORY_H7_PREVIEW_URL: https://preview-history-h7.viewloom.pages.dev
          HISTORY_H7_ARTIFACT_DIR: artifacts/history-h7-hosted
        run: node scripts/history-h7-hosted-browser.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: history-h7-hosted-artifacts
          path: |
            apps/web/artifacts/history-h7-hosted/
            /tmp/history-h7-marker.json
            /tmp/history-h7-dns.txt
            /tmp/history-h7-curl.log
          if-no-files-found: warn
