name: Analytics 12A4 Category Read-Only Preflight Acceptance Retired

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/analytics-12a4-category-readonly-preflight-acceptance.yml'
      - 'docs/audits/12a4-category-readonly-preflight-acceptance-contract.json'
      - 'docs/audits/12a4-category-readonly-preflight-evidence.json'
      - 'docs/work-in-progress/phase12a4-category-readonly-preflight-acceptance.md'
      - 'scripts/verify-12a4-category-readonly-preflight-acceptance-package.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-12a4-category-readonly-preflight-acceptance-retired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-accepted-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify frozen accepted evidence
        run: node scripts/verify-12a4-category-readonly-preflight-acceptance-package.mjs

      - name: Publish retirement summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4 Read-Only Preflight Acceptance'
            echo
            echo '- Accepted evidence: frozen on main PR #523'
            echo '- Source workflow run: 29318733171'
            echo '- Acceptance workflow run: 29318857656'
            echo '- Exact source-run lookup: retired'
            echo '- Artifact download and re-acceptance job: removed'
            echo '- Production credentials: none'
            echo '- Remote migration: unauthorized'
            echo '- Runtime category capture: unauthorized'
          } >> "$GITHUB_STEP_SUMMARY"
