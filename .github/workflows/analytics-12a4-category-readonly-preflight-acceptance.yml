name: Analytics 12A4 Category Read-Only Preflight Acceptance

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/analytics-12a4-category-readonly-preflight-acceptance.yml'
      - 'docs/audits/12a4-category-readonly-preflight-acceptance-contract.json'
      - 'docs/work-in-progress/phase12a4-category-readonly-preflight-acceptance.md'
      - 'scripts/check-12a4-category-readonly-preflight-acceptance-scope.mjs'
      - 'scripts/verify-12a4-category-readonly-preflight-acceptance-package.mjs'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: analytics-12a4-category-readonly-preflight-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TRIGGER_SHA: 2e1e3ea3e338574840cb69182581505bcb6eacff
  SOURCE_WORKFLOW: analytics-12a4-category-readonly-preflight.yml
  SOURCE_ARTIFACT: phase12a4-category-readonly-preflight
  ARTIFACT_DIR: artifacts/12a4-category-readonly-preflight-acceptance
  RAW_DIR: artifacts/12a4-category-readonly-preflight-acceptance/raw

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify acceptance scope
        run: node scripts/check-12a4-category-readonly-preflight-acceptance-scope.mjs

      - name: Verify acceptance package
        run: node scripts/verify-12a4-category-readonly-preflight-acceptance-package.mjs

  production-acceptance:
    needs: contract
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'accept-analytics-12a4-category-readonly-preflight'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Locate exact trigger push run and artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RAW_DIR" "$ARTIFACT_DIR"
          run='null'
          for attempt in $(seq 1 60); do
            response=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/$GITHUB_REPOSITORY/actions/workflows/$SOURCE_WORKFLOW/runs?branch=main&event=push&per_page=100")
            run=$(jq --arg sha "$TRIGGER_SHA" '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.id) | last // null' <<<"$response")
            if [[ "$run" != 'null' && $(jq -r '.status' <<<"$run") == 'completed' ]]; then break; fi
            sleep 10
          done

          [[ "$run" != 'null' ]]
          [[ $(jq -r '.event' <<<"$run") == 'push' ]]
          [[ $(jq -r '.head_sha' <<<"$run") == "$TRIGGER_SHA" ]]
          [[ $(jq -r '.status' <<<"$run") == 'completed' ]]
          [[ $(jq -r '.conclusion' <<<"$run") == 'success' ]]

          run_id=$(jq -r '.id' <<<"$run")
          jobs=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")
          normalized_jobs=$(jq '[.jobs[] | {name, status, conclusion}]' <<<"$jobs")
          for required in contract production-preflight; do
            conclusion=$(jq -r --arg name "$required" '.[] | select(.name == $name) | .conclusion' <<<"$normalized_jobs")
            [[ "$conclusion" == 'success' ]]
          done

          artifacts=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100")
          artifact=$(jq --arg name "$SOURCE_ARTIFACT" '[.artifacts[] | select(.name == $name and .expired == false)] | sort_by(.id) | last // null' <<<"$artifacts")
          [[ "$artifact" != 'null' ]]
          artifact_id=$(jq -r '.id' <<<"$artifact")

          gh api "/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RAW_DIR/source.zip"
          unzip -q "$RAW_DIR/source.zip" -d "$RAW_DIR/source"
          evidence=$(find "$RAW_DIR/source" -type f -name 'evidence.json' -print -quit)
          [[ -n "$evidence" ]]
          cp "$evidence" "$RAW_DIR/source-evidence.json"

          jq -n \
            --arg workflow "$(jq -r '.name' <<<"$run")" \
            --arg event "$(jq -r '.event' <<<"$run")" \
            --argjson runId "$run_id" \
            --arg headSha "$(jq -r '.head_sha' <<<"$run")" \
            --arg runStartedAt "$(jq -r '.run_started_at' <<<"$run")" \
            --arg updatedAt "$(jq -r '.updated_at' <<<"$run")" \
            --argjson jobs "$normalized_jobs" \
            --argjson artifactId "$artifact_id" \
            '{workflow:$workflow,event:$event,runId:$runId,headSha:$headSha,runStartedAt:$runStartedAt,updatedAt:$updatedAt,jobs:$jobs,artifactId:$artifactId,gatePass:true}' \
            > "$RAW_DIR/run.json"

      - name: Verify source evidence and create accepted evidence
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-12a4-category-readonly-preflight-evidence.mjs \
            "$RAW_DIR/source-evidence.json" --require-pass

          jq --slurpfile run "$RAW_DIR/run.json" \
            '.status = "accepted" |
             .acceptanceIdentity = {
               triggerPr: 522,
               triggerMergeSha: "2e1e3ea3e338574840cb69182581505bcb6eacff",
               workflowRunId: $run[0].runId,
               artifactId: $run[0].artifactId
             } |
             .workflow = $run[0]' \
            "$RAW_DIR/source-evidence.json" > "$ARTIFACT_DIR/evidence.json"

          node scripts/verify-12a4-category-readonly-preflight-evidence.mjs \
            "$ARTIFACT_DIR/evidence.json" --require-pass

      - name: Remove source archive and raw metadata
        if: always()
        run: rm -rf "$RAW_DIR"

      - name: Upload accepted sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a4-category-readonly-preflight-acceptance
          path: artifacts/12a4-category-readonly-preflight-acceptance/evidence.json
          if-no-files-found: warn
