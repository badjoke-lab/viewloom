name: Release R12C0 Message Inventory

on:
  pull_request:
    paths:
      - 'docs/audits/r12c0-message-inventory.json'
      - 'docs/audits/r12c0-message-inventory.md'
      - 'scripts/verify-r12c0-message-inventory.mjs'
      - '.github/workflows/release-r12c0-message-inventory.yml'
      - 'docs/work-in-progress/phase12-release-readiness.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'README.md'
      - 'docs/README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-public-browser-audit-current.mjs'
      - 'docs/audits/public-surface-inventory.json'
      - 'scripts/verify-public-surface-inventory.mjs'

concurrency:
  group: release-r12c0-message-inventory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify R12C-0 message inventory
        run: node scripts/verify-r12c0-message-inventory.mjs
