name: Analytics 12A2 Remote Schema Production

on:
  workflow_dispatch:
    inputs:
      production_origin:
        description: Production origin
        required: false
        default: https://vl.badjoke-lab.com
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/analytics-12a2-remote-schema-production.yml'
      - 'scripts/collect-12a2-remote-schema-production-evidence.mjs'
      - 'scripts/verify-12a2-remote-schema-production-evidence.mjs'
      - 'docs/audits/12a2-remote-schema-production-evidence.json'
      - 'docs/operations/12a2-remote-schema-production-*.md'

concurrency:
  group: analytics-12a2-remote-schema-production-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VIEWLOOM_PRODUCTION_ORIGIN: ${{ inputs.production_origin || 'https://vl.badjoke-lab.com' }}
      ARTIFACT_DIR: artifacts/12a2-remote-schema
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Collect production remote schema evidence
        run: node scripts/collect-12a2-remote-schema-production-evidence.mjs "$ARTIFACT_DIR/evidence.json"

      - name: Verify production remote schema evidence
        run: node scripts/verify-12a2-remote-schema-production-evidence.mjs "$ARTIFACT_DIR/evidence.json"

      - name: Verify permanent evidence when present
        shell: bash
        run: |
          if [ -f docs/audits/12a2-remote-schema-production-evidence.json ]; then
            node scripts/verify-12a2-remote-schema-production-evidence.mjs docs/audits/12a2-remote-schema-production-evidence.json
          else
            echo 'Permanent remote schema evidence is not frozen yet; generated artifact is candidate evidence.'
          fi

      - name: Publish evidence summary
        if: always()
        shell: bash
        run: |
          if [ ! -f "$ARTIFACT_DIR/evidence.json" ]; then
            echo '## ViewLoom 12A-2 Remote Schema Evidence' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '- Production evidence was not produced.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo '## ViewLoom 12A-2 Remote Schema Evidence'
            echo
            echo "- Twitch schema complete: $(jq -r '.providers.twitch.schemaComplete' "$ARTIFACT_DIR/evidence.json")"
            echo "- Twitch observed objects: $(jq -r '.providers.twitch.observedObjectCount' "$ARTIFACT_DIR/evidence.json")/3"
            echo "- Kick schema complete: $(jq -r '.providers.kick.schemaComplete' "$ARTIFACT_DIR/evidence.json")"
            echo "- Kick observed objects: $(jq -r '.providers.kick.observedObjectCount' "$ARTIFACT_DIR/evidence.json")/3"
            echo "- Remote schema gate: $(jq -r '.gate.remoteSchemaGatePass' "$ARTIFACT_DIR/evidence.json")"
            echo "- Generation blockers: $(jq -r '.gate.blockers | join(", ")' "$ARTIFACT_DIR/evidence.json")"
            echo '- Probe writes: 0 required'
            echo '- Generation authorization: false'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production remote schema evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a2-remote-schema-production
          path: artifacts/12a2-remote-schema/evidence.json
          if-no-files-found: warn
