name: Web verification

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'

jobs:
  verify-web-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify production source
        working-directory: apps/web
        run: node scripts/verify-production-source.mjs
