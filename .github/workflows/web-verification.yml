name: Web verification

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'

jobs:
  verify-web-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify production source
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-production-source.mjs > source-gate.log 2>&1
          status=$?
          cat source-gate.log
          exit $status

      - name: Verify Heatmap QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-heatmap-qa.mjs > heatmap-qa.log 2>&1
          status=$?
          cat heatmap-qa.log
          exit $status

      - name: Verify Day Flow QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-dayflow-qa.mjs > dayflow-qa.log 2>&1
          status=$?
          cat dayflow-qa.log
          exit $status

      - name: Verify Battle Lines QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-battle-lines-qa.mjs > battle-lines-qa.log 2>&1
          status=$?
          cat battle-lines-qa.log
          exit $status

      - name: Verify History QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-history-qa.mjs > history-qa.log 2>&1
          status=$?
          cat history-qa.log
          exit $status

      - name: Verify Status QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-status-qa.mjs > status-qa.log 2>&1
          status=$?
          cat status-qa.log
          exit $status

      - name: Verify Home QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-home-qa.mjs > home-qa.log 2>&1
          status=$?
          cat home-qa.log
          exit $status

      - name: Verify Content QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-content-qa.mjs > content-qa.log 2>&1
          status=$?
          cat content-qa.log
          exit $status

      - name: Upload source gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-gate-log
          path: apps/web/source-gate.log

      - name: Upload Heatmap QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heatmap-qa-log
          path: apps/web/heatmap-qa.log

      - name: Upload Day Flow QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dayflow-qa-log
          path: apps/web/dayflow-qa.log

      - name: Upload Battle Lines QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: battle-lines-qa-log
          path: apps/web/battle-lines-qa.log

      - name: Upload History QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: history-qa-log
          path: apps/web/history-qa.log

      - name: Upload Status QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-qa-log
          path: apps/web/status-qa.log

      - name: Upload Home QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-qa-log
          path: apps/web/home-qa.log

      - name: Upload Content QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-qa-log
          path: apps/web/content-qa.log
