name: Web verification

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-verification.yml'

jobs:
  verify-web-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify production source
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-production-source.mjs > source-gate.log 2>&1
          status=$?
          cat source-gate.log
          exit $status

      - name: Verify Heatmap QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-heatmap-qa.mjs > heatmap-qa.log 2>&1
          status=$?
          cat heatmap-qa.log
          exit $status

      - name: Verify Day Flow QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-dayflow-qa.mjs > dayflow-qa.log 2>&1
          status=$?
          cat dayflow-qa.log
          exit $status

      - name: Verify Battle Lines QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-battle-lines-qa.mjs > battle-lines-qa.log 2>&1
          status=$?
          cat battle-lines-qa.log
          exit $status

      - name: Verify History QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-history-qa.mjs > history-qa.log 2>&1
          status=$?
          cat history-qa.log
          exit $status

      - name: Verify Status QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-status-qa.mjs > status-qa.log 2>&1
          status=$?
          cat status-qa.log
          exit $status

      - name: Verify Home QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-home-qa.mjs > home-qa.log 2>&1
          status=$?
          cat home-qa.log
          exit $status

      - name: Verify Changelog QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-changelog-qa.mjs > changelog-qa.log 2>&1
          status=$?
          cat changelog-qa.log
          exit $status

      - name: Verify Content QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-content-qa.mjs > content-qa.log 2>&1
          status=$?
          cat content-qa.log
          exit $status

      - name: Verify SEO QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-seo-qa.mjs > seo-qa.log 2>&1
          status=$?
          cat seo-qa.log
          exit $status

      - name: Verify Mobile QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-mobile-qa.mjs > mobile-qa.log 2>&1
          status=$?
          cat mobile-qa.log
          exit $status

      - name: Verify State QA contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-state-qa.mjs > state-qa.log 2>&1
          status=$?
          cat state-qa.log
          exit $status

      - name: Verify Launch Readiness contract
        working-directory: apps/web
        shell: bash
        run: |
          set +e
          node scripts/verify-launch-readiness.mjs > launch-readiness.log 2>&1
          status=$?
          cat launch-readiness.log
          exit $status

      - name: Upload web verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-verification-logs
          path: |
            apps/web/source-gate.log
            apps/web/heatmap-qa.log
            apps/web/dayflow-qa.log
            apps/web/battle-lines-qa.log
            apps/web/history-qa.log
            apps/web/status-qa.log
            apps/web/home-qa.log
            apps/web/changelog-qa.log
            apps/web/content-qa.log
            apps/web/seo-qa.log
            apps/web/mobile-qa.log
            apps/web/state-qa.log
            apps/web/launch-readiness.log
