name: U10G Mobile Layout Fix

on:
  pull_request:
    paths:
      - '.github/workflows/u10g-mobile-layout-fix.yml'

permissions:
  contents: write

concurrency:
  group: u10g-mobile-layout-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.head_ref == 'work-quality-u10g-architecture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Preserve requested layout across responsive fallback
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/src/live/battle-lines-current-shell-entry.ts')
          source = path.read_text()
          before = """  window.addEventListener('resize', () => {
    if (state.layout === 'split' && !canUseBattleLinesSplit()) {
      state.layout = 'wide'
      state.layoutInUrl = true
      syncUrl()
    }
    syncControls()
    renderBattleLinesSplitRail()
  })"""
          after = """  window.addEventListener('resize', () => {
    syncControls()
    renderBattleLinesSplitRail()
  })"""
          if before in source:
              path.write_text(source.replace(before, after))
          elif after not in source:
              raise SystemExit('Expected Battle Lines resize ownership block was not found.')
          PY
          git diff --check
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Preserve Battle Lines requested layout
          file_pattern: apps/web/src/live/battle-lines-current-shell-entry.ts
