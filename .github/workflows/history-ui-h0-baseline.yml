name: History UI P9H0 Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/audits/history-ui-h0-*'
      - 'docs/audits/public-browser-defects.json'
      - 'scripts/verify-history-ui-h0-baseline.mjs'
      - '.github/workflows/history-ui-h0-baseline.yml'
      - 'scripts/verify-development-policy.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify completed P9H0 evidence contract
        run: node scripts/verify-history-ui-h0-baseline.mjs
