name: History UI P9H0 Baseline

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'docs/audits/history-ui-h0-*'
      - 'docs/audits/public-browser-defects.json'
      - 'apps/web/scripts/history-ui-h0-*.mjs'
      - 'apps/web/src/live/history-*.ts'
      - 'apps/web/src/history-*.css'
      - 'scripts/verify-history-ui-h0-baseline.mjs'
      - '.github/workflows/history-ui-h0-baseline.yml'
      - 'scripts/verify-development-policy.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      HISTORY_H0_BASE_URL: http://127.0.0.1:4173
      HISTORY_H0_ARTIFACT_DIR: /tmp/history-ui-h0
      GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify P9H0 repository contract
        run: node scripts/verify-history-ui-h0-baseline.mjs

      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app

      - name: Build web application
        run: pnpm build:web

      - name: Start local preview
        shell: bash
        run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/history-ui-h0-preview.log 2>&1 &
          for attempt in {1..50}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/history/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/kick/history/ > /dev/null \
              && exit 0
            sleep 1
          done
          cat /tmp/history-ui-h0-preview.log
          exit 1

      - name: Install Playwright
        working-directory: apps/web
        run: npm install playwright@1.52.0 --no-save --no-audit --no-fund

      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Prepare deterministic P9H0 baseline
        working-directory: apps/web
        run: node scripts/prepare-history-ui-h0-baseline.mjs

      - name: Run P9H0 browser baseline
        working-directory: apps/web
        run: node scripts/history-ui-h0-browser.mjs

      - name: Verify P9H0 evidence
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict'
          import { readFileSync } from 'node:fs'
          const evidence = JSON.parse(readFileSync('/tmp/history-ui-h0/history-ui-h0-evidence.json', 'utf8'))
          assert.equal(evidence.schema, 'viewloom-history-ui-h0-baseline-v1')
          assert.equal(evidence.phase, 'P9H0')
          assert.equal(evidence.result, 'pass')
          assert.equal(evidence.scenarios.length, 6)
          assert.deepEqual(evidence.observedFailures, [...evidence.expectedFailures].sort())
          assert.deepEqual(evidence.expectedFailures, [
            'history-metric-ranking-context-stale',
            'history-metric-summary-stale',
            'history-mobile-task-flow-too-long',
            'history-selected-day-context-stale',
          ])
          const keyboard = evidence.scenarios.filter((item) => item.id.includes('-keyboard-'))
          assert.equal(keyboard.length, 2)
          assert.ok(keyboard.every((item) => item.focus.moved))
          console.log(JSON.stringify({ result: evidence.result, failures: evidence.observedFailures, keyboard: keyboard.map((item) => item.focus) }, null, 2))
          NODE

      - name: Upload P9H0 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: history-ui-h0-baseline
          path: |
            /tmp/history-ui-h0/**
            /tmp/history-ui-h0-preview.log
          if-no-files-found: warn
