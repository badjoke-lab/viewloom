name: Analytics 12A4 Category Storage Design

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/audits/12a4-category-storage-design-contract.json'
      - 'docs/audits/12a4-category-storage-budget-evidence.json'
      - 'docs/operations/12a4-category-storage-design-acceptance-*.md'
      - 'docs/work-in-progress/phase12a4-category-storage-design.md'
      - 'scripts/measure-12a4-category-storage-models.py'
      - 'scripts/verify-12a4-category-storage-evidence.mjs'
      - 'scripts/verify-12a4-category-storage-design.mjs'
      - 'scripts/check-12a4-category-storage-design-scope.mjs'
      - '.github/workflows/analytics-12a4-category-storage-design.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-12a4-category-storage-design-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify design-only branch scope
        run: node scripts/check-12a4-category-storage-design-scope.mjs

      - name: Verify category storage design contract
        run: node scripts/verify-12a4-category-storage-design.mjs

      - name: Run deterministic category storage benchmark
        run: |
          python scripts/measure-12a4-category-storage-models.py \
            --output artifacts/12a4-category-storage/evidence.json

      - name: Verify generated category storage evidence
        run: node scripts/verify-12a4-category-storage-evidence.mjs artifacts/12a4-category-storage/evidence.json

      - name: Verify permanent accepted evidence when present
        run: |
          if [ -f docs/audits/12a4-category-storage-budget-evidence.json ]; then
            node scripts/verify-12a4-category-storage-evidence.mjs docs/audits/12a4-category-storage-budget-evidence.json
          else
            echo 'Permanent category storage evidence is not frozen yet.'
          fi

      - name: Publish category storage summary
        run: |
          evidence=artifacts/12a4-category-storage/evidence.json
          {
            echo '## ViewLoom 12A-4 Category Storage Design'
            echo
            echo "- Selected model: $(jq -r '.selectedDesign.model' "$evidence")"
            echo "- Twitch projected total / headroom: $(jq -r '.providers.twitch.projectedSizeMbWithCategorySafety' "$evidence") / $(jq -r '.providers.twitch.projectedHeadroomMb' "$evidence") MB"
            echo "- Kick projected total / headroom: $(jq -r '.providers.kick.projectedSizeMbWithCategorySafety' "$evidence") / $(jq -r '.providers.kick.projectedHeadroomMb' "$evidence") MB"
            echo "- Account projected total / headroom: $(jq -r '.account.projectedSizeMbWithCategorySafety' "$evidence") / $(jq -r '.account.projectedHeadroomMb' "$evidence") MB"
            echo "- Category storage design pass: $(jq -r '.gate.categoryStorageDesignPass' "$evidence")"
            echo '- Migration authorized: no'
            echo '- Runtime capture authorized: no'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload category storage evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase12a4-category-storage-design
          path: artifacts/12a4-category-storage/evidence.json
          if-no-files-found: error
