name: Kick coverage checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/functions/_kick-coverage.ts'
      - 'apps/web/functions/_kick-feature-coverage.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/_home/kick.ts'
      - 'apps/web/functions/api/kick-home.ts'
      - 'apps/web/functions/api/kick-status.ts'
      - 'apps/web/functions/api/kick-history.ts'
      - 'apps/web/docs/kick-feature-coverage-contract.md'
      - 'apps/web/scripts/verify-kick-coverage-contract-v2.mjs'
      - 'apps/web/scripts/verify-kick-feature-coverage.mjs'
      - 'apps/web/scripts/verify-kick-feature-coverage-doc.mjs'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/kick-coverage-checks.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/functions/_kick-coverage.ts'
      - 'apps/web/functions/_kick-feature-coverage.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/_home/kick.ts'
      - 'apps/web/functions/api/kick-home.ts'
      - 'apps/web/functions/api/kick-status.ts'
      - 'apps/web/functions/api/kick-history.ts'
      - 'apps/web/docs/kick-feature-coverage-contract.md'
      - 'apps/web/scripts/verify-kick-coverage-contract-v2.mjs'
      - 'apps/web/scripts/verify-kick-feature-coverage.mjs'
      - 'apps/web/scripts/verify-kick-feature-coverage-doc.mjs'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/kick-coverage-checks.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm --filter @viewloom/web typecheck:functions
      - run: node scripts/verify-kick-coverage-contract-v2.mjs
        working-directory: apps/web
      - run: node scripts/verify-kick-feature-coverage.mjs
        working-directory: apps/web
      - run: node scripts/verify-kick-feature-coverage-doc.mjs
        working-directory: apps/web
