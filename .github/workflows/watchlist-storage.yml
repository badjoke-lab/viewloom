name: Watchlist Storage

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/live/watchlist/**'
      - 'apps/web/scripts/verify-watchlist-storage.mjs'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - '.github/workflows/watchlist-storage.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/live/watchlist/**'
      - 'apps/web/scripts/verify-watchlist-storage.mjs'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - '.github/workflows/watchlist-storage.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app
      - name: Verify Watchlist storage contract
        working-directory: apps/web
        run: node scripts/verify-watchlist-storage.mjs
