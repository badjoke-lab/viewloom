name: Analytics 12A4 Twitch Permanent Category Release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-twitch-permanent-category-release.yml'
      - 'docs/audits/12a4-twitch-permanent-category-release-contract.json'
      - 'docs/audits/12a4-twitch-permanent-category-release-trigger.json'
      - 'docs/work-in-progress/phase12a4-twitch-permanent-category-capture.md'
      - 'scripts/check-12a4-twitch-permanent-category-release-scope.mjs'
      - 'scripts/inspect-12a4-twitch-permanent-category-release-trigger.mjs'
      - 'scripts/run-12a4-twitch-permanent-category-observer.mjs'
      - 'scripts/run-12a4-twitch-permanent-category-release.mjs'
      - 'scripts/test-12a4-twitch-permanent-category-release.mjs'
      - 'scripts/verify-12a4-twitch-permanent-category-release-package.mjs'
      - 'scripts/verify-12a4-twitch-permanent-category-release-trigger.mjs'
      - 'scripts/verify-category-rollout-policy.mjs'
      - 'scripts/wait-12a4-twitch-permanent-category-release-start.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-twitch-permanent-category-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify dormant release package scope
        run: node scripts/check-12a4-twitch-permanent-category-release-scope.mjs
      - name: Run release package fixtures
        run: node scripts/test-12a4-twitch-permanent-category-release.mjs
      - name: Verify release package contract
        run: node scripts/verify-12a4-twitch-permanent-category-release-package.mjs
      - name: Verify current category rollout policy
        run: node scripts/verify-category-rollout-policy.mjs
      - name: Verify collector typecheck
        run: pnpm typecheck:collectors
      - name: Bundle normal Twitch collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-twitch/wrangler.toml
      - name: Bundle permanent Twitch collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-twitch/wrangler.category-permanent.toml
      - name: Publish validation summary
        run: |
          {
            echo '## ViewLoom 12A-4-21 Twitch release package'
            echo
            echo '- Exact release request included in package PR: no'
            echo '- Production change from pull request: no'
            echo '- Fresh read-only preflight before release: required'
            echo '- Two consecutive category-bearing snapshots: required'
            echo '- Normal config restoration path: required'
            echo '- Kick change: no'
            echo '- New Worker cron: no'
          } >> "$GITHUB_STEP_SUMMARY"
