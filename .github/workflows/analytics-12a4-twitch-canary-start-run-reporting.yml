name: Analytics 12A4 Twitch Canary Run Reporting

on:
  workflow_run:
    workflows:
      - Analytics 12A4 Twitch Category Capture Canary Execution
    types:
      - completed
  push:
    branches: [main]
    paths:
      - 'docs/audits/12a4-twitch-category-capture-canary-run-report-request.json'

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  locate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REQUEST_PATH: docs/audits/12a4-twitch-category-capture-canary-run-report-request.json
    steps:
      - uses: actions/checkout@v4
      - name: Locate exact execution run
        shell: bash
        run: |
          source_sha=$(jq -r '.sourceSha' "$REQUEST_PATH")
          attempt=$(jq -r '.attempt' "$REQUEST_PATH")
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/analytics-12a4-twitch-category-capture-canary-execution.yml/runs?branch=main&per_page=20" > /tmp/viewloom-twitch-runs.json
          jq --arg sha "$source_sha" '.workflow_runs | map(select(.head_sha == $sha)) | .[0] // empty' /tmp/viewloom-twitch-runs.json > /tmp/viewloom-twitch-run.json
          run_id=$(jq -r '.id // empty' /tmp/viewloom-twitch-run.json)
          test -n "$run_id"
          {
            echo '## Twitch category canary execution run located'
            echo
            echo "- Workflow run: $run_id"
            echo "- Trigger attempt: $attempt"
            echo "- Status: $(jq -r '.status' /tmp/viewloom-twitch-run.json)"
            echo "- Conclusion: $(jq -r '.conclusion // "pending"' /tmp/viewloom-twitch-run.json)"
            echo "- Source event: $(jq -r '.event' /tmp/viewloom-twitch-run.json)"
            echo "- Source SHA: $(jq -r '.head_sha' /tmp/viewloom-twitch-run.json)"
            echo "- Created at: $(jq -r '.created_at' /tmp/viewloom-twitch-run.json)"
            echo "- Updated at: $(jq -r '.updated_at' /tmp/viewloom-twitch-run.json)"
            echo "- Run URL: $(jq -r '.html_url' /tmp/viewloom-twitch-run.json)"
            echo '- Provider: Twitch only'
            echo '- Fresh read-only preflight required before deploy: yes'
            echo '- Permanent category enablement: not authorized'
            echo '- Kick start: not authorized'
          } > /tmp/viewloom-twitch-run-located.md
          gh issue comment 519 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-run-located.md
          gh pr comment 606 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-run-located.md

  report:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      SOURCE_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_EVENT: ${{ github.event.workflow_run.event }}
      SOURCE_URL: ${{ github.event.workflow_run.html_url }}
    steps:
      - name: Collect artifact metadata
        shell: bash
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[] | "- Artifact: \(.id) / \(.name) / \(.size_in_bytes) bytes / expired=\(.expired)"' \
            > /tmp/viewloom-twitch-run-artifacts.md
      - name: Report exact run to Issue 519
        shell: bash
        run: |
          {
            echo '## Twitch category canary execution workflow completed'
            echo
            echo "- Workflow run: $SOURCE_RUN_ID"
            echo "- Run attempt: $SOURCE_RUN_ATTEMPT"
            echo "- Conclusion: $SOURCE_RUN_CONCLUSION"
            echo "- Source event: $SOURCE_EVENT"
            echo "- Source SHA: $SOURCE_HEAD_SHA"
            echo "- Run URL: $SOURCE_URL"
            echo '- Provider: Twitch only'
            echo '- Permanent category enablement: not authorized'
            echo '- Kick start: not authorized'
            echo
            cat /tmp/viewloom-twitch-run-artifacts.md
          } > /tmp/viewloom-twitch-run-report.md
          gh issue comment 519 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-run-report.md
          gh pr comment 606 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-run-report.md
