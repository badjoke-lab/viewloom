name: Analytics 12A4 Category Schema Recovery Audit Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/analytics-12a4-category-schema-recovery-audit-acceptance.yml'
      - 'docs/audits/12a4-category-schema-recovery-audit-acceptance-contract.json'
      - 'docs/audits/12a4-category-schema-recovery-audit-evidence.json'
      - 'docs/work-in-progress/phase12a4-category-schema-recovery-audit-acceptance.md'
      - 'scripts/check-12a4-category-schema-recovery-audit-acceptance-scope.mjs'
      - 'scripts/verify-12a4-category-schema-recovery-audit-acceptance-package.mjs'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: analytics-12a4-category-schema-recovery-audit-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TRIGGER_SHA: b04c01e688123cb4d2f96bd2cb16c66a0a8c8d58
  SOURCE_WORKFLOW: analytics-12a4-category-schema-recovery-audit.yml
  SOURCE_ARTIFACT: phase12a4-category-schema-recovery-audit
  ARTIFACT_DIR: artifacts/12a4-category-schema-recovery-audit-acceptance
  RAW_DIR: artifacts/12a4-category-schema-recovery-audit-acceptance/raw

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify acceptance scope
        run: node scripts/check-12a4-category-schema-recovery-audit-acceptance-scope.mjs
      - name: Verify acceptance package
        run: node scripts/verify-12a4-category-schema-recovery-audit-acceptance-package.mjs

  production-acceptance:
    needs: contract
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'accept-analytics-12a4-category-schema-recovery-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Locate exact trigger push run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RAW_DIR" "$ARTIFACT_DIR"
          run='null'
          for attempt in $(seq 1 180); do
            response=$(gh api -H 'Accept: application/vnd.github+json' "/repos/$GITHUB_REPOSITORY/actions/workflows/$SOURCE_WORKFLOW/runs?branch=main&event=push&per_page=100")
            run=$(jq --arg sha "$TRIGGER_SHA" '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.id) | last // null' <<<"$response")
            if [[ "$run" != 'null' && $(jq -r '.status' <<<"$run") == 'completed' ]]; then break; fi
            sleep 10
          done
          [[ "$run" != 'null' ]] || { echo '::error::Exact trigger push run was not found.'; exit 1; }
          run_id=$(jq -r '.id' <<<"$run")
          run_event=$(jq -r '.event' <<<"$run")
          run_head_sha=$(jq -r '.head_sha' <<<"$run")
          run_status=$(jq -r '.status' <<<"$run")
          run_conclusion=$(jq -r '.conclusion' <<<"$run")
          [[ "$run_event" == 'push' ]]
          [[ "$run_head_sha" == "$TRIGGER_SHA" ]]
          [[ "$run_status" == 'completed' ]]
          jobs=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")
          normalized_jobs=$(jq '[.jobs[] | {id,name,status,conclusion}]' <<<"$jobs")
          jq -n --arg workflow "$(jq -r '.name' <<<"$run")" --arg event "$run_event" --argjson runId "$run_id" --arg headSha "$run_head_sha" --arg status "$run_status" --arg conclusion "$run_conclusion" --argjson jobs "$normalized_jobs" \
            '{workflow:$workflow,event:$event,runId:$runId,headSha:$headSha,status:$status,conclusion:$conclusion,jobs:$jobs}' > "$RAW_DIR/run-base.json"
      - name: Download sanitized source artifact
        shell: bash
        run: |
          set -euo pipefail
          run_id=$(jq -r '.runId' "$RAW_DIR/run-base.json")
          artifacts=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100")
          artifact=$(jq --arg name "$SOURCE_ARTIFACT" '[.artifacts[] | select(.name == $name and .expired == false)] | sort_by(.id) | last // null' <<<"$artifacts")
          [[ "$artifact" != 'null' ]] || { echo "::error::Artifact $SOURCE_ARTIFACT not found"; exit 1; }
          artifact_id=$(jq -r '.id' <<<"$artifact")
          gh api "/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$RAW_DIR/source.zip"
          unzip -q "$RAW_DIR/source.zip" -d "$RAW_DIR/source"
          evidence=$(find "$RAW_DIR/source" -type f -name 'evidence.json' -print -quit)
          [[ -n "$evidence" ]] || { echo '::error::evidence.json missing'; exit 1; }
          cp "$evidence" "$RAW_DIR/source-evidence.json"
          jq --argjson artifactId "$artifact_id" '. + {artifactId:$artifactId}' "$RAW_DIR/run-base.json" > "$RAW_DIR/run.json"
      - name: Normalize accepted audit evidence
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-12a4-category-schema-recovery-audit-evidence.mjs "$RAW_DIR/source-evidence.json"
          run_conclusion=$(jq -r '.conclusion' "$RAW_DIR/run.json")
          source_pass=$(jq -r '.gate.recoveryAuditPass // false' "$RAW_DIR/source-evidence.json")
          final_status='observed_failure'
          if [[ "$run_conclusion" == 'success' && "$source_pass" == 'true' ]]; then final_status='accepted'; fi
          jq --arg status "$final_status" --slurpfile run "$RAW_DIR/run.json" \
            '.status = $status |
             .acceptanceIdentity = {triggerPr:536,triggerMergeSha:"b04c01e688123cb4d2f96bd2cb16c66a0a8c8d58",workflowRunId:$run[0].runId,artifactId:$run[0].artifactId} |
             .workflow = $run[0]' "$RAW_DIR/source-evidence.json" > "$ARTIFACT_DIR/evidence.json"
          node scripts/verify-12a4-category-schema-recovery-audit-evidence.mjs "$ARTIFACT_DIR/evidence.json"
      - name: Remove source archive and metadata
        if: always()
        run: rm -rf "$RAW_DIR"
      - name: Upload sanitized acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a4-category-schema-recovery-audit-acceptance
          path: artifacts/12a4-category-schema-recovery-audit-acceptance/evidence.json
          if-no-files-found: error
      - name: Enforce source run and audit acceptance
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$ARTIFACT_DIR/evidence.json"
          [[ -f "$evidence" ]]
          [[ $(jq -r '.workflow.conclusion' "$evidence") == 'success' ]]
          for required in contract production-recovery-audit; do
            conclusion=$(jq -r --arg name "$required" '[.workflow.jobs[] | select(.name == $name)] | last | .conclusion // "missing"' "$evidence")
            [[ "$conclusion" == 'success' ]]
          done
          node scripts/verify-12a4-category-schema-recovery-audit-evidence.mjs "$evidence" --require-pass
