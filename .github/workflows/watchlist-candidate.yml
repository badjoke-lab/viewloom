name: Watchlist Candidate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/watchlist-candidate*.css'
      - 'apps/web/src/live/watchlist-move-focus.ts'
      - 'apps/web/scripts/watchlist-candidate-*.mjs'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - 'docs/README.md'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/watchlist-candidate.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/watchlist-candidate*.css'
      - 'apps/web/src/live/watchlist-move-focus.ts'
      - 'apps/web/scripts/watchlist-candidate-*.mjs'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - 'docs/README.md'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/watchlist-candidate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app
      - name: Verify Watchlist contracts
        working-directory: apps/web
        run: |
          node scripts/verify-watchlist-page.mjs
          node scripts/verify-watchlist-history.mjs
      - name: Build web application
        run: pnpm build:web
      - name: Start local preview
        shell: bash
        run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/watchlist-candidate-preview.log 2>&1 &
          for attempt in {1..40}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/watchlist/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/kick/watchlist/ > /dev/null \
              && exit 0
            sleep 1
          done
          cat /tmp/watchlist-candidate-preview.log
          exit 1
      - name: Install Playwright
        working-directory: apps/web
        run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Verify desktop and tablet candidate
        working-directory: apps/web
        env:
          WATCHLIST_BASE_URL: http://127.0.0.1:4173
        shell: bash
        run: |
          set -o pipefail
          node scripts/watchlist-candidate-desktop.mjs 2>&1 | tee -a /tmp/watchlist-candidate.log
      - name: Verify mobile candidate
        working-directory: apps/web
        env:
          WATCHLIST_BASE_URL: http://127.0.0.1:4173
        shell: bash
        run: |
          set -o pipefail
          node scripts/watchlist-candidate-mobile.mjs 2>&1 | tee -a /tmp/watchlist-candidate.log
      - name: Upload candidate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-candidate-artifacts
          path: |
            /tmp/watchlist-candidate-twitch-desktop-1440.png
            /tmp/watchlist-candidate-twitch-tablet-820.png
            /tmp/watchlist-candidate-twitch-mobile-390-mixed.png
            /tmp/watchlist-candidate-kick-desktop-1440-partial.png
            /tmp/watchlist-candidate-kick-mobile-390-empty.png
            /tmp/watchlist-candidate-kick-mobile-360-storage-error.png
            /tmp/watchlist-candidate-kick-mobile-360-long-content.png
            /tmp/watchlist-candidate.log
            /tmp/watchlist-candidate-preview.log
          if-no-files-found: warn
