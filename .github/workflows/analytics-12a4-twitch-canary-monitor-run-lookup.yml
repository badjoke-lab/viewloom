name: Analytics 12A4 Twitch Canary Monitor Run Lookup

on:
  push:
    branches: [main]
    paths:
      - 'docs/audits/12a4-twitch-category-capture-canary-monitor-run-report-request.json'

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REQUEST_PATH: docs/audits/12a4-twitch-category-capture-canary-monitor-run-report-request.json
    steps:
      - uses: actions/checkout@v4
      - name: Locate first attempt 3 schedule run
        shell: bash
        run: |
          set -euo pipefail
          attempt=$(jq -r '.attempt' "$REQUEST_PATH")
          requested_after=$(jq -r '.requestedAfter' "$REQUEST_PATH")
          test "$attempt" = '3'
          test "$(jq -r '.readOnlyActionsMetadata' "$REQUEST_PATH")" = 'true'
          test "$(jq -r '.productionMutationAuthorized' "$REQUEST_PATH")" = 'false'

          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/analytics-12a4-twitch-category-capture-canary-execution.yml/runs?branch=main&event=schedule&per_page=30" > /tmp/viewloom-twitch-schedule-runs.json
          jq --arg after "$requested_after" '
            .workflow_runs
            | map(select(.created_at >= $after))
            | sort_by(.created_at)
            | .[0] // empty
          ' /tmp/viewloom-twitch-schedule-runs.json > /tmp/viewloom-twitch-monitor-run.json

          run_id=$(jq -r '.id // empty' /tmp/viewloom-twitch-monitor-run.json)
          test -n "$run_id"

          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?filter=latest&per_page=100" > /tmp/viewloom-twitch-monitor-jobs.json
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100" > /tmp/viewloom-twitch-monitor-artifacts.json

          jq '.jobs | map(select(.name == "monitor-or-finalize")) | .[0] // empty' /tmp/viewloom-twitch-monitor-jobs.json > /tmp/viewloom-twitch-monitor-job.json
          job_id=$(jq -r '.id // empty' /tmp/viewloom-twitch-monitor-job.json)
          test -n "$job_id"

          {
            echo '## Twitch category canary attempt 3 first monitor run located'
            echo
            echo "- Workflow run: $run_id"
            echo "- Monitor job: $job_id"
            echo "- Trigger attempt: $attempt"
            echo "- Run status: $(jq -r '.status' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Run conclusion: $(jq -r '.conclusion // "pending"' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Job status: $(jq -r '.status' /tmp/viewloom-twitch-monitor-job.json)"
            echo "- Job conclusion: $(jq -r '.conclusion // "pending"' /tmp/viewloom-twitch-monitor-job.json)"
            echo "- Source event: $(jq -r '.event' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Source SHA: $(jq -r '.head_sha' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Created at: $(jq -r '.created_at' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Updated at: $(jq -r '.updated_at' /tmp/viewloom-twitch-monitor-run.json)"
            echo "- Run URL: $(jq -r '.html_url' /tmp/viewloom-twitch-monitor-run.json)"
            echo '- Provider: Twitch only'
            echo '- Permanent category enablement: not authorized'
            echo '- Kick start: not authorized'
            echo
            jq -r '.artifacts[] | "- Artifact: \(.id) / \(.name) / \(.size_in_bytes) bytes / expired=\(.expired)"' /tmp/viewloom-twitch-monitor-artifacts.json
          } > /tmp/viewloom-twitch-monitor-run-located.md

          gh issue comment 519 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-monitor-run-located.md
          gh pr comment 616 --repo "$GITHUB_REPOSITORY" --body-file /tmp/viewloom-twitch-monitor-run-located.md
