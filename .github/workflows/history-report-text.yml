name: History Report Text

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/docs/history-report-text-contract.md'
      - 'apps/web/src/history-report-text.css'
      - 'apps/web/src/live/history-report-text*.ts'
      - 'apps/web/src/live/history-report-social.ts'
      - 'apps/web/src/live/history-default-day.ts'
      - 'apps/web/scripts/verify-history-report-text.mjs'
      - 'apps/web/scripts/history-report-text-browser.mjs'
      - '.github/workflows/history-report-*.yml'
      - 'scripts/verify-development-policy.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck History report text
        run: |
          set -o pipefail
          pnpm --filter @viewloom/web typecheck 2>&1 | tee /tmp/history-report-typecheck.log
      - name: Verify History report text contract
        working-directory: apps/web
        run: node scripts/verify-history-report-text.mjs
      - run: pnpm build:web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: history-report-typecheck-diagnostics
          path: /tmp/history-report-typecheck.log
          if-no-files-found: warn
