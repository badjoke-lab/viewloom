name: Release Phase12 Production Closeout

on:
  pull_request:
    paths:
      - 'docs/audits/phase12-production-closeout-contract.json'
      - 'docs/audits/phase12-release-acceptance.json'
      - 'scripts/run-phase12-production-closeout.mjs'
      - 'scripts/verify-phase12-release-acceptance.mjs'
      - '.github/workflows/release-phase12-production-closeout.yml'
      - 'docs/operations/phase12-release-acceptance-2026-07-09.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'README.md'
      - 'docs/README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-public-browser-audit-current.mjs'

permissions:
  contents: write

concurrency:
  group: release-phase12-production-closeout-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PHASE12_CLOSEOUT_ARTIFACT_DIR: artifacts/phase12-production-closeout
    steps:
      - name: Checkout closeout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect permanent release evidence
        id: evidence
        shell: bash
        run: |
          if [[ -f docs/audits/phase12-release-acceptance.json ]]; then
            echo 'exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'exists=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Run exact-SHA hosted production closeout
        if: steps.evidence.outputs.exists != 'true'
        run: node scripts/run-phase12-production-closeout.mjs

      - name: Verify permanent Phase 12 release acceptance
        run: node scripts/verify-phase12-release-acceptance.mjs

      - name: Commit permanent release evidence
        if: steps.evidence.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/audits/phase12-release-acceptance.json
          if git diff --cached --quiet; then
            echo 'Permanent release evidence already matches the branch.'
          else
            git commit -m 'Persist Phase 12 production release acceptance'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Upload production closeout artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-production-closeout
          path: |
            artifacts/phase12-production-closeout/**
            docs/audits/phase12-release-acceptance.json
          if-no-files-found: warn
