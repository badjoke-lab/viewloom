name: Twitch feature coverage checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/functions/_provider-runtime.ts'
      - 'apps/web/functions/_twitch-coverage.ts'
      - 'apps/web/functions/_twitch-feature-coverage.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/api/twitch-heatmap.ts'
      - 'apps/web/functions/api/day-flow.ts'
      - 'apps/web/functions/api/battle-lines.ts'
      - 'apps/web/functions/_lib/battle-lines-core.ts'
      - 'apps/web/functions/api/history.ts'
      - 'apps/web/functions/_history/model.ts'
      - 'apps/web/docs/twitch-feature-coverage-audit.md'
      - 'apps/web/scripts/verify-twitch-feature-coverage-audit.mjs'
      - '.github/workflows/twitch-feature-coverage-audit.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/functions/_provider-runtime.ts'
      - 'apps/web/functions/_twitch-coverage.ts'
      - 'apps/web/functions/_twitch-feature-coverage.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/api/twitch-heatmap.ts'
      - 'apps/web/functions/api/day-flow.ts'
      - 'apps/web/functions/api/battle-lines.ts'
      - 'apps/web/functions/_lib/battle-lines-core.ts'
      - 'apps/web/functions/api/history.ts'
      - 'apps/web/functions/_history/model.ts'
      - 'apps/web/docs/twitch-feature-coverage-audit.md'
      - 'apps/web/scripts/verify-twitch-feature-coverage-audit.mjs'
      - '.github/workflows/twitch-feature-coverage-audit.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @viewloom/web typecheck:functions
      - run: node scripts/verify-twitch-feature-coverage-audit.mjs
        working-directory: apps/web
