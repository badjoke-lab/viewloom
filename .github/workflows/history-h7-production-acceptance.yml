name: History H7 Production Acceptance

on:
  pull_request:
    paths:
      - '.github/workflows/history-h7-production-acceptance.yml'

permissions:
  contents: read

concurrency:
  group: history-h7-production-acceptance
  cancel-in-progress: true

jobs:
  production-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ORIGIN: https://vl.badjoke-lab.com
      EXPECTED_PRODUCTION_SHA: 3cde59cceb09a0c60f48794d6391cf5c356a1b31
      ARTIFACT_DIR: artifacts/history-h7-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Wait for accepted main deployment
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          for attempt in {1..60}; do
            if curl --silent --show-error --fail --max-time 20 "$ORIGIN/deployment.json?attempt=$attempt" -o "$ARTIFACT_DIR/deployment.json"; then
              deployed="$(jq -r '.commit_sha // empty' "$ARTIFACT_DIR/deployment.json")"
              environment="$(jq -r '.environment // empty' "$ARTIFACT_DIR/deployment.json")"
              branch="$(jq -r '.branch // empty' "$ARTIFACT_DIR/deployment.json")"
              if [ "$deployed" = "$EXPECTED_PRODUCTION_SHA" ] && [ "$environment" = "production" ] && [ "$branch" = "main" ]; then
                cat "$ARTIFACT_DIR/deployment.json"
                exit 0
              fi
              echo "Production found $deployed, waiting for $EXPECTED_PRODUCTION_SHA ($attempt/60)."
            fi
            sleep 10
          done
          exit 1
      - name: Verify production-only boundaries
        run: |
          set -euo pipefail
          marker_code="$(curl --silent --show-error --max-time 30 --output "$ARTIFACT_DIR/history-h7-marker-response.html" --write-out '%{http_code}' "$ORIGIN/history-h7-candidate.json")"
          test "$marker_code" = '404'
          grep -q 'data-viewloom-not-found="v1"' "$ARTIFACT_DIR/history-h7-marker-response.html"
          for route in /twitch/history/ /kick/history/; do
            name="$(echo "$route" | tr '/' '-' | sed 's/^-//;s/-$//')"
            code="$(curl --silent --show-error --location --max-time 30 --output "$ARTIFACT_DIR/$name.html" --write-out '%{http_code}' "$ORIGIN$route")"
            test "$code" = '200'
            grep -qi 'ViewLoom' "$ARTIFACT_DIR/$name.html"
          done
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Verify public Twitch and Kick History
        working-directory: apps/web
        env:
          HISTORY_H7_PREVIEW_URL: https://vl.badjoke-lab.com
          HISTORY_H7_ARTIFACT_DIR: artifacts/history-h7-production
        run: node scripts/history-h7-hosted-browser.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: history-h7-production-artifacts
          path: |
            artifacts/history-h7-production/
            apps/web/artifacts/history-h7-production/
          if-no-files-found: warn
