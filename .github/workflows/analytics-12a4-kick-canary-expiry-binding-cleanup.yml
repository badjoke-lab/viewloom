name: Analytics 12A4 Kick Canary Expiry Binding Cleanup Retired

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-canary-expiry-binding-cleanup.yml'
      - 'docs/audits/12a4-kick-canary-expiry-binding-cleanup-contract.json'
      - 'docs/audits/12a4-kick-canary-expiry-binding-cleanup-trigger.json'
      - 'docs/audits/12a4-kick-category-capture-canary-post-rollback-acceptance-evidence.json'
      - 'docs/work-in-progress/phase12a4-kick-canary-expiry-binding-cleanup.md'
      - 'scripts/check-12a4-kick-canary-expiry-binding-cleanup-scope.mjs'
      - 'scripts/verify-12a4-kick-canary-expiry-binding-cleanup-package.mjs'
      - 'scripts/verify-development-policy.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-canary-expiry-binding-cleanup-retired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-retirement:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify cleanup retirement scope
        run: node scripts/check-12a4-kick-canary-expiry-binding-cleanup-scope.mjs
      - name: Verify retired cleanup package
        run: node scripts/verify-12a4-kick-canary-expiry-binding-cleanup-package.mjs
      - name: Verify canonical development policy
        run: node scripts/verify-development-policy.mjs
      - name: Bundle canonical normal Kick collector without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --outdir artifacts/12a4-kick-canary-expiry-binding-cleanup-retired/dry-run --config workers/collector-kick/wrangler.toml
      - name: Publish retirement summary
        run: |
          {
            echo '## ViewLoom 12A-4 Kick expired canary binding cleanup retired'
            echo
            echo '- Production deployment path: retired'
            echo '- Push trigger: removed'
            echo '- One-time cleanup trigger: consumed and retired'
            echo '- Normal Kick cron: unchanged at `*/5 * * * *`'
            echo '- Permanent category enablement: no'
            echo '- Twitch change: no'
          } >> "$GITHUB_STEP_SUMMARY"
