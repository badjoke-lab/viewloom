name: History UI P9H4B Tasks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/product/current-schedule.md'
      - 'docs/work-in-progress/p9h4b-activation.md'
      - 'apps/web/src/live/history-overview-p9h4a.ts'
      - 'apps/web/src/live/history-tasks-p9h4b.ts'
      - 'apps/web/src/history-tasks-p9h4b.css'
      - 'apps/web/scripts/history-ui-h4b-tasks-browser.mjs'
      - 'scripts/verify-history-ui-h4a-overview.mjs'
      - 'scripts/verify-history-ui-h4b-tasks.mjs'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/history-ui-h4b-tasks.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HISTORY_H4B_BASE_URL: http://127.0.0.1:4173
      HISTORY_H4B_ARTIFACT_DIR: /tmp/history-ui-h4b
      GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify retained P9H4A contract
        run: node scripts/verify-history-ui-h4a-overview.mjs

      - name: Verify P9H4B repository contract
        run: node scripts/verify-history-ui-h4b-tasks.mjs

      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app

      - name: Build web application
        run: pnpm build:web

      - name: Start local preview
        shell: bash
        run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/history-ui-h4b-preview.log 2>&1 &
          for attempt in {1..50}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/history/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/kick/history/ > /dev/null \
              && exit 0
            sleep 1
          done
          cat /tmp/history-ui-h4b-preview.log
          exit 1

      - name: Install Playwright
        working-directory: apps/web
        run: npm install playwright@1.52.0 --no-save --no-audit --no-fund

      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run P9H4B task hierarchy browser acceptance
        working-directory: apps/web
        run: node scripts/history-ui-h4b-tasks-browser.mjs

      - name: Verify P9H4B evidence
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict'
          import { readFileSync } from 'node:fs'
          const evidence = JSON.parse(readFileSync('/tmp/history-ui-h4b/history-ui-h4b-tasks-evidence.json', 'utf8'))
          assert.equal(evidence.schema, 'viewloom-history-ui-h4b-tasks-v1')
          assert.equal(evidence.phase, 'P9H4B')
          assert.equal(evidence.result, 'pass')
          assert.equal(evidence.scenarios.length, 4)
          for (const scenario of evidence.scenarios) {
            assert.equal(scenario.calls.length, 1)
            assert.ok(scenario.calls.every((call) => call.provider === scenario.provider))
          }
          NODE

      - name: Upload P9H4B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: history-ui-h4b-tasks
          path: |
            /tmp/history-ui-h4b/**
            /tmp/history-ui-h4b-preview.log
          if-no-files-found: warn
