name: Analytics 12A3 Post-Merge Acceptance

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - 'workers/analytics-postmerge-verifier/**'
      - 'docs/audits/12a3-postmerge-acceptance-contract.json'
      - 'docs/audits/12a3-postmerge-acceptance-evidence.json'
      - 'docs/operations/12a3-postmerge-acceptance-*.md'
      - 'docs/work-in-progress/phase12a3-postmerge-acceptance.md'
      - 'scripts/collect-12a3-postmerge-evidence.mjs'
      - 'scripts/verify-12a3-postmerge-evidence.mjs'
      - 'scripts/verify-12a3-postmerge-package.mjs'
      - 'scripts/check-12a3-postmerge-scope.mjs'
      - '.github/workflows/analytics-12a3-postmerge-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: analytics-12a3-postmerge-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify post-merge branch scope
        run: node scripts/check-12a3-postmerge-scope.mjs

      - name: Verify post-merge acceptance package
        run: node scripts/verify-12a3-postmerge-package.mjs

      - name: Verify permanent accepted evidence when present
        run: |
          if [ -f docs/audits/12a3-postmerge-acceptance-evidence.json ]; then
            node scripts/verify-12a3-postmerge-evidence.mjs docs/audits/12a3-postmerge-acceptance-evidence.json
          else
            echo 'Permanent post-merge evidence is not frozen yet.'
          fi

      - name: Install Wrangler 4
        run: npm install --global wrangler@4

      - name: Bundle Twitch verifier without deploying
        working-directory: workers/analytics-postmerge-verifier
        run: wrangler deploy --dry-run --config wrangler.twitch.toml --outdir /tmp/viewloom-postmerge-twitch

      - name: Bundle Kick verifier without deploying
        working-directory: workers/analytics-postmerge-verifier
        run: wrangler deploy --dry-run --config wrangler.kick.toml --outdir /tmp/viewloom-postmerge-kick

  production-acceptance:
    if: >-
      github.repository == 'badjoke-lab/viewloom'
      && github.event_name == 'pull_request'
      && github.event.action == 'opened'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.head_ref == 'work-analytics-12a3-postmerge-acceptance'
    needs: contract
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RAW_DIR: artifacts/12a3-postmerge/raw
      ARTIFACT_DIR: artifacts/12a3-postmerge
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      MERGE_SHA: ad90585d74149b0fb1805b9a76fd8d796a5e7c2d
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler 4
        run: npm install --global wrangler@4

      - name: Require trusted credentials
        run: |
          test -n "$GH_TOKEN"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Verify exact main collector deployment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RAW_DIR"
          merge_sha="$MERGE_SHA"
          selected=''
          for attempt in $(seq 1 40); do
            runs=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/deploy-collector-workers.yml/runs?event=push&branch=main&per_page=30")
            selected=$(printf '%s' "$runs" | jq -c --arg merge_sha "$merge_sha" \
              '[.workflow_runs[] | select(.head_sha == $merge_sha)] | sort_by(.run_number) | last // empty')
            if [ -n "$selected" ]; then
              status=$(printf '%s' "$selected" | jq -r '.status')
              if [ "$status" = 'completed' ]; then break; fi
            fi
            sleep 15
          done
          test -n "$selected"
          run_id=$(printf '%s' "$selected" | jq -r '.id')
          jobs_response=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")
          node - "$RAW_DIR/deployment.json" "$MERGE_SHA" "$selected" "$jobs_response" <<'NODE'
          const fs = require('fs')
          const [output, mergeSha, selectedText, jobsText] = process.argv.slice(2)
          const selected = JSON.parse(selectedText)
          const jobsPayload = JSON.parse(jobsText)
          const required = ['verify', 'deploy-twitch', 'deploy-kick', 'verify-remote-schema']
          const jobs = (jobsPayload.jobs ?? []).map((job) => ({ name: job.name, conclusion: job.conclusion }))
          const byName = new Map(jobs.map((job) => [job.name, job.conclusion]))
          const gatePass = selected.head_sha === mergeSha
            && selected.event === 'push'
            && selected.status === 'completed'
            && selected.conclusion === 'success'
            && required.every((name) => byName.get(name) === 'success')
          fs.writeFileSync(output, `${JSON.stringify({
            workflow: 'deploy-collector-workers.yml',
            runId: selected.id,
            headSha: selected.head_sha,
            event: selected.event,
            status: selected.status,
            conclusion: selected.conclusion,
            jobs,
            gatePass,
          }, null, 2)}\n`)
          if (!gatePass) process.exit(1)
          NODE

      - name: Wait for first natural maintenance refresh
        shell: bash
        run: |
          set -euo pipefail
          target=$(date -u -d '2026-07-12 12:25:30 UTC' +%s)
          now=$(date -u +%s)
          if [ "$now" -lt "$target" ]; then
            wait_seconds=$((target - now))
            echo "Waiting ${wait_seconds}s for the 12:20-12:24 UTC production maintenance window to complete."
            sleep "$wait_seconds"
          fi

      - name: Prepare ephemeral verifier authentication
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RAW_DIR"
          token=$(openssl rand -hex 32)
          echo "::add-mask::$token"
          echo "VERIFY_TOKEN=$token" >> "$GITHUB_ENV"
          python - "$token" <<'PY'
          from pathlib import Path
          import sys
          token = sys.argv[1]
          root = Path('workers/analytics-postmerge-verifier')
          for provider in ('twitch', 'kick'):
              source = (root / f'wrangler.{provider}.toml').read_text()
              source = source.replace('[vars]\n', f'[vars]\nVERIFY_TOKEN = "{token}"\n', 1)
              (root / f'.runtime.{provider}.toml').write_text(source)
          PY

      - name: Deploy read-only verifier Workers
        shell: bash
        run: |
          set +e
          cd workers/analytics-postmerge-verifier
          run_provider() {
            provider="$1"
            config=".runtime.${provider}.toml"
            log="$GITHUB_WORKSPACE/$RAW_DIR/${provider}-deploy.log"
            result="$GITHUB_WORKSPACE/$RAW_DIR/${provider}.json"
            wrangler deploy --config "$config" > "$log" 2>&1
            deploy_code=$?
            url=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$log" | grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' | tail -n 1)
            run_code=1
            curl_code=1
            http_code=000
            if [ "$deploy_code" -eq 0 ] && [ -n "$url" ]; then
              for attempt in $(seq 1 6); do
                tmp="${result}.attempt"
                http_code=$(curl --silent --show-error --output "$tmp" --write-out '%{http_code}' \
                  -X POST -H "Authorization: Bearer $VERIFY_TOKEN" "$url/verify")
                curl_code=$?
                if [ "$curl_code" -eq 0 ] && [ "$http_code" = '200' ]; then
                  mv "$tmp" "$result"
                  run_code=0
                  break
                fi
                if [ "$attempt" -eq 6 ]; then mv "$tmp" "$result"; else rm -f "$tmp"; sleep 3; fi
              done
            fi
            printf '%s %s %s %s\n' "$deploy_code" "$run_code" "$curl_code" "${http_code:-000}" \
              > "$GITHUB_WORKSPACE/$RAW_DIR/${provider}-run-codes.txt"
          }
          run_provider twitch
          run_provider kick
          exit 0

      - name: Delete temporary verifier Workers
        if: always()
        shell: bash
        run: |
          set +e
          delete_provider() {
            provider="$1"
            worker="$2"
            response="$RAW_DIR/${provider}-delete.json"
            http=$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
              -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/services/$worker?force=true")
            delete_curl=$?
            success=$(jq -r '.success == true' "$response" 2>/dev/null || printf 'false')
            delete_code=1
            if [ "$delete_curl" -eq 0 ] && [ "$http" = '200' ] && [ "$success" = 'true' ]; then delete_code=0; fi
            read deploy run run_curl run_http < "$RAW_DIR/${provider}-run-codes.txt" 2>/dev/null || true
            printf '%s %s %s %s %s %s %s\n' \
              "${deploy:-1}" "${run:-1}" "${run_curl:-1}" "${run_http:-000}" \
              "$delete_code" "$delete_curl" "${http:-000}" > "$RAW_DIR/${provider}-codes.txt"
          }
          delete_provider twitch viewloom-postmerge-verifier-twitch
          delete_provider kick viewloom-postmerge-verifier-kick
          rm -f workers/analytics-postmerge-verifier/.runtime.*.toml
          exit 0

      - name: Normalize and verify post-merge evidence
        run: |
          node scripts/collect-12a3-postmerge-evidence.mjs "$RAW_DIR" "$ARTIFACT_DIR/evidence.json"
          node scripts/verify-12a3-postmerge-evidence.mjs "$ARTIFACT_DIR/evidence.json"

      - name: Freeze accepted post-merge evidence
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          export HEAD_SHA
          node - <<'NODE'
          const fs = require('fs')
          const evidencePath = 'artifacts/12a3-postmerge/evidence.json'
          const permanentPath = 'docs/audits/12a3-postmerge-acceptance-evidence.json'
          const contractPath = 'docs/audits/12a3-postmerge-acceptance-contract.json'
          const acceptancePath = 'docs/operations/12a3-postmerge-acceptance-2026-07-12.md'
          const workPath = 'docs/work-in-progress/phase12a3-postmerge-acceptance.md'
          const evidence = JSON.parse(fs.readFileSync(evidencePath, 'utf8'))
          evidence.status = 'accepted'
          evidence.acceptanceIdentity = {
            pr: Number(process.env.PR_NUMBER),
            headSha: process.env.HEAD_SHA,
            workflowRunId: Number(process.env.GITHUB_RUN_ID),
            artifactName: 'phase12a3-postmerge-acceptance',
            workflowUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          }
          fs.writeFileSync(permanentPath, `${JSON.stringify(evidence, null, 2)}\n`)
          const contract = JSON.parse(fs.readFileSync(contractPath, 'utf8'))
          contract.status = 'accepted'
          contract.acceptedEvidence = {
            pr: evidence.acceptanceIdentity.pr,
            headSha: evidence.acceptanceIdentity.headSha,
            workflowRunId: evidence.acceptanceIdentity.workflowRunId,
            artifactName: evidence.acceptanceIdentity.artifactName,
            deploymentRunId: evidence.deployment.runId,
            postMergeAccumulationPass: evidence.gate.postMergeAccumulationPass,
            temporaryVerifiersRetained: evidence.boundaries.temporaryVerifiersRetained,
          }
          fs.writeFileSync(contractPath, `${JSON.stringify(contract, null, 2)}\n`)
          const lines = [
            '# 12A-3 post-merge accumulation acceptance',
            '',
            'Date: 2026-07-12',
            'Status: accepted',
            '',
            '```text',
            `PR: #${evidence.acceptanceIdentity.pr}`,
            `Candidate head: ${evidence.acceptanceIdentity.headSha}`,
            `Acceptance workflow: ${evidence.acceptanceIdentity.workflowRunId}`,
            `Main deploy workflow: ${evidence.deployment.runId}`,
            `Merge SHA: ${evidence.merge.sha}`,
            '```',
            '',
            '## Provider results',
            '',
          ]
          for (const provider of ['twitch', 'kick']) {
            const row = evidence.providers[provider]
            lines.push(`### ${provider[0].toUpperCase()}${provider.slice(1)}`, '', '```text')
            lines.push(`days: ${row.days.map((day) => day.day).join(', ')}`)
            lines.push(`rows: ${row.days.map((day) => day.rollupRows).join(', ')}`)
            lines.push(`source snapshots: ${row.days.map((day) => day.sourceSnapshots).join(', ')}`)
            lines.push(`refreshed_at: ${row.days.map((day) => day.refreshedAt).join(', ')}`)
            lines.push(`provider gate: ${row.providerGatePass}`)
            lines.push('```', '')
          }
          lines.push('## Gate', '', '```text')
          lines.push(`deploymentPass: ${evidence.gate.deploymentPass}`)
          lines.push(`postMergeAccumulationPass: ${evidence.gate.postMergeAccumulationPass}`)
          lines.push(`temporaryVerifiersRetained: ${evidence.boundaries.temporaryVerifiersRetained}`)
          lines.push('manualCollectorRouteUsed: false', 'temporaryGeneratorUsed: false', 'backfillPerformed: false', 'newCronAdded: false')
          lines.push('```', '', 'The enabled production collectors refreshed today and yesterday through the existing scheduled maintenance window. 12A-3 may proceed to canonical closeout.', '')
          fs.writeFileSync(acceptancePath, lines.join('\n'))
          let work = fs.readFileSync(workPath, 'utf8')
          work = work.replace('Status: awaiting the first natural production maintenance refresh after PR #510 merge', 'Status: post-merge production accumulation accepted; canonical closeout pending')
          fs.writeFileSync(workPath, work)
          NODE
          node scripts/verify-12a3-postmerge-package.mjs
          node scripts/verify-12a3-postmerge-evidence.mjs docs/audits/12a3-postmerge-acceptance-evidence.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/audits/12a3-postmerge-acceptance-contract.json \
            docs/audits/12a3-postmerge-acceptance-evidence.json \
            docs/operations/12a3-postmerge-acceptance-2026-07-12.md \
            docs/work-in-progress/phase12a3-postmerge-acceptance.md
          git commit -m 'Freeze accepted 12A-3 post-merge accumulation evidence'
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Comment accepted aggregate result
        shell: bash
        run: |
          evidence=docs/audits/12a3-postmerge-acceptance-evidence.json
          {
            echo '## 12A-3 post-merge accumulation accepted'
            echo
            echo '```text'
            echo "main deploy run: $(jq -r '.deployment.runId' "$evidence")"
            for provider in twitch kick; do
              echo "$provider rows: $(jq -r ".providers.$provider.days | map(.rollupRows) | join(\",\")" "$evidence")"
              echo "$provider refreshed_at: $(jq -r ".providers.$provider.days | map(.refreshedAt) | join(\",\")" "$evidence")"
              echo "$provider gate: $(jq -r ".providers.$provider.providerGatePass" "$evidence")"
            done
            echo "post-merge gate: $(jq -r '.gate.postMergeAccumulationPass' "$evidence")"
            echo "temporary verifiers retained: $(jq -r '.boundaries.temporaryVerifiersRetained' "$evidence")"
            echo '```'
          } > /tmp/postmerge-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/postmerge-comment.md

      - name: Remove raw responses and logs
        if: always()
        run: rm -rf "$RAW_DIR"

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a3-postmerge-acceptance
          path: artifacts/12a3-postmerge/evidence.json
          if-no-files-found: warn
