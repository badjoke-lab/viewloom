name: One-time 12A2 Collector Deploy CLI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/one-time-12a2-collector-deploy-cli.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: viewloom-one-time-12a2-collector-deploy-cli-pr506
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    if: ${{ github.repository == 'badjoke-lab/viewloom' && github.event.pull_request.number == 506 && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work-analytics-12a2-post-deploy-schema-evidence' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: '506'
      PRODUCTION_ORIGIN: https://vl.badjoke-lab.com
      DIAG_DIR: artifacts/one-time-deploy-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler 4
        run: npm install --global wrangler@4

      - name: Require Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy Twitch collector with Wrangler CLI
        id: twitch
        continue-on-error: true
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p "$DIAG_DIR"
          set +e
          (
            cd workers/collector-twitch
            wrangler deploy
          ) > "$DIAG_DIR/twitch.stdout" 2> "$DIAG_DIR/twitch.stderr"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Deploy Kick collector with Wrangler CLI
        id: kick
        continue-on-error: true
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p "$DIAG_DIR"
          set +e
          (
            cd workers/collector-kick
            wrangler deploy
          ) > "$DIAG_DIR/kick.stdout" 2> "$DIAG_DIR/kick.stderr"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Build sanitized deployment diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p "$DIAG_DIR"
          sanitize() {
            sed -E $'s/\x1B\[[0-9;]*[mK]//g' \
              | sed -E 's/[A-Za-z0-9_+=\/.-]{48,}/[redacted]/g'
          }
          for provider in twitch kick; do
            : > "$DIAG_DIR/$provider.diag"
            for stream in stderr stdout; do
              source="$DIAG_DIR/$provider.$stream"
              if [ -s "$source" ]; then
                printf '%s\n' "--- $stream ---" >> "$DIAG_DIR/$provider.diag"
                sanitize < "$source" \
                  | grep -Ei 'error|permission|auth|account|token|d1|binding|forbidden|unauthorized|not found|code|worker|deploy|uploaded|trigger' \
                  | tail -n 30 >> "$DIAG_DIR/$provider.diag" || true
              fi
            done
            if [ ! -s "$DIAG_DIR/$provider.diag" ]; then
              printf '%s\n' '(no matching diagnostic output)' > "$DIAG_DIR/$provider.diag"
            fi
            rm -f "$DIAG_DIR/$provider.stdout" "$DIAG_DIR/$provider.stderr"
          done

      - name: Poll production schema
        if: ${{ steps.twitch.outcome == 'success' && steps.kick.outcome == 'success' }}
        id: schema
        continue-on-error: true
        shell: bash
        run: |
          passed=false
          for attempt in $(seq 1 20); do
            curl --fail --silent --show-error \
              -H 'accept: application/json' \
              -H 'cache-control: no-cache' \
              "$PRODUCTION_ORIGIN/api/schema-audit" \
              > "$DIAG_DIR/schema.json"

            twitch=$(jq -r '.providers[] | select(.provider == "twitch") | .observedObjectCount' "$DIAG_DIR/schema.json")
            kick=$(jq -r '.providers[] | select(.provider == "kick") | .observedObjectCount' "$DIAG_DIR/schema.json")
            twitch_complete=$(jq -r '.providers[] | select(.provider == "twitch") | .schemaComplete' "$DIAG_DIR/schema.json")
            kick_complete=$(jq -r '.providers[] | select(.provider == "kick") | .schemaComplete' "$DIAG_DIR/schema.json")
            twitch_written=$(jq -r '.providers[] | select(.provider == "twitch") | .auditQuery.rowsWritten' "$DIAG_DIR/schema.json")
            kick_written=$(jq -r '.providers[] | select(.provider == "kick") | .auditQuery.rowsWritten' "$DIAG_DIR/schema.json")

            echo "attempt=$attempt twitch=$twitch/3 kick=$kick/3"
            if [ "$twitch_complete" = true ] && [ "$kick_complete" = true ] && [ "$twitch_written" = 0 ] && [ "$kick_written" = 0 ]; then
              passed=true
              break
            fi
            sleep 30
          done
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          test "$passed" = true

      - name: Upload sanitized one-time deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a2-one-time-collector-deploy-cli
          path: |
            artifacts/one-time-deploy-cli/twitch.diag
            artifacts/one-time-deploy-cli/kick.diag
            artifacts/one-time-deploy-cli/schema.json
          if-no-files-found: warn

      - name: Comment CLI deployment result on PR
        if: always()
        shell: bash
        env:
          TWITCH_OUTCOME: ${{ steps.twitch.outcome }}
          KICK_OUTCOME: ${{ steps.kick.outcome }}
          TWITCH_EXIT_CODE: ${{ steps.twitch.outputs.exit_code }}
          KICK_EXIT_CODE: ${{ steps.kick.outputs.exit_code }}
          SCHEMA_OUTCOME: ${{ steps.schema.outcome }}
          SCHEMA_PASSED: ${{ steps.schema.outputs.passed }}
        run: |
          twitch_objects='unknown'
          kick_objects='unknown'
          twitch_complete='unknown'
          kick_complete='unknown'
          generated_at='unknown'
          if [ -f "$DIAG_DIR/schema.json" ]; then
            twitch_objects=$(jq -r '.providers[] | select(.provider == "twitch") | .observedObjectCount' "$DIAG_DIR/schema.json")
            kick_objects=$(jq -r '.providers[] | select(.provider == "kick") | .observedObjectCount' "$DIAG_DIR/schema.json")
            twitch_complete=$(jq -r '.providers[] | select(.provider == "twitch") | .schemaComplete' "$DIAG_DIR/schema.json")
            kick_complete=$(jq -r '.providers[] | select(.provider == "kick") | .schemaComplete' "$DIAG_DIR/schema.json")
            generated_at=$(jq -r '.generatedAt' "$DIAG_DIR/schema.json")
          fi
          twitch_diag=$(cat "$DIAG_DIR/twitch.diag" 2>/dev/null || printf '%s' '(missing diagnostic)')
          kick_diag=$(cat "$DIAG_DIR/kick.diag" 2>/dev/null || printf '%s' '(missing diagnostic)')

          cat > /tmp/deploy-cli-comment.md <<EOF
          ## One-time 12A-2 Wrangler CLI deployment result

          \`\`\`text
          Twitch outcome: $TWITCH_OUTCOME
          Twitch exit code: ${TWITCH_EXIT_CODE:-unknown}
          Kick outcome: $KICK_OUTCOME
          Kick exit code: ${KICK_EXIT_CODE:-unknown}
          Schema polling outcome: ${SCHEMA_OUTCOME:-skipped}
          Schema gate passed: ${SCHEMA_PASSED:-false}
          Twitch schema: $twitch_objects / 3
          Twitch complete: $twitch_complete
          Kick schema: $kick_objects / 3
          Kick complete: $kick_complete
          Production generated at: $generated_at
          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          ### Twitch diagnostic

          \`\`\`text
          $twitch_diag
          \`\`\`

          ### Kick diagnostic

          \`\`\`text
          $kick_diag
          \`\`\`

          Diagnostics are sanitized. Raw stdout/stderr and secret values are not uploaded. No backfill or rollup generation was performed.
          EOF
          gh pr comment "$PR_NUMBER" --body-file /tmp/deploy-cli-comment.md

      - name: Fail when CLI deploy or schema gate failed
        if: always()
        shell: bash
        env:
          TWITCH_OUTCOME: ${{ steps.twitch.outcome }}
          KICK_OUTCOME: ${{ steps.kick.outcome }}
          SCHEMA_PASSED: ${{ steps.schema.outputs.passed }}
        run: |
          test "$TWITCH_OUTCOME" = success
          test "$KICK_OUTCOME" = success
          test "$SCHEMA_PASSED" = true
