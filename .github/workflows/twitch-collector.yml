name: Twitch collector (legacy disabled)

on:
  workflow_dispatch:

concurrency:
  group: twitch-collector
  cancel-in-progress: false

jobs:
  legacy-disabled:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Explain legacy collector status
        run: |
          echo "The legacy GitHub Actions Twitch collector is disabled."
          echo "Twitch collection now runs through workers/collector-twitch on Cloudflare Worker cron."
          echo "Do not use this workflow for production collection."
