name: Twitch collector

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: twitch-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Twitch collector
        env:
          VIEWLOOM_COLLECTOR_URL: ${{ secrets.VIEWLOOM_COLLECTOR_URL }}
          VIEWLOOM_INGEST_TOKEN: ${{ secrets.VIEWLOOM_INGEST_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${VIEWLOOM_COLLECTOR_URL:-}" ]; then
            echo "VIEWLOOM_COLLECTOR_URL secret is missing" >&2
            exit 1
          fi

          if [ -z "${VIEWLOOM_INGEST_TOKEN:-}" ]; then
            echo "VIEWLOOM_INGEST_TOKEN secret is missing" >&2
            exit 1
          fi

          endpoint="${VIEWLOOM_COLLECTOR_URL%/}/api/admin/twitch-heatmap-collect"
          body_file="$(mktemp)"
          status="$(curl -sS -X POST "$endpoint" \
            -H "Authorization: Bearer ${VIEWLOOM_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -o "$body_file" \
            -w "%{http_code}")"

          echo "collector_endpoint=$endpoint"
          echo "http_status=$status"
          cat "$body_file"
          echo

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Twitch collector request failed" >&2
            exit 1
          fi

          if ! grep -q '"ok"[[:space:]]*:[[:space:]]*true' "$body_file"; then
            echo "Twitch collector response did not include ok=true" >&2
            exit 1
          fi
