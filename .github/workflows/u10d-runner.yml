name: U10D Isolated Runner

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/u10d-runner.yml'

permissions:
  contents: write

concurrency:
  group: u10d-isolated-runner
  cancel-in-progress: false

env:
  U10D_RUNNER_REVISION: '8'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout U10D implementation branch
        uses: actions/checkout@v4
        with:
          ref: work-quality-u10d-analysis-coherence
          fetch-depth: 1
      - name: Correct clean-default URL expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/scripts/quality-u10d-analysis-coherence-browser.mjs')
          source = path.read_text(encoding='utf-8')
          old = "  assert.equal(initial.urlLayout, 'wide', `${provider} ${width}: URL did not normalize to Wide`)"
          new = "  assert.equal(initial.urlLayout, null, `${provider} ${width}: clean default wrote a URL preference`)"
          if source.count(old) != 1:
              raise SystemExit(f'unexpected clean-default assertion count: {source.count(old)}')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Verify corrected browser script
        run: |
          node --check apps/web/scripts/quality-u10d-analysis-coherence-browser.mjs
          git diff --check
      - name: Commit corrected acceptance
        run: |
          git config user.name badjoke-lab
          git config user.email 227710934+badjoke-lab@users.noreply.github.com
          git add apps/web/scripts/quality-u10d-analysis-coherence-browser.mjs
          git commit -m "Correct U10D clean default acceptance"
          git push origin HEAD:work-quality-u10d-analysis-coherence
