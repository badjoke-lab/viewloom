name: U10D Isolated Runner

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/u10d-runner.yml'

permissions:
  contents: write

concurrency:
  group: u10d-isolated-runner
  cancel-in-progress: false

env:
  U10D_RUNNER_REVISION: '6'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout U10D implementation branch
        uses: actions/checkout@v4
        with:
          ref: work-quality-u10d-analysis-coherence
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply guarded U10D patches
        run: |
          python scripts/u10d_patch_runtime.py
          python scripts/u10d_patch_tests.py
          python scripts/u10d_patch_finalize.py
      - name: Correct generated verifier quote
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-quality-u10d-analysis-coherence.mjs')
          lines = path.read_text(encoding='utf-8').splitlines()
          targets = [index for index, line in enumerate(lines) if "assert.equal(html.includes('const key =" in line]
          if len(targets) != 1:
              raise SystemExit(f'unexpected quote target count: {len(targets)}')
          lines[targets[0]] = '  assert.equal(html.includes("const key = \'viewloom:"), false)'
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Remove branch-local bootstrap files
        run: |
          rm scripts/u10d_patch_runtime.py scripts/u10d_patch_tests.py scripts/u10d_patch_finalize.py
          rm .github/workflows/u10d-bootstrap.yml
      - name: Check U10D browser script syntax
        run: node --check apps/web/scripts/quality-u10d-analysis-coherence-browser.mjs
      - name: Check U10D repository verifier syntax
        run: node --check scripts/verify-quality-u10d-analysis-coherence.mjs
      - name: Check U10D evidence verifier syntax
        run: node --check scripts/verify-quality-u10d-browser-evidence.mjs
      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs
      - name: Verify U10D repository contract
        run: node scripts/verify-quality-u10d-analysis-coherence.mjs
      - name: Check generated diff
        run: git diff --check
      - name: Commit U10D implementation
        run: |
          git config user.name badjoke-lab
          git config user.email 227710934+badjoke-lab@users.noreply.github.com
          git add -A
          git commit -m "Implement U10D analysis coherence"
          git push origin HEAD:work-quality-u10d-analysis-coherence
