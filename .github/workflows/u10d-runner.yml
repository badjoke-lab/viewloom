name: U10D Isolated Runner

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/u10d-runner.yml'

permissions:
  contents: write

concurrency:
  group: u10d-isolated-runner
  cancel-in-progress: false

env:
  U10D_RUNNER_REVISION: '10'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout U10D implementation branch
        uses: actions/checkout@v4
        with:
          ref: work-quality-u10d-analysis-coherence
          fetch-depth: 1
      - name: Synchronize Battle Lines controls
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              target = Path(path)
              source = target.read_text(encoding='utf-8')
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one target, found {count}')
              target.write_text(source.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'apps/web/src/live/battle-lines-current-shell-entry.ts',
              "function renderAll(): void {\n  if (!payload) return\n  renderHeadFacts(payload)",
              "function renderAll(): void {\n  if (!payload) return\n  syncControls()\n  renderHeadFacts(payload)",
          )

          verifier = Path('scripts/verify-quality-u10d-analysis-coherence.mjs')
          source = verifier.read_text(encoding='utf-8')
          anchor = "assert.equal(battle.includes('new MutationObserver'), false)\n"
          addition = "assert.ok(battle.includes('function renderAll(): void {\\n  if (!payload) return\\n  syncControls()'))\n"
          if source.count(anchor) != 1:
              raise SystemExit(f'verifier anchor count: {source.count(anchor)}')
          verifier.write_text(source.replace(anchor, anchor + addition, 1), encoding='utf-8')
          PY
      - name: Verify Battle Lines control patch
        run: |
          node --check scripts/verify-quality-u10d-analysis-coherence.mjs
          node scripts/verify-development-policy.mjs
          node scripts/verify-quality-u10d-analysis-coherence.mjs
          git diff --check
      - name: Commit control synchronization
        run: |
          git config user.name badjoke-lab
          git config user.email 227710934+badjoke-lab@users.noreply.github.com
          git add apps/web/src/live/battle-lines-current-shell-entry.ts scripts/verify-quality-u10d-analysis-coherence.mjs
          git commit -m "Synchronize U10D Battle Lines controls"
          git push origin HEAD:work-quality-u10d-analysis-coherence
