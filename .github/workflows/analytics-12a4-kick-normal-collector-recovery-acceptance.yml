name: Analytics 12A4 Kick Normal Collector Recovery Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-normal-collector-recovery-acceptance.yml'
      - 'docs/audits/12a4-kick-normal-collector-recovery-acceptance-contract.json'
      - 'docs/work-in-progress/phase12a4-kick-normal-collector-recovery-acceptance.md'
      - 'scripts/check-12a4-kick-normal-collector-recovery-acceptance-scope.mjs'
      - 'scripts/run-12a4-kick-normal-collector-recovery-acceptance.mjs'
      - 'scripts/verify-12a4-kick-normal-collector-recovery-acceptance-package.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-normal-collector-recovery-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify exact read-only acceptance scope
        run: node scripts/check-12a4-kick-normal-collector-recovery-acceptance-scope.mjs

      - name: Verify read-only acceptance package
        run: node scripts/verify-12a4-kick-normal-collector-recovery-acceptance-package.mjs

  read-only-acceptance:
    needs: verify-package
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTPUT_DIR: artifacts/12a4-kick-normal-collector-recovery-acceptance
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - id: acceptance
        name: Run production read-only Kick normal recovery acceptance
        run: node scripts/run-12a4-kick-normal-collector-recovery-acceptance.mjs

      - name: Upload sanitized recovery acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-12a4-kick-normal-collector-recovery-acceptance
          path: artifacts/12a4-kick-normal-collector-recovery-acceptance/evidence.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish recovery acceptance summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4 Kick normal collector recovery acceptance'
            echo
            echo '- Production mutation: no'
            echo '- Cloudflare operations: GET only'
            echo '- D1 operations: SELECT only'
            echo '- Category capture: disabled'
            echo '- Twitch change: no'
            echo '- Outcome: `${{ steps.acceptance.outputs.outcome }}`'
          } >> "$GITHUB_STEP_SUMMARY"
