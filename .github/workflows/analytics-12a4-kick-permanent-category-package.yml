name: Analytics 12A4 Kick Permanent Category Package

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'docs/audits/12a4-kick-permanent-category-capture-package-contract.json'
      - 'workers/collector-kick/wrangler.category-permanent.toml'
      - 'workers/collector-kick/src/**'
      - 'workers/shared/category-capture.ts'
      - 'workers/shared/category-intraday-rollup.ts'
      - 'scripts/run-12a4-kick-permanent-category-observer.mjs'
      - 'scripts/test-12a4-kick-permanent-category-capture.mjs'
      - 'scripts/verify-12a4-kick-permanent-category-package.mjs'
      - '.github/workflows/analytics-12a4-kick-permanent-category-package.yml'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-permanent-category-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Parse observer and verifiers
        run: |
          node --check scripts/run-12a4-kick-permanent-category-observer.mjs
          node --check scripts/test-12a4-kick-permanent-category-capture.mjs
          node --check scripts/verify-12a4-kick-permanent-category-package.mjs
      - name: Run Kick permanent category fixtures
        run: node scripts/test-12a4-kick-permanent-category-capture.mjs
      - name: Verify package contract and boundaries
        run: node scripts/verify-12a4-kick-permanent-category-package.mjs
      - name: Verify current category rollout policy
        run: node scripts/verify-category-rollout-policy.mjs
      - name: Verify collector typecheck
        run: pnpm typecheck:collectors
      - name: Bundle normal Kick collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-kick/wrangler.toml
      - name: Bundle permanent-category Kick collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-kick/wrangler.category-permanent.toml
      - name: Publish package summary
        if: always()
        run: |
          {
            echo '## ViewLoom Kick permanent category implementation package'
            echo
            echo '- Provider: Kick only'
            echo '- Production publish: no'
            echo '- Remote D1 operation: no'
            echo '- Existing Worker cron: five minutes'
            echo '- New Worker cron: no'
            echo '- Normal Kick config retained as rollback: yes'
            echo '- Twitch change: no'
            echo '- Public category UI change: no'
          } >> "$GITHUB_STEP_SUMMARY"