name: Channel C5B Production Acceptance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/channel-c5b-production.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  production:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CHANNEL_C5B_PRODUCTION_URL: https://vl.badjoke-lab.com
      CHANNEL_C5B_ACCEPTED_SHA: efc14295f0a372b96afac740d6a01571f7582210
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - name: Wait for exact production deployment
        run: |
          getent ahosts vl.badjoke-lab.com | tee /tmp/channel-c5b-production-dns.txt || true
          for attempt in {1..30}; do
            status="$(curl --silent --show-error --output /tmp/channel-c5b-deployment.json --write-out '%{http_code}' --max-time 20 "$CHANNEL_C5B_PRODUCTION_URL/deployment.json?qa=$GITHUB_SHA" 2>> /tmp/channel-c5b-production-curl.log || true)"
            if [ "$status" = "200" ]; then
              environment="$(jq -r '.environment // empty' /tmp/channel-c5b-deployment.json 2>/dev/null || true)"
              branch="$(jq -r '.branch // empty' /tmp/channel-c5b-deployment.json 2>/dev/null || true)"
              commit_sha="$(jq -r '.commit_sha // .commit // .sha // empty' /tmp/channel-c5b-deployment.json 2>/dev/null || true)"
              echo "Production attempt $attempt: environment=$environment branch=$branch commit_sha=$commit_sha"
              if [ "$environment" = "production" ] && [ "$branch" = "main" ] && [ "$commit_sha" = "$CHANNEL_C5B_ACCEPTED_SHA" ]; then
                echo "Exact accepted Channel main SHA is deployed."
                cat /tmp/channel-c5b-deployment.json
                exit 0
              fi
            else
              echo "Production attempt $attempt returned HTTP $status"
            fi
            sleep 10
          done
          echo "Production did not reach the accepted Channel main SHA."
          cat /tmp/channel-c5b-production-dns.txt || true
          cat /tmp/channel-c5b-production-curl.log || true
          cat /tmp/channel-c5b-deployment.json || true
          exit 1
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Verify public Twitch and Kick Channel with production bindings
        working-directory: apps/web
        env:
          CHANNEL_C5B_PREVIEW_URL: https://vl.badjoke-lab.com
          CHANNEL_C5B_ARTIFACT_DIR: artifacts/channel-c5b-production
        run: node scripts/channel-c5b-hosted-browser.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: channel-c5b-production-artifacts
          path: |
            apps/web/artifacts/channel-c5b-production/
            /tmp/channel-c5b-deployment.json
            /tmp/channel-c5b-production-dns.txt
            /tmp/channel-c5b-production-curl.log
          if-no-files-found: warn
