name: History Overview Browser

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/history-overview.css'
      - 'apps/web/src/live/history-overview.ts'
      - 'apps/web/src/live/history-usability-pass.ts'
      - 'apps/web/scripts/history-overview-browser.mjs'
      - 'apps/web/scripts/history-period-comparison-fixture.mjs'
      - '.github/workflows/history-overview-browser.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/history-overview-preview.log 2>&1 &
          for attempt in {1..40}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/history/ > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/history-overview-preview.log
          exit 1
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run History Overview browser gate
        working-directory: apps/web
        env:
          HISTORY_OVERVIEW_BASE_URL: http://127.0.0.1:4173
          HISTORY_OVERVIEW_ARTIFACT_DIR: artifacts/history-overview
        run: node scripts/history-overview-browser.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: history-overview-artifacts
          path: |
            apps/web/artifacts/history-overview/
            /tmp/history-overview-preview.log
          if-no-files-found: warn
