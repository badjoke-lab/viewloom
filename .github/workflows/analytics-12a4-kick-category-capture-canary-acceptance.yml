name: Analytics 12A4 Kick Category Capture Canary Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-category-capture-canary-acceptance.yml'
      - 'docs/audits/12a4-kick-category-capture-canary-acceptance-contract.json'
      - 'docs/work-in-progress/phase12a4-kick-category-capture-canary-acceptance.md'
      - 'scripts/check-12a4-kick-category-capture-canary-acceptance-scope.mjs'
      - 'scripts/run-12a4-kick-category-capture-canary-acceptance.mjs'
      - 'scripts/verify-12a4-kick-category-capture-canary-acceptance-package.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-category-capture-canary-acceptance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify exact read-only acceptance scope
        run: node scripts/check-12a4-kick-category-capture-canary-acceptance-scope.mjs

      - name: Verify read-only acceptance package
        run: node scripts/verify-12a4-kick-category-capture-canary-acceptance-package.mjs

  read-only-acceptance:
    needs: verify-package
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OUTPUT_DIR: artifacts/12a4-kick-category-canary-acceptance
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - id: probe
        name: Run production read-only Kick canary acceptance probe
        run: node scripts/run-12a4-kick-category-capture-canary-acceptance.mjs

      - name: Upload sanitized read-only acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-12a4-kick-category-canary-readonly-acceptance
          path: artifacts/12a4-kick-category-canary-acceptance/evidence.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish acceptance summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4-11 Kick canary read-only acceptance'
            echo
            echo '- Provider: Kick only'
            echo '- Production mutation from this workflow: no'
            echo '- Worker deployment or rollback: no'
            echo '- D1 operations: aggregate SELECT only'
            echo '- Twitch start: no'
            echo '- Outcome: `${{ steps.probe.outputs.outcome }}`'
          } >> "$GITHUB_STEP_SUMMARY"
