name: Public Surface Inventory

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'docs/audits/public-surface-*.json'
      - 'docs/audits/public-surface-inventory.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/history-ui-repair-plan.md'
      - 'docs/work-in-progress/history-ui-repair-working-note.md'
      - 'docs/README.md'
      - 'scripts/verify-public-surface-inventory.mjs'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-category-rollout-policy.mjs'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'docs/audits/public-surface-*.json'
      - 'docs/audits/public-surface-inventory.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/README.md'
      - 'scripts/verify-public-surface-inventory.mjs'
      - 'scripts/verify-category-rollout-policy.mjs'
      - '.github/workflows/public-surface-inventory.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Detect permanent category rollout
        id: category_gate
        run: |
          rollout=$(node -p "require('./docs/audits/12a2-current-gate-state.json').permanentCategoryCaptureRolloutDecision?.status === 'accepted' ? 'true' : 'false'")
          echo "permanent_rollout=$rollout" >> "$GITHUB_OUTPUT"
      - name: Verify current category rollout policy
        if: steps.category_gate.outputs.permanent_rollout == 'true'
        run: node scripts/verify-category-rollout-policy.mjs
      - name: Verify development policy
        if: steps.category_gate.outputs.permanent_rollout != 'true'
        run: node scripts/verify-development-policy.mjs
      - name: Verify public surface inventory
        run: node scripts/verify-public-surface-inventory.mjs
