name: Release R12C3 Candidate Acceptance

on:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/work-in-progress/phase12-release-readiness.md'
      - 'docs/audits/r12c3-release-candidate-contract.json'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-public-browser-audit-current.mjs'
      - 'scripts/verify-r12c3-release-candidate.mjs'
      - '.github/workflows/release-r12c3-release-candidate.yml'
      - '.github/workflows/development-policy.yml'

concurrency:
  group: release-r12c3-candidate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout candidate head
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify R12C-1 English source package
        run: node scripts/verify-r12c1-launch-copy-package.mjs

      - name: Verify R12C-2 launch asset package
        run: node scripts/verify-r12c2-launch-assets-package.mjs

      - name: Verify public surface inventory
        run: node scripts/verify-public-surface-inventory.mjs

      - name: Verify current public-state handoff
        run: node scripts/verify-public-browser-audit-current.mjs

      - name: Verify R12C-3 candidate contract
        run: node scripts/verify-r12c3-release-candidate.mjs

      - name: Full web typecheck
        run: pnpm typecheck:web

      - name: Production build
        run: pnpm build:web

      - name: Run built public readiness audit
        working-directory: apps/web
        shell: bash
        run: |
          set -o pipefail
          node scripts/public-readiness-audit.mjs 2>&1 | tee /tmp/r12c3-public-readiness.log

      - name: Verify built deployment metadata
        working-directory: apps/web
        run: |
          set -euo pipefail
          test -f dist/deployment.json
          jq -e '
            .schema == "viewloom-deployment-v1" and
            .environment == "local" and
            .branch == null and
            .commit_sha == null
          ' dist/deployment.json > /dev/null

      - name: Verify built not-found contract
        working-directory: apps/web
        run: |
          set -euo pipefail
          test -f dist/404.html
          grep -q 'data-viewloom-not-found="v1"' dist/404.html
          grep -q 'name="robots" content="noindex,follow"' dist/404.html
          grep -q '<title>Page not found | ViewLoom</title>' dist/404.html

      - name: Publish candidate summary
        if: always()
        run: |
          {
            echo '## ViewLoom R12C-3 candidate acceptance'
            echo
            echo '- Candidate contract: checked'
            echo '- Permanent R12C-1/R12C-2 packages: checked'
            echo '- Public inventory: 25 HTML routes / 26 entries'
            echo '- Browser contract: 25 routes x 4 viewports = 100 scenarios'
            echo '- Provider separation: Twitch/Kick distinct bindings and no combined totals/rankings'
            echo '- Legal/support/payment-link ownership: checked by candidate contract'
            echo '- Metadata/canonical/sitemap ownership: checked by candidate contract and Public Readiness'
            echo '- Full typecheck: executed'
            echo '- Production build: executed'
            echo '- Exact main SHA Production Smoke: required after merge'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload R12C-3 candidate diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r12c3-candidate-diagnostics
          path: |
            apps/web/artifacts/public-readiness/**
            /tmp/r12c3-public-readiness.log
          if-no-files-found: warn
