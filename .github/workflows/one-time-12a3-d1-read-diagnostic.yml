name: One-time 12A3 D1 Read Diagnostic

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/one-time-12a3-d1-read-diagnostic.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: viewloom-one-time-12a3-d1-read-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    if: ${{ github.repository == 'badjoke-lab/viewloom' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work-analytics-12a3-d1-read-diagnostic' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      DIAG_DIR: artifacts/12a3-d1-read-diagnostic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler 4
        run: npm install --global wrangler@4

      - name: Require Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Test D1 control-plane reads
        id: d1
        continue-on-error: true
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          mkdir -p "$DIAG_DIR/raw"

          wrangler d1 info vl_twitch_hot --json > "$DIAG_DIR/raw/twitch.json" 2> "$DIAG_DIR/raw/twitch.err"
          twitch_code=$?

          wrangler d1 info vl_kick_hot --json > "$DIAG_DIR/raw/kick.json" 2> "$DIAG_DIR/raw/kick.err"
          kick_code=$?

          wrangler d1 list --json > "$DIAG_DIR/raw/list.json" 2> "$DIAG_DIR/raw/list.err"
          list_code=$?

          classify() {
            local file="$1"
            if grep -Eqi 'permission|unauthorized|forbidden|authentication|authorization|code[": ]+10000|code[": ]+9109' "$file"; then
              printf '%s' 'permission_or_auth'
            elif grep -Eqi 'not found|does not exist' "$file"; then
              printf '%s' 'not_found'
            elif [ -s "$file" ]; then
              printf '%s' 'other_error'
            else
              printf '%s' 'none'
            fi
          }

          twitch_class=$(classify "$DIAG_DIR/raw/twitch.err")
          kick_class=$(classify "$DIAG_DIR/raw/kick.err")
          list_class=$(classify "$DIAG_DIR/raw/list.err")

          node - "$DIAG_DIR/result.json" "$twitch_code" "$kick_code" "$list_code" "$twitch_class" "$kick_class" "$list_class" <<'NODE'
          const fs = require('fs')
          const [path, twitchCode, kickCode, listCode, twitchClass, kickClass, listClass] = process.argv.slice(2)
          const result = {
            schemaVersion: 'viewloom-12a3-d1-read-diagnostic-v1',
            observedAt: new Date().toISOString(),
            credentialsPresent: true,
            secretValuesIncluded: false,
            rawControlPlaneResponsesIncluded: false,
            commands: {
              twitchInfo: { exitCode: Number(twitchCode), classification: twitchClass },
              kickInfo: { exitCode: Number(kickCode), classification: kickClass },
              accountList: { exitCode: Number(listCode), classification: listClass },
            },
          }
          result.allReadsPass = Object.values(result.commands).every((row) => row.exitCode === 0)
          result.d1PermissionLikelyMissing = Object.values(result.commands).some((row) => row.classification === 'permission_or_auth')
          result.nextAction = result.allReadsPass
            ? 'run the permanent 12A-3 account storage gate'
            : result.d1PermissionLikelyMissing
              ? 'add Cloudflare D1 Read permission to the ViewLoom GitHub Actions API token, then rerun'
              : 'inspect the Cloudflare control-plane diagnostic classification before changing permissions'
          fs.writeFileSync(path, `${JSON.stringify(result, null, 2)}\n`)
          NODE

          rm -rf "$DIAG_DIR/raw"
          echo "twitch_code=$twitch_code" >> "$GITHUB_OUTPUT"
          echo "kick_code=$kick_code" >> "$GITHUB_OUTPUT"
          echo "list_code=$list_code" >> "$GITHUB_OUTPUT"
          test "$twitch_code" -eq 0
          test "$kick_code" -eq 0
          test "$list_code" -eq 0

      - name: Upload sanitized diagnostic only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a3-d1-read-diagnostic
          path: artifacts/12a3-d1-read-diagnostic/result.json
          if-no-files-found: warn

      - name: Comment diagnostic result on PR
        if: always()
        shell: bash
        run: |
          if [ ! -f "$DIAG_DIR/result.json" ]; then
            printf '%s\n' 'D1 diagnostic result was not produced.' > /tmp/comment.md
          else
            twitch_code=$(jq -r '.commands.twitchInfo.exitCode' "$DIAG_DIR/result.json")
            kick_code=$(jq -r '.commands.kickInfo.exitCode' "$DIAG_DIR/result.json")
            list_code=$(jq -r '.commands.accountList.exitCode' "$DIAG_DIR/result.json")
            twitch_class=$(jq -r '.commands.twitchInfo.classification' "$DIAG_DIR/result.json")
            kick_class=$(jq -r '.commands.kickInfo.classification' "$DIAG_DIR/result.json")
            list_class=$(jq -r '.commands.accountList.classification' "$DIAG_DIR/result.json")
            all_pass=$(jq -r '.allReadsPass' "$DIAG_DIR/result.json")
            permission_missing=$(jq -r '.d1PermissionLikelyMissing' "$DIAG_DIR/result.json")
            next_action=$(jq -r '.nextAction' "$DIAG_DIR/result.json")
            cat > /tmp/comment.md <<EOF
          ## One-time 12A-3 D1 read diagnostic

          \`\`\`text
          Twitch d1 info: exit=$twitch_code class=$twitch_class
          Kick d1 info: exit=$kick_code class=$kick_class
          Account d1 list: exit=$list_code class=$list_class
          All reads pass: $all_pass
          D1 permission likely missing: $permission_missing
          Next action: $next_action
          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          \`\`\`

          Raw Cloudflare responses, account database names, Account ID, and secret values are not included.
          EOF
          fi
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md

      - name: Fail when D1 reads are unavailable
        if: always()
        shell: bash
        run: |
          test -f "$DIAG_DIR/result.json"
          test "$(jq -r '.allReadsPass' "$DIAG_DIR/result.json")" = true
