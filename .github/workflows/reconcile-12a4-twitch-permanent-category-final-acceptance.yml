name: Reconcile Twitch permanent category final acceptance

on:
  push:
    branches:
      - agent/finalize-twitch-permanent-category-observation
    paths:
      - '.github/workflows/reconcile-12a4-twitch-permanent-category-final-acceptance.yml'
      - 'scripts/reconcile-12a4-twitch-permanent-category-final-acceptance.mjs'
      - 'docs/audits/12a4-twitch-permanent-category-final-acceptance.json'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-twitch-permanent-category-observation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile final acceptance
        run: node scripts/reconcile-12a4-twitch-permanent-category-final-acceptance.mjs
      - name: Commit reconciled current state
        run: |
          if git diff --quiet; then
            echo 'No reconciliation changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/audits/12a2-current-gate-state.json docs/README.md docs/product/current-roadmap.md docs/product/current-schedule.md docs/work-in-progress/phase12a4-twitch-permanent-category-capture.md
          git commit -m 'Advance canonical category gate to Twitch accepted'
          git push origin HEAD:agent/finalize-twitch-permanent-category-observation
