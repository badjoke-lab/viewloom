name: Collector checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'workers/**'
      - 'scripts/verify-collector-contracts.mjs'
      - 'apps/web/functions/_provider-runtime.ts'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/collector-checks.yml'
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'scripts/verify-collector-contracts.mjs'
      - 'apps/web/functions/_provider-runtime.ts'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/collector-checks.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  collector-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Typecheck collectors
        run: pnpm typecheck:collectors
      - name: Verify collector contracts
        run: pnpm verify:collectors
