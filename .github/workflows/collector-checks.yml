name: Collector checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'workers/**'
      - 'scripts/verify-collector-contracts.mjs'
      - 'apps/web/functions/_provider-runtime.ts'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/collector-checks.yml'
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'scripts/verify-collector-contracts.mjs'
      - 'apps/web/functions/_provider-runtime.ts'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/collector-checks.yml'

jobs:
  collector-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck collectors
        run: pnpm typecheck:collectors
      - name: Verify collector contracts
        run: pnpm verify:collectors
