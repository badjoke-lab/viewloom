name: Analytics 12A4 Kick Category Capture Canary Post-Rollback Acceptance Retired

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-kick-category-capture-canary-post-rollback-acceptance.yml'
      - 'docs/audits/12a2-current-gate-state.json'
      - 'docs/audits/12a4-kick-category-capture-canary-post-rollback-acceptance-contract.json'
      - 'docs/audits/12a4-kick-category-capture-canary-post-rollback-evidence.json'
      - 'docs/work-in-progress/phase12a4-kick-category-capture-canary-post-rollback-acceptance.md'
      - 'scripts/check-12a4-kick-category-capture-canary-post-rollback-acceptance-scope.mjs'
      - 'scripts/verify-12a4-kick-category-capture-canary-post-rollback-acceptance-package.mjs'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-public-browser-audit-current.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-kick-category-capture-canary-post-rollback-acceptance-retired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-retired-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify retirement scope
        if: github.event_name == 'pull_request'
        run: node scripts/check-12a4-kick-category-capture-canary-post-rollback-acceptance-scope.mjs
      - name: Verify accepted and retired post-rollback package
        run: node scripts/verify-12a4-kick-category-capture-canary-post-rollback-acceptance-package.mjs
      - name: Verify canonical development policy
        run: node scripts/verify-development-policy.mjs
      - name: Verify current public handoff state
        run: node scripts/verify-public-browser-audit-current.mjs
      - name: Publish retirement summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4-12 Kick post-rollback acceptance retired'
            echo
            echo '- Final artifact: 8399137444'
            echo '- Outcome: accepted'
            echo '- Frozen evidence: docs/audits/12a4-kick-category-capture-canary-post-rollback-evidence.json'
            echo '- Current public handoff state: verified'
            echo '- Production read-only probe job: removed'
            echo '- Cloudflare credentials referenced: no'
            echo '- D1 or Worker production call: no'
            echo '- Permanent category enablement: no'
            echo '- Twitch start: no'
          } >> "$GITHUB_STEP_SUMMARY"
