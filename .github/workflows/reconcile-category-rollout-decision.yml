name: Reconcile category rollout decision

on:
  push:
    branches:
      - agent/category-permanent-rollout-decision
    paths:
      - '.github/workflows/reconcile-category-rollout-decision.yml'
      - 'scripts/reconcile-category-rollout-gate.mjs'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile canonical gate
        run: node scripts/reconcile-category-rollout-gate.mjs
      - name: Validate generated gate
        run: |
          node -e "const g=require('./docs/audits/12a2-current-gate-state.json'); if(g.schemaVersion!=='viewloom-12a2-current-gate-state-v23'||g.currentWorkstream.phase!=='12A-4-19') process.exit(1)"
          git diff --check
      - name: Commit generated gate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/audits/12a2-current-gate-state.json
          git commit -m 'Advance category rollout gate to 12A-4-19'
          git push origin HEAD:agent/category-permanent-rollout-decision
