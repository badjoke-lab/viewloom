name: Reconcile category rollout decision

on:
  push:
    branches:
      - agent/category-permanent-rollout-decision
    paths:
      - '.github/workflows/reconcile-category-rollout-decision.yml'
      - 'scripts/reconcile-category-rollout-gate.mjs'
      - 'scripts/reconcile-category-rollout-policy.mjs'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile canonical gate when needed
        run: |
          version=$(node -p "require('./docs/audits/12a2-current-gate-state.json').schemaVersion")
          if [ "$version" = 'viewloom-12a2-current-gate-state-v22' ]; then
            node scripts/reconcile-category-rollout-gate.mjs
          else
            test "$version" = 'viewloom-12a2-current-gate-state-v23'
          fi
      - name: Reconcile policy and verifier when available
        run: |
          if [ -f scripts/reconcile-category-rollout-policy.mjs ]; then
            node scripts/reconcile-category-rollout-policy.mjs
          fi
      - name: Validate generated state
        run: |
          node -e "const g=require('./docs/audits/12a2-current-gate-state.json'); if(g.schemaVersion!=='viewloom-12a2-current-gate-state-v23'||g.currentWorkstream.phase!=='12A-4-19') process.exit(1)"
          if [ -f scripts/reconcile-category-rollout-policy.mjs ]; then
            node scripts/verify-development-policy.mjs
          fi
          git diff --check
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/audits/12a2-current-gate-state.json docs/operations/development-and-deployment-policy.md .github/workflows/development-policy.yml scripts/verify-development-policy.mjs docs/product/category-capture-permanent-rollout-spec.md
          git commit -m 'Reconcile category rollout source of truth'
          git push origin HEAD:agent/category-permanent-rollout-decision
