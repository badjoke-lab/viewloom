name: Development policy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'workers/collector-twitch/**'
      - 'workers/collector-kick/**'
      - 'db/d1/**'
      - 'apps/web/docs/**'
      - 'apps/web/public/launch-assets/**'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-development-policy-active-twitch-canary.mjs'
      - 'scripts/verify-category-rollout-policy.mjs'
      - 'scripts/verify-12a4-twitch-category-capture-canary-trigger-package.mjs'
      - 'scripts/verify-r12c1-launch-copy-package.mjs'
      - 'scripts/verify-r12c2-launch-assets-package.mjs'
      - 'scripts/verify-r12c3-release-candidate.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'workers/collector-twitch/**'
      - 'workers/collector-kick/**'
      - 'db/d1/**'
      - 'apps/web/docs/**'
      - 'apps/web/public/launch-assets/**'
      - 'scripts/verify-development-policy.mjs'
      - 'scripts/verify-development-policy-active-twitch-canary.mjs'
      - 'scripts/verify-category-rollout-policy.mjs'
      - 'scripts/verify-12a4-twitch-category-capture-canary-trigger-package.mjs'
      - 'scripts/verify-r12c1-launch-copy-package.mjs'
      - 'scripts/verify-r12c2-launch-assets-package.mjs'
      - 'scripts/verify-r12c3-release-candidate.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Detect current category gate
        id: category_gate
        shell: bash
        run: |
          schema=$(node -p "require('./docs/audits/12a2-current-gate-state.json').schemaVersion")
          rollout=$(node -p "require('./docs/audits/12a2-current-gate-state.json').permanentCategoryCaptureRolloutDecision?.status === 'accepted' ? 'true' : 'false'")
          echo "schema=$schema" >> "$GITHUB_OUTPUT"
          echo "permanent_rollout=$rollout" >> "$GITHUB_OUTPUT"
      - name: Detect exact or active Twitch trigger
        id: trigger_scope
        if: steps.category_gate.outputs.permanent_rollout != 'true'
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          trigger='docs/audits/12a4-twitch-category-capture-canary-trigger.json'
          if [ -n "$GITHUB_BASE_REF" ]; then
            merge_base=$(git merge-base HEAD "origin/$GITHUB_BASE_REF")
            changed=$(git diff --name-only "$merge_base...HEAD")
          elif [[ "$GITHUB_EVENT_BEFORE" =~ ^[0-9a-fA-F]{40}$ ]] && [[ ! "$GITHUB_EVENT_BEFORE" =~ ^0+$ ]]; then
            changed=$(git diff --name-only "$GITHUB_EVENT_BEFORE...HEAD")
          else
            changed=$(git diff --name-only HEAD^...HEAD)
          fi
          count=$(printf '%s\n' "$changed" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$count" = '1' ] && [ "$changed" = "$trigger" ]; then
            echo 'exact=true' >> "$GITHUB_OUTPUT"
          else
            echo 'exact=false' >> "$GITHUB_OUTPUT"
          fi
          if [ -f "$trigger" ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Verify permanent category rollout policy
        if: steps.category_gate.outputs.permanent_rollout == 'true'
        run: node scripts/verify-category-rollout-policy.mjs | tee development-policy.log
      - name: Verify development policy
        if: steps.category_gate.outputs.permanent_rollout != 'true' && steps.trigger_scope.outputs.exact != 'true' && steps.trigger_scope.outputs.present != 'true'
        shell: bash
        run: |
          set +e
          node scripts/verify-development-policy.mjs > development-policy.log 2>&1
          status=$?
          cat development-policy.log
          exit $status
      - name: Verify development policy with armed Twitch canary
        if: steps.category_gate.outputs.permanent_rollout != 'true' && steps.trigger_scope.outputs.exact != 'true' && steps.trigger_scope.outputs.present == 'true'
        shell: bash
        run: |
          set +e
          node scripts/verify-development-policy-active-twitch-canary.mjs > development-policy.log 2>&1
          status=$?
          cat development-policy.log
          exit $status
      - name: Verify exact Twitch trigger package
        if: steps.category_gate.outputs.permanent_rollout != 'true' && steps.trigger_scope.outputs.exact == 'true'
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node scripts/verify-12a4-twitch-category-capture-canary-trigger-package.mjs | tee development-policy.log
      - name: Verify R12C-1 launch copy package
        run: node scripts/verify-r12c1-launch-copy-package.mjs
      - name: Verify R12C-2 launch asset package
        run: node scripts/verify-r12c2-launch-assets-package.mjs
      - name: Verify R12C-3 release candidate contract
        run: node scripts/verify-r12c3-release-candidate.mjs
      - name: Upload development policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-policy-diagnostics
          path: development-policy.log
