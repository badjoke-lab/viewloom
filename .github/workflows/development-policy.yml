name: Development policy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  u10g-responsive-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'work-quality-u10g-architecture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Preserve requested Battle Lines layout
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/src/live/battle-lines-current-shell-entry.ts')
          source = path.read_text()
          before = """  window.addEventListener('resize', () => {
    if (state.layout === 'split' && !canUseBattleLinesSplit()) {
      state.layout = 'wide'
      state.layoutInUrl = true
      syncUrl()
    }
    syncControls()
    renderBattleLinesSplitRail()
  })"""
          after = """  window.addEventListener('resize', () => {
    syncControls()
    renderBattleLinesSplitRail()
  })"""
          if before in source:
              path.write_text(source.replace(before, after))
          elif after not in source:
              raise SystemExit('Expected Battle Lines resize ownership block was not found.')
          PY
          git diff --check
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Preserve Battle Lines requested layout
          file_pattern: apps/web/src/live/battle-lines-current-shell-entry.ts

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify development policy
        shell: bash
        run: |
          set +e
          node scripts/verify-development-policy.mjs > development-policy.log 2>&1
          status=$?
          cat development-policy.log
          exit $status
      - name: Upload development policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-policy-diagnostics
          path: development-policy.log
