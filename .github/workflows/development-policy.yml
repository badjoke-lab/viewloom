name: Development policy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify development policy
        shell: bash
        run: |
          set +e
          node scripts/verify-development-policy.mjs > development-policy.log 2>&1
          status=$?
          cat development-policy.log
          exit $status
      - name: Upload development policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-policy-diagnostics
          path: development-policy.log
