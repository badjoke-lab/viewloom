name: Development policy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'docs/**'
      - 'apps/web/docs/**'
      - 'scripts/verify-development-policy.mjs'
      - '.github/pull_request_template.md'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  u10g-patch-artifact:
    if: github.event_name == 'pull_request' && github.head_ref == 'work-quality-u10g-architecture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply guarded architecture patch
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/u10g_patch_architecture.mjs')
          source = path.read_text()
          source = source.replace('${endpoint}', r'\${endpoint}')
          path.write_text(source)
          PY
          node scripts/u10g_patch_architecture.mjs > u10g-patch.log 2>&1
          status=$?
          cat u10g-patch.log
          git diff --check >> u10g-patch.log 2>&1
          diff_status=$?
          if [ "$status" -ne 0 ]; then exit "$status"; fi
          exit "$diff_status"
      - name: Upload patch diagnostics and generated files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u10g-patched-controllers
          path: |
            u10g-patch.log
            apps/web/src/live/day-flow-current-shell-entry.ts
            apps/web/src/live/battle-lines-current-shell-entry.ts
            apps/web/twitch/day-flow/index.html
            apps/web/kick/day-flow/index.html
            apps/web/twitch/battle-lines/index.html
            apps/web/kick/battle-lines/index.html
          if-no-files-found: error

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify development policy
        shell: bash
        run: |
          set +e
          node scripts/verify-development-policy.mjs > development-policy.log 2>&1
          status=$?
          cat development-policy.log
          exit $status
      - name: Upload development policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: development-policy-diagnostics
          path: development-policy.log
