name: Analytics 12A4 Twitch Attempt 3 Checkpoint Reconcile

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/analytics-12a4-twitch-attempt3-checkpoint-reconcile.yml'
      - 'docs/audits/12a4-twitch-attempt3-checkpoint-reconcile-request.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-attempt-3-start-evidence.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-attempt-3-initial-checkpoint-evidence.json'
      - 'scripts/reconcile-12a4-twitch-attempt3-records.mjs'
      - 'scripts/reconcile-12a4-twitch-attempt3-docs.mjs'
      - 'scripts/reconcile-12a4-twitch-attempt3-development-verifiers.mjs'
      - 'scripts/reconcile-12a4-twitch-attempt3-execution-verifier.mjs'
  push:
    branches: [main]
    paths:
      - 'docs/audits/12a4-twitch-attempt3-checkpoint-reconcile-request.json'

permissions:
  contents: write

concurrency:
  group: analytics-12a4-twitch-attempt3-checkpoint-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile accepted attempt 3 records
        run: node scripts/reconcile-12a4-twitch-attempt3-records.mjs
      - name: Reconcile source-of-truth documentation
        run: node scripts/reconcile-12a4-twitch-attempt3-docs.mjs
      - name: Reconcile development verifiers
        run: node scripts/reconcile-12a4-twitch-attempt3-development-verifiers.mjs
      - name: Reconcile execution verifier
        run: node scripts/reconcile-12a4-twitch-attempt3-execution-verifier.mjs
      - name: Verify active canonical policy
        run: node scripts/verify-development-policy-active-twitch-canary.mjs
      - name: Verify active execution package
        run: node scripts/verify-12a4-twitch-category-capture-canary-execution-package.mjs
      - name: Verify generated diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --name-only > /tmp/viewloom-attempt3-generated-files.txt
          cat /tmp/viewloom-attempt3-generated-files.txt
          expected=$(cat <<'EOF'
          docs/README.md
          docs/audits/12a2-current-gate-state.json
          docs/audits/12a4-twitch-category-capture-canary-execution-contract.json
          docs/product/current-roadmap.md
          docs/product/current-schedule.md
          docs/work-in-progress/phase12a4-twitch-category-capture-canary-execution.md
          scripts/verify-12a4-twitch-category-capture-canary-execution-package.mjs
          scripts/verify-development-policy-active-twitch-canary.mjs
          scripts/verify-development-policy.mjs
          EOF
          )
          test "$(sort /tmp/viewloom-attempt3-generated-files.txt)" = "$(printf '%s\n' "$expected" | sed 's/^          //' | sort)"
      - name: Commit reconciled source of truth
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/README.md \
            docs/audits/12a2-current-gate-state.json \
            docs/audits/12a4-twitch-category-capture-canary-execution-contract.json \
            docs/product/current-roadmap.md \
            docs/product/current-schedule.md \
            docs/work-in-progress/phase12a4-twitch-category-capture-canary-execution.md \
            scripts/verify-12a4-twitch-category-capture-canary-execution-package.mjs \
            scripts/verify-development-policy-active-twitch-canary.mjs \
            scripts/verify-development-policy.mjs
          git commit -m 'Accept Twitch attempt 3 initial checkpoint'
          git push origin HEAD:main
