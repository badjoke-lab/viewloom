name: Analytics 12A4 Twitch Category Canary Storage Preflight Acceptance

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-twitch-category-capture-canary-storage-preflight.yml'
      - '.github/workflows/analytics-12a4-twitch-category-capture-canary-storage-preflight-reporting.yml'
      - 'docs/audits/12a4-twitch-category-capture-canary-storage-preflight-contract.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-storage-preflight-evidence.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-storage-preflight-request.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-storage-preflight-reporting-request.json'
      - 'docs/audits/12a4-twitch-category-capture-canary-storage-preflight-diagnostic-marker.json'
      - 'docs/work-in-progress/phase12a4-twitch-category-capture-canary-storage-preflight.md'
      - 'scripts/check-12a4-twitch-category-capture-canary-storage-preflight-scope.mjs'
      - 'scripts/verify-12a4-twitch-category-capture-canary-storage-preflight-package.mjs'
      - 'scripts/test-12a4-twitch-category-capture-canary-storage-preflight.mjs'
      - 'scripts/verify-development-policy.mjs'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-twitch-category-capture-canary-storage-preflight-acceptance-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  verify-acceptance-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify exact acceptance and retirement scope
        run: node scripts/check-12a4-twitch-category-capture-canary-storage-preflight-scope.mjs
      - name: Verify accepted evidence candidate
        run: node scripts/verify-12a4-twitch-category-capture-canary-storage-preflight-package.mjs
      - name: Verify parser and read-only fixtures
        run: node scripts/test-12a4-twitch-category-capture-canary-storage-preflight.mjs
      - name: Verify canonical development policy
        run: node scripts/verify-development-policy.mjs
      - name: Publish acceptance summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4-15 Twitch storage preflight acceptance candidate'
            echo
            echo '- Accepted observation run: 29598193753'
            echo '- Accepted observation job: 87943655515'
            echo '- Evidence artifact: 8413901173'
            echo '- Evidence digest: sha256:0c7de9e6d71027b9b040c348f017d413908e631b01718d347b72d2ae8700f943'
            echo '- Current Twitch D1: 325.90 MB'
            echo '- Projected Twitch 90-day size: 374.22 MB'
            echo '- Projected Twitch headroom: 75.78 MB'
            echo '- Projected account-wide headroom: 894.34 MB'
            echo '- All read-only gates: pass'
            echo '- Production observation paths: retired'
            echo '- Twitch trigger: absent'
            echo '- Runtime category capture: not authorized'
          } >> "$GITHUB_STEP_SUMMARY"
