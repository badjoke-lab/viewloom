name: Watchlist History

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/live/watchlist/history-*.ts'
      - 'apps/web/src/live/watchlist/combined-*.ts'
      - 'apps/web/scripts/verify-watchlist-history.mjs'
      - 'apps/web/scripts/watchlist-history-*.mjs'
      - 'apps/web/scripts/watchlist-combined-*.mjs'
      - 'apps/web/docs/watchlist-history-w2b-contract.md'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - '.github/workflows/watchlist-history.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/live/watchlist/history-*.ts'
      - 'apps/web/src/live/watchlist/combined-*.ts'
      - 'apps/web/scripts/verify-watchlist-history.mjs'
      - 'apps/web/scripts/watchlist-history-*.mjs'
      - 'apps/web/scripts/watchlist-combined-*.mjs'
      - 'apps/web/docs/watchlist-history-w2b-contract.md'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - '.github/workflows/watchlist-history.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app
      - name: Verify Watchlist History contract
        shell: bash
        working-directory: apps/web
        run: |
          set +e
          node scripts/verify-watchlist-history.mjs > watchlist-history.log 2>&1
          status=$?
          cat watchlist-history.log
          exit $status
      - name: Upload Watchlist History diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-history-diagnostics
          path: apps/web/watchlist-history.log
