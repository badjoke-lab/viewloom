name: Channel Overview Browser
on:
  workflow_dispatch:
  pull_request:
concurrency:
  group: channel-overview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/channel-overview-preview.log 2>&1 &
          for attempt in {1..40}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/channel/ > /dev/null && exit 0
            sleep 1
          done
          exit 1
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: node scripts/channel-overview-browser.mjs 2>&1 | tee /tmp/channel-overview-browser.log
        working-directory: apps/web
        env:
          CHANNEL_BASE_URL: http://127.0.0.1:4173
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: channel-overview-artifacts
          path: |
            /tmp/channel-overview-twitch-desktop.png
            /tmp/channel-overview-kick-mobile.png
            /tmp/channel-overview-browser.log
            /tmp/channel-overview-preview.log
          if-no-files-found: warn
