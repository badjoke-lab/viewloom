name: Public Readiness Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '23 2 * * 1'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package.json'
      - '.github/workflows/public-readiness-audit.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'package.json'
      - '.github/workflows/public-readiness-audit.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - name: Audit built public pages
        working-directory: apps/web
        run: |
          set -o pipefail
          node scripts/public-readiness-audit.mjs 2>&1 | tee /tmp/public-readiness-audit.log
      - name: Verify linked changelog data
        working-directory: apps/web
        run: test -f dist/data/changelog.json
      - name: Verify explicit not-found page
        working-directory: apps/web
        run: |
          set -euo pipefail
          test -f dist/404.html
          grep -q 'data-viewloom-not-found="v1"' dist/404.html
          grep -q 'name="robots" content="noindex,follow"' dist/404.html
          grep -q '<title>Page not found | ViewLoom</title>' dist/404.html
      - name: Verify deployment metadata
        working-directory: apps/web
        run: |
          set -euo pipefail
          test -f dist/deployment.json
          jq -e '
            .schema == "viewloom-deployment-v1" and
            .environment == "local" and
            .branch == null and
            .commit_sha == null
          ' dist/deployment.json > /dev/null
      - name: Publish audit summary
        if: always()
        run: |
          if [ -f apps/web/artifacts/public-readiness/report.md ]; then
            cat apps/web/artifacts/public-readiness/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: public-readiness-audit
          path: |
            apps/web/artifacts/public-readiness/
            /tmp/public-readiness-audit.log
          if-no-files-found: warn
