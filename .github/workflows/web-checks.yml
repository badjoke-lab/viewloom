name: Web checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck web
        shell: bash
        run: |
          set +e
          pnpm typecheck:web > web-checks-typecheck.log 2>&1
          status=$?
          cat web-checks-typecheck.log
          exit $status

      - name: Build web
        shell: bash
        run: |
          set +e
          pnpm build:web > web-checks-build.log 2>&1
          status=$?
          cat web-checks-build.log
          exit $status

      - name: Verify Heatmap page boundaries
        run: pnpm --filter @viewloom/web verify:heatmap-boundaries

      - name: Verify Heatmap data-state truth
        run: pnpm --filter @viewloom/web verify:heatmap-data-state

      - name: Verify Heatmap Wide-first layout
        run: pnpm --filter @viewloom/web verify:heatmap-wide-layout

      - name: Verify Heatmap dense field
        run: pnpm --filter @viewloom/web verify:heatmap-dense-field

      - name: Verify Heatmap semantic LOD
        run: pnpm --filter @viewloom/web verify:heatmap-semantic-lod

      - name: Verify Heatmap camera controls
        run: pnpm --filter @viewloom/web verify:heatmap-camera-controls

      - name: Upload web checks logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-checks-logs
          path: |
            web-checks-typecheck.log
            web-checks-build.log
