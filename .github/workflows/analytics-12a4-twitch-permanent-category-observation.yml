name: Analytics 12A4 Twitch Permanent Category Observation

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-twitch-permanent-category-observation.yml'
      - 'docs/audits/12a4-twitch-permanent-category-observation-contract.json'
      - 'docs/audits/12a4-twitch-permanent-category-start-acceptance.json'
      - 'scripts/evaluate-12a4-twitch-permanent-category-observation.mjs'
      - 'scripts/run-12a4-twitch-permanent-category-observation-rollback.mjs'
      - 'scripts/test-12a4-twitch-permanent-category-observation.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/analytics-12a4-twitch-permanent-category-observation.yml'
      - 'docs/audits/12a4-twitch-permanent-category-observation-contract.json'
      - 'docs/audits/12a4-twitch-permanent-category-start-acceptance.json'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-twitch-permanent-category-observation-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'production' }}
  cancel-in-progress: false

jobs:
  verify-package:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Run observation gate fixtures
        run: node scripts/test-12a4-twitch-permanent-category-observation.mjs
      - name: Parse observation and rollback scripts
        run: |
          node --check scripts/evaluate-12a4-twitch-permanent-category-observation.mjs
          node --check scripts/run-12a4-twitch-permanent-category-observation-rollback.mjs
      - name: Verify collector typecheck
        run: pnpm typecheck:collectors
      - name: Bundle permanent Twitch collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-twitch/wrangler.category-permanent.toml
      - name: Bundle normal Twitch rollback collector without publishing
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/collector-twitch/wrangler.toml

  observe:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OUTPUT_DIR: artifacts/12a4-twitch-permanent-category-observation
      START_AT: '2026-07-20T11:40:00.000Z'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - id: observer
        name: Run read-only Twitch production observation
        continue-on-error: true
        run: MODE=observe OUTPUT_DIR="$OUTPUT_DIR/observer" START_AT="$START_AT" node scripts/run-12a4-twitch-permanent-category-observer.mjs
      - id: evaluate
        name: Evaluate warning and hard-stop gates
        continue-on-error: true
        run: |
          node scripts/evaluate-12a4-twitch-permanent-category-observation.mjs \
            --evidence "$OUTPUT_DIR/observer/evidence-observe.json" \
            --output "$OUTPUT_DIR/evaluation.json"
      - name: Restore normal Twitch config on hard stop
        if: steps.evaluate.outputs.rollback_required == 'true'
        env:
          OUTPUT_DIR: artifacts/12a4-twitch-permanent-category-observation/rollback
        run: node scripts/run-12a4-twitch-permanent-category-observation-rollback.mjs
      - name: Upload sanitized observation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-12a4-twitch-permanent-category-observation
          path: artifacts/12a4-twitch-permanent-category-observation/**/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish observation summary
        if: always()
        run: |
          {
            echo '## ViewLoom Twitch permanent category observation'
            echo
            echo '- Provider: Twitch only'
            echo '- Classification: `${{ steps.evaluate.outputs.classification }}`'
            echo '- Read-only observation: yes'
            echo '- Automatic normal-config restoration on hard stop: yes'
            echo '- Existing Worker cadence: five minutes'
            echo '- New Worker schedule: no'
            echo '- Kick change: no'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail after hard-stop containment
        if: steps.evaluate.outputs.rollback_required == 'true'
        run: exit 1
