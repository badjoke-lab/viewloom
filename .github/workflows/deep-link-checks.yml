name: Deep link checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/navigation/deep-link-contract.ts'
      - 'apps/web/src/live/day-flow-current-shell-entry.ts'
      - 'apps/web/src/live/battle-lines-current-shell-entry.ts'
      - 'apps/web/scripts/verify-deep-link-contract.mjs'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/deep-link-checks.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/navigation/deep-link-contract.ts'
      - 'apps/web/src/live/day-flow-current-shell-entry.ts'
      - 'apps/web/src/live/battle-lines-current-shell-entry.ts'
      - 'apps/web/scripts/verify-deep-link-contract.mjs'
      - '.github/actions/setup-node-pnpm/action.yml'
      - '.github/workflows/deep-link-checks.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm --filter @viewloom/web typecheck:app
      - run: node scripts/verify-deep-link-contract.mjs
        working-directory: apps/web
