name: Deep link checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/navigation/deep-link-contract.ts'
      - 'apps/web/src/live/day-flow-current-shell-entry.ts'
      - 'apps/web/src/live/battle-lines-current-shell-entry.ts'
      - 'apps/web/scripts/verify-deep-link-contract.mjs'
      - '.github/workflows/deep-link-checks.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/navigation/deep-link-contract.ts'
      - 'apps/web/src/live/day-flow-current-shell-entry.ts'
      - 'apps/web/src/live/battle-lines-current-shell-entry.ts'
      - 'apps/web/scripts/verify-deep-link-contract.mjs'
      - '.github/workflows/deep-link-checks.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @viewloom/web typecheck:app
      - run: node scripts/verify-deep-link-contract.mjs
        working-directory: apps/web
