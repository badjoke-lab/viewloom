name: Analytics 12A4 Twitch Permanent Category Start Verification

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-twitch-permanent-category-start-verification.yml'

permissions:
  contents: read

concurrency:
  group: analytics-12a4-twitch-permanent-category-start-verification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-start:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OUTPUT_DIR: artifacts/12a4-twitch-permanent-category-start-verification
      START_AT: '2026-07-20T11:40:00.000Z'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Wait for the first post-release category snapshots
        run: |
          node --input-type=module <<'NODE'
          const target = Date.parse('2026-07-20T11:48:00.000Z')
          while (Date.now() < target) {
            await new Promise((resolve) => setTimeout(resolve, Math.min(target - Date.now(), 60_000)))
          }
          NODE
      - id: observe
        name: Poll read-only production observation
        continue-on-error: true
        run: |
          set +e
          mkdir -p "$OUTPUT_DIR"
          last_file=''
          for attempt in $(seq 1 15); do
            attempt_dir="$OUTPUT_DIR/attempt-$attempt"
            MODE=observe OUTPUT_DIR="$attempt_dir" START_AT="$START_AT" node scripts/run-12a4-twitch-permanent-category-observer.mjs
            file="$attempt_dir/evidence-observe.json"
            last_file="$file"
            accepted=$(node -e "const fs=require('fs'); const p=process.argv[1]; if(fs.existsSync(p)&&JSON.parse(fs.readFileSync(p,'utf8')).outcome==='accepted') process.stdout.write('yes')" "$file")
            if [ "$accepted" = 'yes' ]; then
              cp "$file" "$OUTPUT_DIR/evidence-observe.json"
              exit 0
            fi
            if [ "$attempt" -lt 15 ]; then sleep 60; fi
          done
          if [ -n "$last_file" ] && [ -f "$last_file" ]; then
            cp "$last_file" "$OUTPUT_DIR/evidence-observe.json"
          fi
          exit 1
      - name: Upload sanitized observation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-12a4-twitch-permanent-category-start-verification
          path: artifacts/12a4-twitch-permanent-category-start-verification/**/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Require accepted permanent-category start state
        if: always()
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const file = 'artifacts/12a4-twitch-permanent-category-start-verification/evidence-observe.json'
          if (!fs.existsSync(file)) throw new Error('observation_evidence_missing')
          const evidence = JSON.parse(fs.readFileSync(file, 'utf8'))
          console.log(JSON.stringify({
            outcome: evidence.outcome,
            bindings: evidence.bindings,
            storage: evidence.storage,
            data: evidence.data,
            gates: evidence.gates,
            error: evidence.error,
          }, null, 2))
          if (evidence.outcome !== 'accepted') process.exit(1)
          NODE
