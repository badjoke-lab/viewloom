name: Shared Output Contracts

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck output modules and adoption
        run: pnpm --filter @viewloom/web typecheck:app

      - name: Verify shared output R1 contract
        working-directory: apps/web
        run: node scripts/verify-shared-output-r1.mjs

      - name: Verify exact History R2 outputs
        working-directory: apps/web
        run: node scripts/verify-history-output-r2.mjs
