name: Analytics 12A4 Category Read-Only Preflight Retired

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/analytics-12a4-category-readonly-preflight.yml'
      - 'docs/audits/12a4-category-readonly-preflight-contract.json'
      - 'docs/audits/12a4-category-readonly-preflight-trigger.json'
      - 'docs/audits/12a4-category-readonly-preflight-evidence.json'
      - 'docs/work-in-progress/phase12a4-category-readonly-preflight-acceptance.md'
      - 'scripts/verify-12a4-category-readonly-preflight-package.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-12a4-category-readonly-preflight-retired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-retired-package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify accepted and retired preflight package
        run: node scripts/verify-12a4-category-readonly-preflight-package.mjs

      - name: Bundle Twitch preflight Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.twitch.toml

      - name: Bundle Kick preflight Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.kick.toml

      - name: Publish retirement summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4 Read-Only Production Preflight'
            echo
            echo '- Accepted evidence: PR #523'
            echo '- Trigger status: consumed and retired'
            echo '- Production push trigger: removed'
            echo '- Production deployment job: removed'
            echo '- Temporary Worker deployment from this workflow: no'
            echo '- Wrangler bundles: dry-run only'
            echo '- Remote migration: no'
            echo '- Category runtime capture: disabled'
          } >> "$GITHUB_STEP_SUMMARY"
