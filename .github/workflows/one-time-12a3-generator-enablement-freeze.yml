name: One-time 12A3 Generator Enablement Evidence Freeze

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/one-time-12a3-generator-enablement-freeze.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: analytics-12a3-generator-enablement-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  accept-freeze-cleanup:
    if: >-
      github.repository == 'badjoke-lab/viewloom'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.head_ref == 'work-analytics-12a3-enable-generator'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RAW_DIR: artifacts/12a3-generator-enablement/raw
      ARTIFACT_DIR: artifacts/12a3-generator-enablement
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler 4
        run: npm install --global wrangler@4

      - name: Require Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Prepare ephemeral acceptance token and configs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RAW_DIR"
          token=$(openssl rand -hex 32)
          echo "::add-mask::$token"
          echo "ACCEPTANCE_TOKEN=$token" >> "$GITHUB_ENV"
          python - "$token" <<'PY'
          from pathlib import Path
          import sys
          token = sys.argv[1]
          root = Path('workers/analytics-generator-acceptance')
          for provider in ('twitch', 'kick'):
              source = (root / f'wrangler.{provider}.toml').read_text()
              runtime = source.replace('[vars]\n', f'[vars]\nACCEPTANCE_TOKEN = "{token}"\n', 1)
              (root / f'.runtime.{provider}.toml').write_text(runtime)
          PY

      - name: Deploy and run provider acceptance Workers
        shell: bash
        run: |
          set +e
          cd workers/analytics-generator-acceptance
          run_provider() {
            provider="$1"
            config=".runtime.${provider}.toml"
            log="$GITHUB_WORKSPACE/$RAW_DIR/${provider}-deploy.log"
            result="$GITHUB_WORKSPACE/$RAW_DIR/${provider}.json"
            wrangler deploy --config "$config" > "$log" 2>&1
            deploy_code=$?
            url=$(sed -E 's/\x1B\[[0-9;]*[mK]//g' "$log" | grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' | tail -n 1)
            run_code=1
            curl_code=1
            http_code=000
            if [ "$deploy_code" -eq 0 ] && [ -n "$url" ]; then
              for attempt in $(seq 1 6); do
                tmp="${result}.attempt"
                http_code=$(curl --silent --show-error --output "$tmp" --write-out '%{http_code}' \
                  -X POST -H "Authorization: Bearer $ACCEPTANCE_TOKEN" "$url/run")
                curl_code=$?
                if [ "$curl_code" -eq 0 ] && [ "$http_code" = '200' ]; then
                  mv "$tmp" "$result"
                  run_code=0
                  break
                fi
                if [ "$attempt" -eq 6 ]; then mv "$tmp" "$result"; else rm -f "$tmp"; sleep 2; fi
              done
            fi
            printf '%s %s %s %s\n' "$deploy_code" "$run_code" "$curl_code" "${http_code:-000}" \
              > "$GITHUB_WORKSPACE/$RAW_DIR/${provider}-codes.txt"
          }
          run_provider twitch
          run_provider kick
          exit 0

      - name: Delete temporary services and record lifecycle
        if: always()
        shell: bash
        run: |
          set +e
          delete_service() {
            provider="$1"
            worker="$2"
            response="$RAW_DIR/${provider}-delete.json"
            http=$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
              -X DELETE -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/services/$worker?force=true")
            curl_code=$?
            success=$(jq -r '.success == true' "$response" 2>/dev/null || printf 'false')
            delete_code=1
            if [ "$curl_code" -eq 0 ] && [ "$http" = '200' ] && [ "$success" = 'true' ]; then delete_code=0; fi
            printf '%s %s %s\n' "$delete_code" "$curl_code" "${http:-000}" > "$RAW_DIR/${provider}-delete-codes.txt"
          }
          delete_service twitch viewloom-generator-acceptance-twitch
          delete_service kick viewloom-generator-acceptance-kick
          rm -f workers/analytics-generator-acceptance/.runtime.*.toml

          read td tr trc trh < "$RAW_DIR/twitch-codes.txt" 2>/dev/null || true
          read kd kr krc krh < "$RAW_DIR/kick-codes.txt" 2>/dev/null || true
          read tdel tdelc tdelh < "$RAW_DIR/twitch-delete-codes.txt" 2>/dev/null || true
          read kdel kdelc kdelh < "$RAW_DIR/kick-delete-codes.txt" 2>/dev/null || true
          node - "$RAW_DIR/lifecycle.json" \
            "${td:-1}" "${tr:-1}" "${trc:-1}" "${trh:-000}" "${tdel:-1}" "${tdelc:-1}" "${tdelh:-000}" \
            "${kd:-1}" "${kr:-1}" "${krc:-1}" "${krh:-000}" "${kdel:-1}" "${kdelc:-1}" "${kdelh:-000}" <<'NODE'
          const fs = require('fs')
          const n = process.argv.slice(3).map(Number)
          const [td,tr,trc,trh,tdel,tdelc,tdelh,kd,kr,krc,krh,kdel,kdelc,kdelh] = n
          fs.writeFileSync(process.argv[2], JSON.stringify({
            twitch:{deployExitCode:td,runExitCode:tr,runCurlExitCode:trc,runHttpStatus:trh,deleteExitCode:tdel,deleteCurlExitCode:tdelc,deleteHttpStatus:tdelh},
            kick:{deployExitCode:kd,runExitCode:kr,runCurlExitCode:krc,runHttpStatus:krh,deleteExitCode:kdel,deleteCurlExitCode:kdelc,deleteHttpStatus:kdelh}
          }, null, 2) + '\n')
          NODE
          exit 0

      - name: Normalize and verify observed evidence
        run: |
          node scripts/collect-12a3-generator-enablement-evidence.mjs "$RAW_DIR" "$ARTIFACT_DIR/evidence.json"
          node scripts/verify-12a3-generator-enablement-evidence.mjs "$ARTIFACT_DIR/evidence.json"

      - name: Freeze accepted evidence, contract, and acceptance record
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const evidencePath = 'artifacts/12a3-generator-enablement/evidence.json'
          const permanentPath = 'docs/audits/12a3-generator-enablement-evidence.json'
          const contractPath = 'docs/audits/12a3-generator-enablement-contract.json'
          const acceptancePath = 'docs/operations/12a3-generator-enablement-acceptance-2026-07-12.md'

          const evidence = JSON.parse(fs.readFileSync(evidencePath, 'utf8'))
          evidence.status = 'accepted'
          evidence.acceptanceIdentity = {
            ...evidence.acceptanceIdentity,
            pr: Number(process.env.PR_NUMBER),
            headSha: process.env.GITHUB_SHA,
            workflowRunId: Number(process.env.GITHUB_RUN_ID),
            artifactName: 'phase12a3-generator-enablement-freeze',
            workflowUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          }
          fs.writeFileSync(permanentPath, JSON.stringify(evidence, null, 2) + '\n')

          const contract = JSON.parse(fs.readFileSync(contractPath, 'utf8'))
          contract.status = 'accepted'
          contract.acceptedEvidence = {
            pr: evidence.acceptanceIdentity.pr,
            headSha: evidence.acceptanceIdentity.headSha,
            workflowRunId: evidence.acceptanceIdentity.workflowRunId,
            artifactName: evidence.acceptanceIdentity.artifactName,
            twitchPass: evidence.gate.twitchPass,
            kickPass: evidence.gate.kickPass,
            generatorEnablementGatePass: evidence.gate.generatorEnablementGatePass,
            productionGenerationStarted: evidence.gate.productionGenerationStarted,
            temporaryWorkersRetained: evidence.boundaries.temporaryWorkersRetained,
          }
          fs.writeFileSync(contractPath, JSON.stringify(contract, null, 2) + '\n')

          const t = evidence.providers.twitch
          const k = evidence.providers.kick
          const lines = [
            '# 12A-3 bounded generator enablement acceptance',
            '',
            'Date: 2026-07-12',
            'Status: production rows accepted; enabled collector deployment pending merge',
            '',
            '## Evidence identity',
            '',
            '```text',
            `PR: #${evidence.acceptanceIdentity.pr}`,
            `Head SHA: ${evidence.acceptanceIdentity.headSha}`,
            `Workflow run: ${evidence.acceptanceIdentity.workflowRunId}`,
            `Artifact: ${evidence.acceptanceIdentity.artifactName}`,
            `Observed at: ${evidence.observedAt}`,
            'Permanent evidence: docs/audits/12a3-generator-enablement-evidence.json',
            '```',
            '',
            '## Twitch',
            '',
            '```text',
            `days: ${t.firstObservation.map((d) => d.day).join(', ')}`,
            `source snapshots: ${t.firstObservation.map((d) => d.sourceSnapshots).join(', ')}`,
            `rollup rows: ${t.firstObservation.map((d) => d.rollupRows).join(', ')}`,
            `candidate streamers: ${t.firstObservation.map((d) => d.candidateStreamers).join(', ')}`,
            `first-pass Worker wall: ${t.first.totals.workerWallMs} ms`,
            `first-pass D1 duration: ${t.first.totals.durationMs} ms`,
            `second-pass observations unchanged: ${t.checks.idempotentObservations}`,
            `provider gate: ${t.providerGatePass}`,
            '```',
            '',
            '## Kick',
            '',
            '```text',
            `days: ${k.firstObservation.map((d) => d.day).join(', ')}`,
            `source snapshots: ${k.firstObservation.map((d) => d.sourceSnapshots).join(', ')}`,
            `rollup rows: ${k.firstObservation.map((d) => d.rollupRows).join(', ')}`,
            `candidate streamers: ${k.firstObservation.map((d) => d.candidateStreamers).join(', ')}`,
            `first-pass Worker wall: ${k.first.totals.workerWallMs} ms`,
            `first-pass D1 duration: ${k.first.totals.durationMs} ms`,
            `second-pass observations unchanged: ${k.checks.idempotentObservations}`,
            `provider gate: ${k.providerGatePass}`,
            '```',
            '',
            '## Gate',
            '',
            '```text',
            `generatorEnablementGatePass: ${evidence.gate.generatorEnablementGatePass}`,
            `productionGenerationStarted: ${evidence.gate.productionGenerationStarted}`,
            `temporaryWorkersRetained: ${evidence.boundaries.temporaryWorkersRetained}`,
            'backfillPerformed: false',
            'newCronAdded: false',
            '```',
            '',
            'The actual provider-specific today/yesterday rows and status records are accepted. The two enabled collector Wrangler configurations may be merged and deployed. Post-merge deployment and ongoing accumulation still require verification.',
            '',
          ]
          fs.writeFileSync(acceptancePath, lines.join('\n'))
          NODE

      - name: Restore one-time production boundary and remove one-time workflows
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/analytics-12a3-generator-enablement.yml')
          source = workflow.read_text()
          source = source.replace(
              "(github.event.action == 'opened' || github.event.action == 'synchronize')",
              "github.event.action == 'opened'",
          )
          workflow.write_text(source)
          Path('.github/workflows/one-time-12a3-generator-enablement-comment.yml').unlink(missing_ok=True)
          Path('.github/workflows/one-time-12a3-generator-enablement-freeze.yml').unlink(missing_ok=True)
          PY

      - name: Verify frozen evidence
        run: node scripts/verify-12a3-generator-enablement-evidence.mjs docs/audits/12a3-generator-enablement-evidence.json

      - name: Commit accepted evidence to PR branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/audits/12a3-generator-enablement-evidence.json \
            docs/audits/12a3-generator-enablement-contract.json \
            docs/operations/12a3-generator-enablement-acceptance-2026-07-12.md \
            .github/workflows/analytics-12a3-generator-enablement.yml \
            .github/workflows/one-time-12a3-generator-enablement-comment.yml \
            .github/workflows/one-time-12a3-generator-enablement-freeze.yml
          git commit -m 'Freeze accepted bounded generator enablement evidence'
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Comment accepted aggregate evidence
        shell: bash
        run: |
          evidence=docs/audits/12a3-generator-enablement-evidence.json
          {
            echo '## 12A-3 generator enablement accepted'
            echo
            echo '```text'
            for provider in twitch kick; do
              echo "$provider days: $(jq -r ".providers.$provider.firstObservation | map(.day) | join(\",\")" "$evidence")"
              echo "$provider source snapshots: $(jq -r ".providers.$provider.firstObservation | map(.sourceSnapshots) | join(\",\")" "$evidence")"
              echo "$provider rollup rows: $(jq -r ".providers.$provider.firstObservation | map(.rollupRows) | join(\",\")" "$evidence")"
              echo "$provider second pass unchanged: $(jq -r ".providers.$provider.checks.idempotentObservations" "$evidence")"
              echo "$provider gate: $(jq -r ".providers.$provider.providerGatePass" "$evidence")"
            done
            echo "enablement gate: $(jq -r '.gate.generatorEnablementGatePass' "$evidence")"
            echo "production generation started: $(jq -r '.gate.productionGenerationStarted' "$evidence")"
            echo "temporary Workers retained: $(jq -r '.boundaries.temporaryWorkersRetained' "$evidence")"
            echo "workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md

      - name: Remove raw responses and logs
        if: always()
        run: rm -rf "$RAW_DIR"

      - name: Upload sanitized accepted evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12a3-generator-enablement-freeze
          path: docs/audits/12a3-generator-enablement-evidence.json
          if-no-files-found: warn
