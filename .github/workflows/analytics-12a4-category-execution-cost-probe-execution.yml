name: Analytics 12A4 Category Execution Cost Probe Retired

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-category-execution-cost-probe-execution.yml'
      - 'docs/audits/12a4-category-execution-cost-probe-execution-contract.json'
      - 'docs/audits/12a4-category-execution-cost-probe-trigger.json'
      - 'docs/audits/12a4-category-execution-cost-probe-attempt-3-evidence.json'
      - 'scripts/check-12a4-category-execution-cost-probe-execution-package-scope.mjs'
      - 'scripts/test-12a4-category-execution-cost-probe-evidence.mjs'
      - 'scripts/test-12a4-category-execution-cost-probe-runner.mjs'
      - 'scripts/verify-12a4-category-execution-cost-probe-execution-package.mjs'
      - 'scripts/verify-12a4-category-execution-cost-probe-trigger.mjs'
      - 'scripts/verify-development-policy.mjs'
      - 'workers/category-cost-probe/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-12a4-category-execution-cost-probe-retired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-retired-execution-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Verify retirement branch scope
        run: node scripts/check-12a4-category-execution-cost-probe-execution-package-scope.mjs
      - name: Verify accepted and retired execution package
        run: node scripts/verify-12a4-category-execution-cost-probe-execution-package.mjs
      - name: Verify retired trigger
        run: node scripts/verify-12a4-category-execution-cost-probe-trigger.mjs --require-present
      - name: Verify provider runner fixtures
        run: node scripts/test-12a4-category-execution-cost-probe-runner.mjs
      - name: Verify sanitized evidence fixtures
        run: node scripts/test-12a4-category-execution-cost-probe-evidence.mjs
      - name: Verify canonical development policy
        run: node scripts/verify-development-policy.mjs
      - name: Bundle Twitch probe Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.twitch.toml
      - name: Bundle Kick probe Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.kick.toml
      - name: Publish retirement summary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4-6 Category Execution-Cost Probe Retired'
            echo
            echo '- Accepted measurement: PR #558'
            echo '- Exact source run: 29358245194'
            echo '- Twitch and Kick provider gates: passed'
            echo '- Reserved probe rows remaining: 0'
            echo '- Provider leakage rows: 0'
            echo '- Temporary Workers retained: no'
            echo '- Production push trigger: removed'
            echo '- Production execution job: removed'
            echo '- Cloudflare credentials referenced: no'
            echo '- Worker deployment: dry-run only'
            echo '- Trigger rearm authorized: no'
            echo '- Category capture enablement: no'
          } >> "$GITHUB_STEP_SUMMARY"
