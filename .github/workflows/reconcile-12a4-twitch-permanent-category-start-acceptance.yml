name: Reconcile Twitch permanent category start acceptance

on:
  push:
    branches:
      - agent/accept-twitch-permanent-category-start
    paths:
      - '.github/workflows/reconcile-12a4-twitch-permanent-category-start-acceptance.yml'
      - 'scripts/reconcile-12a4-twitch-permanent-category-start-acceptance.mjs'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/accept-twitch-permanent-category-start
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile canonical gate and current documents
        run: node scripts/reconcile-12a4-twitch-permanent-category-start-acceptance.mjs
      - name: Commit reconciled files
        run: |
          if git diff --quiet; then
            echo 'No reconciliation changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/audits/12a2-current-gate-state.json docs/audits/12a4-twitch-permanent-category-observation-contract.json docs/README.md docs/product/current-roadmap.md docs/product/current-schedule.md docs/work-in-progress/phase12a4-twitch-permanent-category-capture.md
          git commit -m 'Advance canonical category gate to active observation'
          git push origin HEAD:agent/accept-twitch-permanent-category-start
