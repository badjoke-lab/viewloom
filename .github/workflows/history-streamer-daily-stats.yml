name: History streamer daily stats

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/functions/_history-streamer-daily-stats.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/api/history.ts'
      - 'apps/web/functions/api/kick-history.ts'
      - 'apps/web/functions/_history/builders.ts'
      - 'apps/web/functions/_history/model.ts'
      - 'apps/web/docs/history-streamer-daily-stats-contract.md'
      - 'apps/web/scripts/verify-history-streamer-daily-stats.mjs'
      - '.github/workflows/history-streamer-daily-stats.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/functions/_history-streamer-daily-stats.ts'
      - 'apps/web/functions/_middleware.ts'
      - 'apps/web/functions/api/history.ts'
      - 'apps/web/functions/api/kick-history.ts'
      - 'apps/web/functions/_history/builders.ts'
      - 'apps/web/functions/_history/model.ts'
      - 'apps/web/docs/history-streamer-daily-stats-contract.md'
      - 'apps/web/scripts/verify-history-streamer-daily-stats.mjs'
      - '.github/workflows/history-streamer-daily-stats.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @viewloom/web typecheck:functions
      - run: node scripts/verify-history-streamer-daily-stats.mjs
        working-directory: apps/web
