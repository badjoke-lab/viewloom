name: Public Browser Audit
# Current candidate contract: 25 routes x 4 required widths = 100 scenarios.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/product/history-ui-repair-*'
      - 'docs/work-in-progress/history-ui-repair-working-note.md'
      - 'docs/audits/P8B_SCOPE.md'
      - 'docs/audits/public-browser-*'
      - 'docs/audits/public-surface-*'
      - 'docs/audits/r12a-candidate-acceptance-marker.md'
      - 'apps/web/scripts/public-browser-audit.mjs'
      - 'apps/web/scripts/public-browser-fixtures.mjs'
      - 'apps/web/scripts/public-current-browser-audit.mjs'
      - 'apps/web/src/**'
      - 'apps/web/*/*.html'
      - 'apps/web/*/*/*.html'
      - 'scripts/verify-public-browser-audit-current.mjs'
      - 'scripts/verify-public-browser-audit-historical.mjs'
      - 'scripts/verify-public-current-browser-audit.mjs'
      - 'scripts/verify-public-surface-inventory.mjs'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/public-browser-audit.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PUBLIC_CURRENT_LOCAL_ORIGIN: http://127.0.0.1:4173
      GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          node-version: 22

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs

      - name: Verify current public surface inventory
        run: node scripts/verify-public-surface-inventory.mjs

      - name: Verify historical P8B evidence and current handoff state
        run: node scripts/verify-public-browser-audit-historical.mjs && node scripts/verify-public-browser-audit-current.mjs

      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app

      - name: Build web application
        run: pnpm build:web

      - name: Start local candidate preview
        shell: bash
        run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/public-browser-preview.log 2>&1 &
          for attempt in {1..50}; do
            curl --silent --fail http://127.0.0.1:4173/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/contact/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/twitch/history/ > /dev/null \
              && curl --silent --fail http://127.0.0.1:4173/kick/history/ > /dev/null \
              && exit 0
            sleep 1
          done
          cat /tmp/public-browser-preview.log
          exit 1

      - name: Install Playwright
        working-directory: apps/web
        run: npm install playwright@1.52.0 --no-save --no-audit --no-fund

      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run current candidate public browser matrix
        working-directory: apps/web
        shell: bash
        run: |
          set -o pipefail
          node scripts/public-current-browser-audit.mjs 2>&1 | tee /tmp/public-current-browser-audit-run.log

      - name: Verify current candidate browser evidence
        run: node scripts/verify-public-current-browser-audit.mjs /tmp/public-current-browser-audit/evidence.json

      - name: Upload current public browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-current-browser-audit
          path: |
            /tmp/public-current-browser-audit/**
            /tmp/public-current-browser-audit-run.log
            /tmp/public-browser-preview.log
          if-no-files-found: warn
