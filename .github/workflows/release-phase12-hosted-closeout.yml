name: Release Phase12 Hosted Closeout

on:
  pull_request:
    paths:
      - '.github/workflows/release-phase12-hosted-closeout.yml'
      - 'scripts/verify-phase12-hosted-closeout-probe.mjs'
      - 'docs/audits/phase12-release-acceptance.json'
      - 'docs/operations/phase12-release-acceptance-2026-07-09.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/work-in-progress/phase12-release-readiness.md'

permissions:
  contents: read
  actions: read

concurrency:
  group: release-phase12-hosted-closeout-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  hosted-closeout-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_MAIN_SHA: 32c27a9a772cb62ff38f009c5fd1bb095ac27ad8
      SOURCE_DIR: artifacts/production-smoke-source
      PROBE_DIR: artifacts/phase12-hosted-closeout
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout closeout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate exact Production Smoke run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_DIR" "$PROBE_DIR"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$GITHUB_REPOSITORY/actions/workflows/production-smoke.yml/runs?branch=main&event=push&per_page=50" \
            > "$PROBE_DIR/production-smoke-runs.json"
          run_id="$(jq -r --arg sha "$TARGET_MAIN_SHA" '
            [.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success")][0].id // empty
          ' "$PROBE_DIR/production-smoke-runs.json")"
          test -n "$run_id"
          echo "PRODUCTION_SMOKE_RUN_ID=$run_id" >> "$GITHUB_ENV"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" > "$PROBE_DIR/production-smoke-run.json"
          jq -e --arg sha "$TARGET_MAIN_SHA" '
            .name == "Production Smoke" and
            .event == "push" and
            .head_branch == "main" and
            .head_sha == $sha and
            .status == "completed" and
            .conclusion == "success"
          ' "$PROBE_DIR/production-smoke-run.json" > /dev/null

      - name: Download exact Production Smoke artifact
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$GITHUB_REPOSITORY/actions/runs/$PRODUCTION_SMOKE_RUN_ID/artifacts" \
            > "$PROBE_DIR/production-smoke-artifacts.json"
          artifact_id="$(jq -r '[.artifacts[] | select(.name == "production-smoke-artifacts")][0].id // empty' "$PROBE_DIR/production-smoke-artifacts.json")"
          test -n "$artifact_id"
          echo "PRODUCTION_SMOKE_ARTIFACT_ID=$artifact_id" >> "$GITHUB_ENV"
          gh run download "$PRODUCTION_SMOKE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name production-smoke-artifacts \
            --dir "$SOURCE_DIR"

      - name: Verify exact production evidence
        shell: bash
        run: |
          set -euo pipefail
          jq -e --arg sha "$TARGET_MAIN_SHA" '
            .schema == "viewloom-deployment-v1" and
            .commit_sha == $sha and
            .environment == "production" and
            .branch == "main"
          ' "$SOURCE_DIR/deployment.json" > /dev/null

          jq -e '
            .platform == "twitch" and
            .storage.binding == "DB_TWITCH_HOT" and
            .storage.database == "vl_twitch_hot" and
            .sourceMode == "real" and
            .collector.state == "ok" and
            .freshness.isStale == false
          ' "$SOURCE_DIR/twitch-status.json" > /dev/null

          jq -e '
            .platform == "kick" and
            .storage.binding == "DB_KICK_HOT" and
            .storage.database == "vl_kick_hot" and
            .sourceMode == "authenticated" and
            .collector.state == "snapshot_available" and
            .freshness.isFresh == true and
            .freshness.isStale == false
          ' "$SOURCE_DIR/kick-status.json" > /dev/null

          jq -e --arg sha "$TARGET_MAIN_SHA" '
            .schema == "viewloom-phase11-monitoring-evidence-v1" and
            .deployment.expectedMainSha == $sha and
            .deployment.deployedSha == $sha and
            .deployment.matchesExpected == true and
            .providers.twitch.storage.binding == "DB_TWITCH_HOT" and
            .providers.kick.storage.binding == "DB_KICK_HOT" and
            .providers.twitch.freshness.isStale == false and
            .providers.kick.freshness.isStale == false and
            ([.alerts[] | select(.severity == "critical" or .severity == "high")] | length) == 0
          ' "$SOURCE_DIR/phase11-monitoring-evidence.json" > /dev/null

          test -f "$SOURCE_DIR/not-found.html"
          grep -q 'data-viewloom-not-found="v1"' "$SOURCE_DIR/not-found.html"
          test -f "$SOURCE_DIR/preview-probe-response.html"
          grep -q 'data-viewloom-not-found="v1"' "$SOURCE_DIR/preview-probe-response.html"

          route_files=(
            portal.html about.html support.html changelog.html contact.html terms.html privacy.html
            refund-policy.html commercial-disclosure.html twitch.html twitch-heatmap.html twitch-day-flow.html
            twitch-battle-lines.html twitch-history.html twitch-channel.html twitch-watchlist.html twitch-status.html
            kick.html kick-heatmap.html kick-day-flow.html kick-battle-lines.html kick-history.html kick-channel.html
            kick-watchlist.html kick-status.html
          )
          test "${#route_files[@]}" = '25'
          for file in "${route_files[@]}"; do
            test -f "$SOURCE_DIR/$file"
            grep -qi 'ViewLoom' "$SOURCE_DIR/$file"
          done

      - name: Build Phase 12 hosted closeout probe
        shell: bash
        run: |
          set -euo pipefail
          run_id="$PRODUCTION_SMOKE_RUN_ID"
          artifact_id="$PRODUCTION_SMOKE_ARTIFACT_ID"
          artifact_digest="$(jq -r --argjson id "$artifact_id" '.artifacts[] | select(.id == $id) | .digest' "$PROBE_DIR/production-smoke-artifacts.json")"
          checked_at="$(jq -r '.updated_at' "$PROBE_DIR/production-smoke-run.json")"
          twitch_capacity="$(jq -r '.providers.twitch.capacity.state' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          kick_capacity="$(jq -r '.providers.kick.capacity.state' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          twitch_observed="$(jq -r '.providers.twitch.capacity.observedCount' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          twitch_limit="$(jq -r '.providers.twitch.capacity.topLimit' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          kick_observed="$(jq -r '.providers.kick.capacity.observedCount' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          kick_limit="$(jq -r '.providers.kick.capacity.topLimit' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          watch_alerts="$(jq '[.alerts[] | select(.severity == "watch")] | length' "$SOURCE_DIR/phase11-monitoring-evidence.json")"
          blocking_alerts="$(jq '[.alerts[] | select(.severity == "critical" or .severity == "high")] | length' "$SOURCE_DIR/phase11-monitoring-evidence.json")"

          jq -n \
            --arg sha "$TARGET_MAIN_SHA" \
            --argjson runId "$run_id" \
            --argjson artifactId "$artifact_id" \
            --arg artifactDigest "$artifact_digest" \
            --arg checkedAt "$checked_at" \
            --arg twitchCapacity "$twitch_capacity" \
            --arg kickCapacity "$kick_capacity" \
            --argjson twitchObserved "$twitch_observed" \
            --argjson twitchLimit "$twitch_limit" \
            --argjson kickObserved "$kick_observed" \
            --argjson kickLimit "$kick_limit" \
            --argjson watchAlerts "$watch_alerts" \
            --argjson blockingAlerts "$blocking_alerts" \
            '{
              schema: "viewloom-phase12-hosted-closeout-probe-v1",
              phase: "Phase 12",
              result: "pass",
              targetMainSha: $sha,
              deployedSha: $sha,
              productionSmoke: {
                workflowRunId: $runId,
                artifactId: $artifactId,
                artifactDigest: $artifactDigest,
                checkedAt: $checkedAt
              },
              publicRoutesChecked: 25,
              providerStatusApisChecked: 2,
              providerCrossingFailures: 0,
              explicit404Failures: 0,
              providersSeparate: true,
              twitch: {
                binding: "DB_TWITCH_HOT",
                database: "vl_twitch_hot",
                sourceMode: "real",
                collectorState: "ok",
                stale: false,
                observedCount: $twitchObserved,
                topLimit: $twitchLimit,
                capacityState: $twitchCapacity
              },
              kick: {
                binding: "DB_KICK_HOT",
                database: "vl_kick_hot",
                sourceMode: "authenticated",
                collectorState: "snapshot_available",
                fresh: true,
                stale: false,
                observedCount: $kickObserved,
                topLimit: $kickLimit,
                capacityState: $kickCapacity
              },
              monitoring: {
                blockingAlerts: $blockingAlerts,
                watchAlerts: $watchAlerts
              }
            }' > "$PROBE_DIR/phase12-hosted-closeout-probe.json"

      - name: Verify Phase 12 hosted closeout probe
        run: node scripts/verify-phase12-hosted-closeout-probe.mjs "$PROBE_DIR/phase12-hosted-closeout-probe.json"

      - name: Upload Phase 12 hosted closeout evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase12-hosted-closeout-probe
          path: |
            artifacts/phase12-hosted-closeout/phase12-hosted-closeout-probe.json
            artifacts/phase12-hosted-closeout/production-smoke-run.json
            artifacts/phase12-hosted-closeout/production-smoke-artifacts.json
            artifacts/production-smoke-source/deployment.json
            artifacts/production-smoke-source/twitch-status.json
            artifacts/production-smoke-source/kick-status.json
            artifacts/production-smoke-source/phase11-monitoring-evidence.json
            artifacts/production-smoke-source/not-found.html
            artifacts/production-smoke-source/preview-probe-response.html
