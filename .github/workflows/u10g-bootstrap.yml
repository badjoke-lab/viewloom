name: U10G Bootstrap

on:
  push:
    branches:
      - work-quality-u10g-architecture
    paths:
      - 'scripts/u10g_patch_architecture.mjs'
      - '.github/workflows/u10g-bootstrap.yml'

permissions:
  contents: write

concurrency:
  group: u10g-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work-quality-u10g-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply guarded architecture patch
        run: |
          if grep -q "renderEnhancedDayFlowSummary" apps/web/src/live/day-flow-current-shell-entry.ts; then
            echo "U10G architecture patch already applied."
            exit 0
          fi
          node scripts/u10g_patch_architecture.mjs
          git diff --check
      - name: Commit architecture consolidation
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/src/live/day-flow-current-shell-entry.ts \
                  apps/web/src/live/battle-lines-current-shell-entry.ts \
                  apps/web/twitch/day-flow/index.html \
                  apps/web/kick/day-flow/index.html \
                  apps/web/twitch/battle-lines/index.html \
                  apps/web/kick/battle-lines/index.html
          git commit -m "Consolidate U10G feature controllers"
          git push origin HEAD:work-quality-u10g-architecture
