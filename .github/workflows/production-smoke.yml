name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/product/cross-site-quality-remediation-plan.md'
      - 'docs/product/release-readiness-*'
      - 'docs/work-in-progress/phase12-release-readiness.md'
      - 'apps/web/**'
      - 'scripts/build-phase11-monitoring-evidence.mjs'
      - 'scripts/verify-phase11-monitoring-evidence.mjs'
      - 'package.json'
      - '.github/workflows/production-smoke.yml'

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORIGIN: https://vl.badjoke-lab.com
      ARTIFACT_DIR: artifacts/production-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACT_DIR"
      - name: Wait for the matching production deployment
        run: |
          set -euo pipefail
          expected="$GITHUB_SHA"
          for attempt in {1..60}; do
            if curl --silent --show-error --fail --max-time 20 "$ORIGIN/deployment.json?attempt=$attempt" -o "$ARTIFACT_DIR/deployment.json"; then
              deployed="$(jq -r '.commit_sha // empty' "$ARTIFACT_DIR/deployment.json")"
              environment="$(jq -r '.environment // empty' "$ARTIFACT_DIR/deployment.json")"
              branch="$(jq -r '.branch // empty' "$ARTIFACT_DIR/deployment.json")"
              if [ "$deployed" = "$expected" ] && [ "$environment" = "production" ] && [ "$branch" = "main" ]; then
                cat "$ARTIFACT_DIR/deployment.json"
                exit 0
              fi
              echo "Production is not on $expected yet (found $deployed, attempt $attempt/60)."
            else
              echo "deployment.json is not available yet (attempt $attempt/60)."
            fi
            sleep 10
          done
          exit 1
      - name: Verify all repository-owned production pages
        run: |
          set -euo pipefail
          routes=(
            '/'
            '/about/'
            '/support/'
            '/changelog/'
            '/contact/'
            '/terms/'
            '/privacy/'
            '/refund-policy/'
            '/commercial-disclosure/'
            '/twitch/'
            '/twitch/heatmap/'
            '/twitch/day-flow/'
            '/twitch/battle-lines/'
            '/twitch/history/'
            '/twitch/channel/'
            '/twitch/watchlist/'
            '/twitch/status/'
            '/kick/'
            '/kick/heatmap/'
            '/kick/day-flow/'
            '/kick/battle-lines/'
            '/kick/history/'
            '/kick/channel/'
            '/kick/watchlist/'
            '/kick/status/'
          )
          test "${#routes[@]}" = '25'
          for route in "${routes[@]}"; do
            name="$(echo "$route" | tr '/' '-' | sed 's/^-//;s/-$//')"
            [ -n "$name" ] || name='portal'
            code="$(curl --silent --show-error --location --max-time 30 --output "$ARTIFACT_DIR/$name.html" --write-out '%{http_code}' "$ORIGIN$route")"
            test "$code" = '200'
            grep -qi 'ViewLoom' "$ARTIFACT_DIR/$name.html"
          done
          grep -q '<title>History & Trends for Twitch live streams | ViewLoom</title>' "$ARTIFACT_DIR/twitch-history.html"
          grep -q '<title>History & Trends for Kick live streams | ViewLoom</title>' "$ARTIFACT_DIR/kick-history.html"
          grep -q '<title>Twitch channel history' "$ARTIFACT_DIR/twitch-channel.html"
          grep -q '<title>Kick channel history' "$ARTIFACT_DIR/kick-channel.html"
          grep -q '<title>Twitch Local Watchlist' "$ARTIFACT_DIR/twitch-watchlist.html"
          grep -q '<title>Kick Local Watchlist' "$ARTIFACT_DIR/kick-watchlist.html"
          grep -q '<title>Contact — ViewLoom</title>' "$ARTIFACT_DIR/contact.html"
          grep -q '<title>Terms — ViewLoom</title>' "$ARTIFACT_DIR/terms.html"
          grep -q '<title>Privacy — ViewLoom</title>' "$ARTIFACT_DIR/privacy.html"
          grep -q '<title>Refund Policy — ViewLoom</title>' "$ARTIFACT_DIR/refund-policy.html"
          grep -q '<title>Commercial Disclosure — ViewLoom</title>' "$ARTIFACT_DIR/commercial-disclosure.html"
          grep -q 'googletagmanager.com/gtag/js?id=G-YHX7HS1VBK' "$ARTIFACT_DIR/portal.html"
      - name: Verify Twitch production status
        run: |
          set -euo pipefail
          curl --silent --show-error --fail --max-time 30 "$ORIGIN/api/twitch-status" -o "$ARTIFACT_DIR/twitch-status.json"
          jq -e '
            .platform == "twitch" and
            .storage.binding == "DB_TWITCH_HOT" and
            .storage.database == "vl_twitch_hot" and
            .sourceMode == "real" and
            .collector.state == "ok" and
            .freshness.isStale == false
          ' "$ARTIFACT_DIR/twitch-status.json" > /dev/null
      - name: Verify Kick production status
        run: |
          set -euo pipefail
          curl --silent --show-error --fail --max-time 30 "$ORIGIN/api/kick-status" -o "$ARTIFACT_DIR/kick-status.json"
          jq -e '
            .platform == "kick" and
            .storage.binding == "DB_KICK_HOT" and
            .storage.database == "vl_kick_hot" and
            .sourceMode == "authenticated" and
            .collector.state == "snapshot_available" and
            .freshness.isFresh == true and
            .freshness.isStale == false
          ' "$ARTIFACT_DIR/kick-status.json" > /dev/null
      - name: Build Phase 11 monitoring evidence
        run: node scripts/build-phase11-monitoring-evidence.mjs "$ARTIFACT_DIR"
      - name: Verify Phase 11 monitoring evidence
        run: node scripts/verify-phase11-monitoring-evidence.mjs "$ARTIFACT_DIR"
      - name: Verify explicit not-found behavior
        run: |
          set -euo pipefail
          path="/production-smoke-not-found-$GITHUB_SHA"
          code="$(curl --silent --show-error --max-time 30 --output "$ARTIFACT_DIR/not-found.html" --write-out '%{http_code}' "$ORIGIN$path")"
          test "$code" = '404'
          grep -q 'data-viewloom-not-found="v1"' "$ARTIFACT_DIR/not-found.html"
          probe_code="$(curl --silent --show-error --max-time 30 --output "$ARTIFACT_DIR/preview-probe-response.html" --write-out '%{http_code}' "$ORIGIN/cloudflare-preview-probe.json")"
          test "$probe_code" = '404'
          grep -q 'data-viewloom-not-found="v1"' "$ARTIFACT_DIR/preview-probe-response.html"
      - name: Publish production summary
        if: always()
        run: |
          {
            echo '## ViewLoom Production Smoke'
            echo
            echo "- Expected main SHA: \`$GITHUB_SHA\`"
            if [ -f "$ARTIFACT_DIR/deployment.json" ]; then
              echo "- Deployed SHA: \`$(jq -r '.commit_sha // "unavailable"' "$ARTIFACT_DIR/deployment.json")\`"
            fi
            echo '- Repository-owned HTML routes: 25 checked'
            echo '- About, Support, Contact, Terms, Privacy, Refund Policy, Commercial Disclosure, Changelog, Channel, and Watchlist ownership: checked'
            echo '- Twitch and Kick status APIs: checked'
            echo '- Separate D1 bindings: checked'
            echo '- Collector freshness: checked'
            if [ -f "$ARTIFACT_DIR/phase11-monitoring-evidence.json" ]; then
              echo "- Twitch capacity: $(jq -r '.providers.twitch.capacity.state + " (" + (.providers.twitch.capacity.observedCount|tostring) + "/" + (.providers.twitch.capacity.topLimit|tostring) + ")"' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")"
              echo "- Kick capacity: $(jq -r '.providers.kick.capacity.state + " (" + (.providers.kick.capacity.observedCount|tostring) + "/" + (.providers.kick.capacity.topLimit|tostring) + ")"' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")"
              echo "- Monitoring watch alerts: $(jq '[.alerts[] | select(.severity == "watch")] | length' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")"
            fi
            echo '- Explicit 404 behavior: checked'
            echo '- Preview probe absent from production: checked'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-smoke-artifacts
          path: artifacts/production-smoke/
          if-no-files-found: warn
