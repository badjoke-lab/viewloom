name: Phase 11 P11A App Apply

on:
  pull_request:
    paths:
      - 'scripts/apply-phase11-p11a-app-fixes.mjs'
      - 'apps/web/src/battle-lines-entry.ts'
      - 'apps/web/src/battle-lines-status-entry.ts'
      - 'apps/web/src/features/heatmap-page/mobile-inspector-sheet.ts'
      - 'apps/web/src/features/twitch-heatmap/canvas-scene.ts'
      - 'apps/web/src/history-unify.ts'
      - 'apps/web/src/label-risk-cleanup.ts'
      - 'apps/web/src/live/history-report-text-state.ts'
      - 'apps/web/src/live/twitch-day-flow.ts'
      - 'apps/web/src/live/twitch-heatmap.ts'
      - 'apps/web/src/live/watchlist-page.ts'
      - '.github/workflows/phase11-p11a-app-apply.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'work-quality-phase11-p11a-app'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout App remediation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Apply deterministic App fixes
        run: node scripts/apply-phase11-p11a-app-fixes.mjs
      - name: Verify strict-null App scope
        run: pnpm exec tsc -p apps/web/tsconfig.json --noEmit --strictNullChecks true --pretty false
      - name: Commit verified App fixes
        shell: bash
        run: |
          set -euo pipefail
          paths=(
            apps/web/src/battle-lines-entry.ts
            apps/web/src/battle-lines-status-entry.ts
            apps/web/src/features/heatmap-page/mobile-inspector-sheet.ts
            apps/web/src/features/twitch-heatmap/canvas-scene.ts
            apps/web/src/history-unify.ts
            apps/web/src/label-risk-cleanup.ts
            apps/web/src/live/history-report-text-state.ts
            apps/web/src/live/twitch-day-flow.ts
            apps/web/src/live/twitch-heatmap.ts
            apps/web/src/live/watchlist-page.ts
          )
          if git diff --quiet -- "${paths[@]}"; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "${paths[@]}"
          git commit -m 'Repair P11A App strict-null boundaries'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
