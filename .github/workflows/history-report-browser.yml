name: History Report Browser

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/docs/history-report-text-contract.md'
      - 'apps/web/src/history-report-text.css'
      - 'apps/web/src/live/history-report-text*.ts'
      - 'apps/web/src/live/history-report-social.ts'
      - 'apps/web/src/live/history-default-day.ts'
      - 'apps/web/scripts/history-report-text-browser.mjs'
      - 'apps/web/scripts/history-battle-archive-fixture.mjs'
      - '.github/workflows/history-report-browser.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:web
      - run: |
          pnpm --filter @viewloom/web preview --host 127.0.0.1 --port 4173 > /tmp/history-report-preview.log 2>&1 &
          for attempt in {1..40}; do
            curl --silent --fail http://127.0.0.1:4173/twitch/history/ > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/history-report-preview.log
          exit 1
      - run: npm install playwright@1.52.0 --no-save --no-audit --no-fund
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run History report browser gate
        working-directory: apps/web
        env:
          HISTORY_REPORT_BASE_URL: http://127.0.0.1:4173
          HISTORY_REPORT_SCREENSHOT_DIR: artifacts/history-report
        run: |
          set -o pipefail
          node scripts/history-report-text-browser.mjs 2>&1 | tee /tmp/history-report-browser.log
      - name: List History report screenshots
        run: ls -lh apps/web/artifacts/history-report
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: history-report-screenshots
          path: apps/web/artifacts/history-report/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: history-report-diagnostics
          path: |
            /tmp/history-report-browser.log
            /tmp/history-report-preview.log
            apps/web/artifacts/history-report/
          if-no-files-found: warn
