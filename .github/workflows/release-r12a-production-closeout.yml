name: Release R12A Production Closeout

on:
  pull_request:
    paths:
      - '.github/workflows/release-r12a-production-closeout.yml'

permissions:
  contents: write

concurrency:
  group: release-r12a-production-closeout-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ORIGIN: https://vl.badjoke-lab.com
      ARTIFACT_DIR: artifacts/r12a-production-closeout
      EXPECTED_MAIN_SHA: ${{ github.event.pull_request.base.sha }}
      EVIDENCE_PATH: docs/audits/r12a-production-acceptance.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare evidence directory
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Assert expected R12A merge SHA
        run: test "$EXPECTED_MAIN_SHA" = '952f0008209363f4fd5b22587975ac247ee8d6f2'

      - name: Wait for exact production deployment
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl --silent --show-error --fail --max-time 20 "$ORIGIN/deployment.json?attempt=$attempt" -o "$ARTIFACT_DIR/deployment.json"; then
              deployed="$(jq -r '.commit_sha // empty' "$ARTIFACT_DIR/deployment.json")"
              environment="$(jq -r '.environment // empty' "$ARTIFACT_DIR/deployment.json")"
              branch="$(jq -r '.branch // empty' "$ARTIFACT_DIR/deployment.json")"
              if [ "$deployed" = "$EXPECTED_MAIN_SHA" ] && [ "$environment" = 'production' ] && [ "$branch" = 'main' ]; then
                cat "$ARTIFACT_DIR/deployment.json"
                exit 0
              fi
              echo "Production not on $EXPECTED_MAIN_SHA yet; found $deployed ($attempt/60)."
            else
              echo "deployment.json unavailable ($attempt/60)."
            fi
            sleep 10
          done
          exit 1

      - name: Verify 25 repository-owned production pages
        run: |
          set -euo pipefail
          routes=(
            '/'
            '/about/'
            '/support/'
            '/changelog/'
            '/contact/'
            '/terms/'
            '/privacy/'
            '/refund-policy/'
            '/commercial-disclosure/'
            '/twitch/'
            '/twitch/heatmap/'
            '/twitch/day-flow/'
            '/twitch/battle-lines/'
            '/twitch/history/'
            '/twitch/channel/'
            '/twitch/watchlist/'
            '/twitch/status/'
            '/kick/'
            '/kick/heatmap/'
            '/kick/day-flow/'
            '/kick/battle-lines/'
            '/kick/history/'
            '/kick/channel/'
            '/kick/watchlist/'
            '/kick/status/'
          )
          test "${#routes[@]}" = '25'
          printf '%s\n' "${routes[@]}" > "$ARTIFACT_DIR/routes.txt"
          for route in "${routes[@]}"; do
            name="$(echo "$route" | tr '/' '-' | sed 's/^-//;s/-$//')"
            [ -n "$name" ] || name='portal'
            code="$(curl --silent --show-error --location --max-time 30 --output "$ARTIFACT_DIR/$name.html" --write-out '%{http_code}' "$ORIGIN$route")"
            test "$code" = '200'
            grep -qi 'ViewLoom' "$ARTIFACT_DIR/$name.html"
          done
          grep -q '<title>Contact — ViewLoom</title>' "$ARTIFACT_DIR/contact.html"
          grep -q '<title>Terms — ViewLoom</title>' "$ARTIFACT_DIR/terms.html"
          grep -q '<title>Privacy — ViewLoom</title>' "$ARTIFACT_DIR/privacy.html"
          grep -q '<title>Refund Policy — ViewLoom</title>' "$ARTIFACT_DIR/refund-policy.html"
          grep -q '<title>Commercial Disclosure — ViewLoom</title>' "$ARTIFACT_DIR/commercial-disclosure.html"

      - name: Verify Twitch production status
        run: |
          set -euo pipefail
          curl --silent --show-error --fail --max-time 30 "$ORIGIN/api/twitch-status" -o "$ARTIFACT_DIR/twitch-status.json"
          jq -e '
            .platform == "twitch" and
            .storage.binding == "DB_TWITCH_HOT" and
            .storage.database == "vl_twitch_hot" and
            .sourceMode == "real" and
            .collector.state == "ok" and
            .freshness.isStale == false
          ' "$ARTIFACT_DIR/twitch-status.json" > /dev/null

      - name: Verify Kick production status
        run: |
          set -euo pipefail
          curl --silent --show-error --fail --max-time 30 "$ORIGIN/api/kick-status" -o "$ARTIFACT_DIR/kick-status.json"
          jq -e '
            .platform == "kick" and
            .storage.binding == "DB_KICK_HOT" and
            .storage.database == "vl_kick_hot" and
            .sourceMode == "authenticated" and
            .collector.state == "snapshot_available" and
            .freshness.isFresh == true and
            .freshness.isStale == false
          ' "$ARTIFACT_DIR/kick-status.json" > /dev/null

      - name: Build retained monitoring evidence
        run: node scripts/build-phase11-monitoring-evidence.mjs "$ARTIFACT_DIR"

      - name: Verify retained monitoring evidence
        run: node scripts/verify-phase11-monitoring-evidence.mjs "$ARTIFACT_DIR"

      - name: Verify explicit not-found behavior
        run: |
          set -euo pipefail
          path="/r12a-closeout-not-found-$EXPECTED_MAIN_SHA"
          code="$(curl --silent --show-error --max-time 30 --output "$ARTIFACT_DIR/not-found.html" --write-out '%{http_code}' "$ORIGIN$path")"
          test "$code" = '404'
          grep -q 'data-viewloom-not-found="v1"' "$ARTIFACT_DIR/not-found.html"

      - name: Build permanent R12A production evidence
        run: |
          set -euo pipefail
          blocking="$(jq '[.alerts[] | select(.severity != "watch")] | length' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")"
          watches="$(jq '[.alerts[] | select(.severity == "watch")] | length' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")"
          test "$blocking" = '0'
          jq -n \
            --arg schema 'viewloom-r12a-production-acceptance-v1' \
            --arg phase 'Phase 12' \
            --arg workstream 'R12A-5' \
            --arg status 'complete' \
            --arg result 'pass' \
            --arg checked_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson workflow_run "$GITHUB_RUN_ID" \
            --arg expected_main_sha "$EXPECTED_MAIN_SHA" \
            --arg deployed_sha "$(jq -r '.commit_sha' "$ARTIFACT_DIR/deployment.json")" \
            --argjson blocking_alerts "$blocking" \
            --argjson watch_alerts "$watches" \
            --arg twitch_capacity_state "$(jq -r '.providers.twitch.capacity.state' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            --argjson twitch_observed_count "$(jq -r '.providers.twitch.capacity.observedCount' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            --argjson twitch_top_limit "$(jq -r '.providers.twitch.capacity.topLimit' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            --arg kick_capacity_state "$(jq -r '.providers.kick.capacity.state' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            --argjson kick_observed_count "$(jq -r '.providers.kick.capacity.observedCount' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            --argjson kick_top_limit "$(jq -r '.providers.kick.capacity.topLimit' "$ARTIFACT_DIR/phase11-monitoring-evidence.json")" \
            '{schema:$schema,phase:$phase,workstream:$workstream,status:$status,result:$result,checked_at:$checked_at,workflow_run:$workflow_run,expected_main_sha:$expected_main_sha,deployed_sha:$deployed_sha,counts:{html_routes:25,provider_status_apis:2,provider_crossing_failures:0,blocking_alerts:$blocking_alerts,watch_alerts:$watch_alerts},providers:{twitch:{capacity_state:$twitch_capacity_state,observed_count:$twitch_observed_count,top_limit:$twitch_top_limit},kick:{capacity_state:$kick_capacity_state,observed_count:$kick_observed_count,top_limit:$kick_top_limit}},checks:{exact_production_sha:true,all_owned_routes_200:true,five_r12a_routes_200:true,twitch_status_contract:true,kick_status_contract:true,provider_separation:true,monitoring_evidence:true,explicit_404:true}}' \
            > "$EVIDENCE_PATH"
          cat "$EVIDENCE_PATH"

      - name: Commit permanent evidence to closeout branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$EVIDENCE_PATH"
          git commit -m 'Record R12A production acceptance evidence'
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload R12A closeout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r12a-production-closeout-evidence
          path: |
            artifacts/r12a-production-closeout/**
            docs/audits/r12a-production-acceptance.json
          if-no-files-found: warn
