name: Analytics 12A5 Twitch Heatmap Category API Package

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'docs/audits/12a5-twitch-heatmap-category-filter-hidden-package-contract.json'
      - 'apps/web/functions/api/twitch-heatmap.ts'
      - 'scripts/verify-12a5-twitch-heatmap-category-api-package.mjs'
      - '.github/workflows/analytics-12a5-twitch-heatmap-category-api-package.yml'

permissions:
  contents: read

concurrency:
  group: analytics-12a5-twitch-heatmap-category-api-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Parse package verifier
        run: node --check scripts/verify-12a5-twitch-heatmap-category-api-package.mjs
      - name: Verify hidden category API contract and boundaries
        run: node scripts/verify-12a5-twitch-heatmap-category-api-package.mjs
      - name: Verify current category rollout policy
        run: node scripts/verify-category-rollout-policy.mjs
      - name: Typecheck web
        run: pnpm typecheck:web
      - name: Build web
        run: pnpm build:web
      - name: Publish package summary
        if: always()
        run: |
          {
            echo '## ViewLoom hidden Twitch Heatmap category API package'
            echo
            echo '- Provider: Twitch only'
            echo '- API category metadata and hidden query contract: yes'
            echo '- Filter before Top N: yes'
            echo '- Public navigation: no'
            echo '- Normal Heatmap control exposure: no'
            echo '- Collector or Worker config change: no'
            echo '- Kick change: no'
            echo '- Backfill or retention change: no'
          } >> "$GITHUB_STEP_SUMMARY"