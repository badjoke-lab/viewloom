name: Typecheck diagnostics

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/src/**'
      - 'apps/web/kick/index.html'
      - '.github/workflows/typecheck-debug.yml'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @viewloom/web typecheck:app > typecheck.log 2>&1
          echo $? > typecheck-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: app-typecheck-diagnostics
          path: |
            typecheck.log
            typecheck-exit-code.txt
