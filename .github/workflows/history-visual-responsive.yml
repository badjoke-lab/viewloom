name: History Visual Responsive

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/docs/history-visual-responsive-h5-contract.md'
      - 'apps/web/src/history-visual-responsive.css'
      - 'apps/web/src/live/history-visual-responsive.ts'
      - 'apps/web/src/live/history-usability-pass.ts'
      - 'apps/web/scripts/verify-history-visual-responsive.mjs'
      - '.github/workflows/history-visual-responsive.yml'
      - 'scripts/verify-development-policy.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @viewloom/web typecheck
      - name: Verify History visual and responsive H5
        working-directory: apps/web
        run: node scripts/verify-history-visual-responsive.mjs
      - run: pnpm build:web
