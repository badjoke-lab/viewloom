name: Analytics 12A4 Category Execution Cost Probe Package

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/analytics-12a4-category-execution-cost-probe.yml'
      - 'docs/audits/12a2-current-gate-state.json'
      - 'docs/audits/12a4-category-execution-cost-probe-contract.json'
      - 'docs/audits/12a4-category-execution-cost-probe-package-contract.json'
      - 'docs/audits/12a4-category-schema-recovery-audit-evidence.json'
      - 'docs/work-in-progress/phase12a4-category-execution-cost-probe.md'
      - 'scripts/check-12a4-category-execution-cost-probe-package-scope.mjs'
      - 'scripts/collect-12a4-category-execution-cost-probe-evidence.mjs'
      - 'scripts/test-12a4-category-execution-cost-probe-evidence.mjs'
      - 'scripts/test-12a4-category-execution-cost-probe.py'
      - 'scripts/verify-12a4-category-execution-cost-probe-evidence.mjs'
      - 'scripts/verify-12a4-category-execution-cost-probe.mjs'
      - 'scripts/verify-development-policy.mjs'
      - 'workers/category-cost-probe/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-12a4-category-cost-probe-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository toolchain
        uses: ./.github/actions/setup-node-pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify package branch scope
        if: github.event_name == 'pull_request'
        run: node scripts/check-12a4-category-execution-cost-probe-package-scope.mjs

      - name: Verify bounded execution-cost package
        run: node scripts/verify-12a4-category-execution-cost-probe.mjs

      - name: Verify local SQLite first-pass, no-op, failure, and cleanup fixture
        run: python scripts/test-12a4-category-execution-cost-probe.py

      - name: Verify sanitized success and failure evidence fixtures
        run: node scripts/test-12a4-category-execution-cost-probe-evidence.mjs

      - name: Verify canonical development policy
        run: node scripts/verify-development-policy.mjs

      - name: Bundle Twitch bounded probe Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.twitch.toml

      - name: Bundle Kick bounded probe Worker without deploying
        run: pnpm dlx wrangler@4 deploy --dry-run --config workers/category-cost-probe/wrangler.kick.toml

      - name: Publish package boundary
        if: always()
        run: |
          {
            echo '## ViewLoom 12A-4-5 Bounded Category Execution-Cost Probe Package'
            echo
            echo '- Tracking issue: #519'
            echo '- Accepted post-apply schema audit: PR #545'
            echo '- Schema execution retirement: PR #546'
            echo '- Provider order: Twitch then Kick'
            echo '- Reserved probe identifiers only: yes'
            echo '- Cleanup in finally: yes'
            echo '- Success/failure evidence fixtures: yes'
            echo '- Twitch Worker deployment: dry-run only'
            echo '- Kick Worker deployment: dry-run only'
            echo '- Production execution from this PR: no'
            echo '- Cloudflare credentials used: no'
            echo '- Category capture enablement: no'
            echo '- New cron/backfill/retention/UI: no'
          } >> "$GITHUB_STEP_SUMMARY"
