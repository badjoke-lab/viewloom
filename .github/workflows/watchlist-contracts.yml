name: Watchlist Contracts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/twitch/watchlist/**'
      - 'apps/web/kick/watchlist/**'
      - 'apps/web/twitch/channel/index.html'
      - 'apps/web/kick/channel/index.html'
      - 'apps/web/src/live/watchlist-page.ts'
      - 'apps/web/src/live/watchlist-move-focus.ts'
      - 'apps/web/src/live/channel-watchlist.ts'
      - 'apps/web/src/live/watchlist/**'
      - 'apps/web/src/watchlist-*.css'
      - 'apps/web/src/channel-watchlist.css'
      - 'apps/web/src/provider-home-shell.ts'
      - 'apps/web/src/provider-watchlist-link.css'
      - 'apps/web/src/analytics.ts'
      - 'apps/web/scripts/verify-watchlist-*.mjs'
      - 'apps/web/scripts/watchlist-*.mjs'
      - 'apps/web/package.json'
      - 'apps/web/vite.config.ts'
      - 'apps/web/functions/**'
      - 'workers/**'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/audits/public-surface-inventory.json'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/watchlist-*.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/twitch/watchlist/**'
      - 'apps/web/kick/watchlist/**'
      - 'apps/web/twitch/channel/index.html'
      - 'apps/web/kick/channel/index.html'
      - 'apps/web/src/live/watchlist-page.ts'
      - 'apps/web/src/live/watchlist-move-focus.ts'
      - 'apps/web/src/live/channel-watchlist.ts'
      - 'apps/web/src/live/watchlist/**'
      - 'apps/web/src/watchlist-*.css'
      - 'apps/web/src/channel-watchlist.css'
      - 'apps/web/src/provider-home-shell.ts'
      - 'apps/web/src/provider-watchlist-link.css'
      - 'apps/web/src/analytics.ts'
      - 'apps/web/scripts/verify-watchlist-*.mjs'
      - 'apps/web/scripts/watchlist-*.mjs'
      - 'apps/web/package.json'
      - 'apps/web/vite.config.ts'
      - 'apps/web/functions/**'
      - 'workers/**'
      - 'docs/README.md'
      - 'docs/product/current-roadmap.md'
      - 'docs/product/current-schedule.md'
      - 'docs/product/post-watchlist-program-plan.md'
      - 'docs/product/local-watchlist-spec.md'
      - 'docs/product/watchlist-v1-implementation-plan.md'
      - 'docs/audits/public-surface-inventory.json'
      - 'docs/work-in-progress/watchlist-v1-working-note.md'
      - 'scripts/verify-development-policy.mjs'
      - '.github/workflows/watchlist-*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Verify development policy
        run: node scripts/verify-development-policy.mjs
      - name: Typecheck web application
        run: pnpm --filter @viewloom/web typecheck:app
      - name: Verify consolidated Watchlist contracts
        working-directory: apps/web
        shell: bash
        run: |
          set -o pipefail
          node scripts/verify-watchlist-contracts.mjs 2>&1 | tee /tmp/watchlist-contracts.log
      - name: Build web application
        run: pnpm build:web
      - name: Upload Watchlist contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-contract-diagnostics
          path: /tmp/watchlist-contracts.log
          if-no-files-found: warn
