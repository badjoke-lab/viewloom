name: Reconcile category parallel package acceptance

on:
  push:
    branches:
      - agent/accept-category-parallel-packages
    paths:
      - '.github/workflows/reconcile-12a4-category-parallel-package-acceptance.yml'
      - 'scripts/reconcile-12a4-category-parallel-package-acceptance.mjs'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/accept-category-parallel-packages
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Advance canonical package acceptance gate
        run: node scripts/reconcile-12a4-category-parallel-package-acceptance.mjs
      - name: Commit reconciled gate
        run: |
          if git diff --quiet; then
            echo 'No reconciliation changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/audits/12a2-current-gate-state.json
          git commit -m 'Advance category gate after package acceptance'
          git push origin HEAD:agent/accept-category-parallel-packages