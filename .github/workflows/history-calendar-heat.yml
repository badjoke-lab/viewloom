name: History Calendar Heat

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/web/docs/history-calendar-heat-contract.md'
      - 'apps/web/src/history-calendar-heat.css'
      - 'apps/web/src/live/history-calendar-heat*.ts'
      - 'apps/web/src/live/history-default-day.ts'
      - 'apps/web/scripts/verify-history-calendar-heat.mjs'
      - 'apps/web/scripts/history-calendar-heat-browser.mjs'
      - '.github/workflows/history-calendar-*.yml'
      - 'scripts/verify-development-policy.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @viewloom/web typecheck
      - name: Verify History calendar contract
        working-directory: apps/web
        run: node scripts/verify-history-calendar-heat.mjs
      - run: pnpm build:web
