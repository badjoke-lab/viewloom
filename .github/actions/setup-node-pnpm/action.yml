name: ViewLoom Node and pnpm setup
description: Install the repository Node.js and pnpm toolchain, then install workspace dependencies.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.1
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
