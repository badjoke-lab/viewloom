name = "viewloom-collector-kick"
main = "src/entry.ts"
compatibility_date = "2026-05-18"

# Manual collection route:
#   POST /collect
# Fixture route:
#   POST /insert-fixture
# Health routes:
#   GET /health
#   GET /status

# Scheduled polling for official Kick livestream snapshots.
[triggers]
crons = ["*/5 * * * *"]

# Configure after deploy or in Cloudflare dashboard.
# KICK_CHANNEL_SLUGS is a comma-separated list, for example:
# KICK_CHANNEL_SLUGS = "channel-one,channel-two"
[vars]
INTRADAY_GENERATION_ENABLED = "true"

# Bind this after creating the D1 database in Cloudflare.
# The database_id must be filled from the Cloudflare dashboard or `wrangler d1 list`.
# [[d1_databases]]
# binding = "DB_KICK_HOT"
# database_name = "vl_kick_hot"
# database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
# Optional official Kick API credentials. Prefer secrets for these values:
#   wrangler secret put KICK_CLIENT_ID
#   wrangler secret put KICK_CLIENT_SECRET
# Optional pre-provisioned token when managed externally:
#   wrangler secret put KICK_ACCESS_TOKEN

[[d1_databases]]
binding = "DB_KICK_HOT"
database_name = "vl_kick_hot"
database_id = "ed1e082f-85ac-4dd0-a44e-5d3e200667d5"
