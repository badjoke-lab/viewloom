name = "viewloom-collector-twitch"
main = "src/entry.ts"
compatibility_date = "2026-05-18"

# Manual collection route:
#   POST /collect
# Health routes:
#   GET /health
#   GET /status

[vars]
INTRADAY_GENERATION_ENABLED = "true"

[triggers]
crons = ["*/5 * * * *"]

# Required secrets:
#   wrangler secret put TWITCH_CLIENT_ID
#   wrangler secret put TWITCH_CLIENT_SECRET
# Optional manual route token:
#   wrangler secret put TWITCH_INGEST_TOKEN

[[d1_databases]]
binding = "DB_TWITCH_HOT"
database_name = "vl_twitch_hot"
database_id = "b77221fe-80a3-4749-bc0e-d3ad54003dcf"
