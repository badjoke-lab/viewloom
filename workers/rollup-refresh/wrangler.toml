name = "viewloom-rollup-refresh"
main = "src/index.ts"
compatibility_date = "2026-05-26"

# Manual rollup refresh worker for Free Strong.
# No cron triggers here: Cloudflare Free cron slots are reserved for the 5-minute collectors.
# Automatic rollup refresh is gated inside each existing collector.

[[d1_databases]]
binding = "DB_TWITCH_HOT"
database_name = "vl_twitch_hot"
database_id = "b77221fe-80a3-4749-bc0e-d3ad54003dcf"

[[d1_databases]]
binding = "DB_KICK_HOT"
database_name = "vl_kick_hot"
database_id = "ed1e082f-85ac-4dd0-a44e-5d3e200667d5"
